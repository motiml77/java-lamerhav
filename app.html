            };
            const NODE_STYLE = {
                normal: { bg: 'linear-gradient(150deg,#A78BFA,#7C6BF0)', bd: '#A78BFA', sh: '0 4px 16px rgba(139,92,246,0.4)', c: '#fff' },
                seen:   { bg: 'linear-gradient(150deg,#6366F1,#4F46E5)', bd: '#818CF8', sh: '0 4px 16px rgba(99,102,241,0.5)', c: '#fff' },
                cur:    { bg: 'linear-gradient(150deg,#FCD34D,#F59E0B)', bd: '#FCD34D', sh: '0 0 26px rgba(251,191,36,0.6)', c: '#3a2a05' },
                found:  { bg: 'linear-gradient(150deg,#6EE7B7,#10B981)', bd: '#6EE7B7', sh: '0 0 28px rgba(16,185,129,0.6)', c: '#06281c' },
                ghost:  { bg: 'linear-gradient(150deg,#475569,#334155)', bd: '#5b6374', sh: 'none', c: '#94A3B8', op: 0.4 },
            };
            const lineIdx = (() => {
                if (demo.group === 's') { // traversals: map to print line
                    if (st.cur == null) return st.finished ? 3 : -1; return 3;
                }
                return -1;
            })();
            return (
                <div style={{ background: '#0E1424', border: '1px solid rgba(148,163,184,0.18)', borderRadius: 16, overflow: 'hidden', margin: '4px 0 8px' }}>
                    {/* tabs grouped */}
                    <div style={{ padding: '9px 12px', borderBottom: '1px solid rgba(148,163,184,0.14)', background: 'rgba(124,58,237,0.1)' }}>
                        <div style={{ display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: 5 }}>
                            <span style={{ color: '#8b93a7', fontSize: 11, fontWeight: 700, marginInlineEnd: 2 }}>סריקות:</span>
                            {TABS.filter(k => DEMOS[k].group === 's').map(k => (
                                <button key={k} onClick={() => setMode(k)} style={{ padding: '5px 11px', borderRadius: 8, border: 'none', cursor: 'pointer', fontFamily: "'Heebo', sans-serif", fontWeight: 700, fontSize: 12.5, background: mode === k ? 'linear-gradient(135deg,#7C3AED,#6366F1)' : 'rgba(51,65,85,0.5)', color: mode === k ? '#fff' : '#CBD5E1' }}>{DEMOS[k].label}</button>
                            ))}
                            <span style={{ width: 1, height: 18, background: 'rgba(148,163,184,0.25)', margin: '0 4px' }}></span>
                            <span style={{ color: '#8b93a7', fontSize: 11, fontWeight: 700, marginInlineEnd: 2 }}>פעולות:</span>
                            {TABS.filter(k => DEMOS[k].group === 'o').map(k => (
                                <button key={k} onClick={() => setMode(k)} style={{ padding: '5px 11px', borderRadius: 8, border: 'none', cursor: 'pointer', fontFamily: "'Heebo', sans-serif", fontWeight: 700, fontSize: 12.5, background: mode === k ? 'linear-gradient(135deg,#7C3AED,#6366F1)' : 'rgba(51,65,85,0.5)', color: mode === k ? '#fff' : '#CBD5E1' }}>{DEMOS[k].label}</button>
                            ))}
                            <span style={{ marginInlineStart: 'auto', color: '#64748B', fontSize: 12, fontFamily: "'JetBrains Mono', monospace" }}>{i + 1}/{steps.length}</span>
                        </div>
                        <div style={{ color: '#DDD6FE', fontWeight: 800, fontSize: 13.5, marginTop: 8 }}>{demo.title}</div>
                    </div>
                    {/* tree diagram */}
                    <div style={{ position: 'relative', height: 380, margin: '6px 8px 0' }}>
                        <svg viewBox="0 0 100 100" preserveAspectRatio="none" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }}>
                            {edges.map(([p, c], idx) => {
                                const a = nodes[p], b = nodes[c];
                                if (!a || !b) return null;
                                const fresh = (c === 5 && nodes[5]);
                                const gone = st.removedId === c;
                                return <line key={idx} x1={a.x} y1={yPct(a.l)} x2={b.x} y2={yPct(b.l)} stroke={gone ? '#475569' : fresh ? '#6EE7B7' : '#5b5191'} strokeWidth="2" vectorEffect="non-scaling-stroke" strokeDasharray={gone ? '3 3' : 'none'} opacity={gone ? 0.4 : 1} />;
                            })}
                        </svg>
                        {Object.entries(nodes).map(([id, nd]) => {
                            const s = NODE_STYLE[colorOf(+id)];
                            return (
                                <div key={id} style={{ position: 'absolute', left: nd.x + '%', top: yPct(nd.l) + '%', transform: 'translate(-50%,-50%)', width: 46, height: 46, borderRadius: '50%', border: '2px solid ' + s.bd, background: s.bg, color: s.c, boxShadow: s.sh, opacity: s.op || 1, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: 18, fontFamily: "'JetBrains Mono', monospace", transition: 'all .3s', animation: (nd.v === 5 && (st.newId === 5 || st.found === 5)) ? 'popIn .5s cubic-bezier(.34,1.56,.64,1)' : 'none', zIndex: 2 }}>{nd.v}</div>
                            );
                        })}
                    </div>
                    {/* output / order for traversals */}
                    {demo.group === 's' && (
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8, direction: 'ltr', background: '#171c2b', borderRadius: 9, padding: '9px 13px', margin: '8px 16px 0', minHeight: 40, flexWrap: 'wrap' }}>
                            <span style={{ color: '#64748B', fontFamily: "'JetBrains Mono', monospace", fontSize: 12, flexShrink: 0 }}>סדר ▶</span>
                            {(st.out || []).map((v, k) => <span key={k} style={{ background: 'rgba(16,185,129,0.16)', color: '#6EE7B7', borderRadius: 6, padding: '2px 8px', fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 13 }}>{v}</span>)}
                        </div>
                    )}
                    {/* code */}
                    <div style={{ padding: '12px 0', background: '#21262E', direction: 'ltr', borderTop: '1px solid rgba(148,163,184,0.12)', marginTop: 10 }}>
                        {demo.code.map((ln, idx) => (
                            <div key={idx} style={{ display: 'flex', fontFamily: "'JetBrains Mono', monospace", fontSize: 12.5, lineHeight: '1.85', background: lineIdx === idx ? 'rgba(251,191,36,0.12)' : 'transparent', borderInlineStart: lineIdx === idx ? '3px solid #FBBF24' : '3px solid transparent', paddingInlineEnd: 12 }}>
                                <span style={{ width: 30, textAlign: 'right', color: '#4B5263', paddingInlineEnd: 10, flexShrink: 0, userSelect: 'none' }}>{idx + 1}</span>
                                <span style={{ color: ln.trim().startsWith('//') ? '#7A8290' : '#ABB2BF', whiteSpace: 'pre' }}>{ln}</span>
                            </div>
                        ))}
                    </div>
                    {/* explanation */}
                    <div style={{ padding: '14px 16px 4px' }}>
                        <div style={{ display: 'flex', gap: 9, alignItems: 'flex-start', background: 'rgba(124,58,237,0.1)', border: '1px solid rgba(167,139,250,0.28)', borderRadius: 11, padding: '11px 14px' }}>
                            <span style={{ color: '#A78BFA', flexShrink: 0, marginTop: 1 }}><Icon name="spark" size={15} /></span>
                            <span style={{ color: '#DDD6FE', fontSize: 14, lineHeight: 1.6 }}>{st.desc}</span>
                        </div>
                    </div>
                    {/* controls */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '12px 16px' }}>
                        <button onClick={() => { setPlay(false); setI(Math.max(0, i - 1)); }} disabled={i === 0} className="btn btn-ghost btn-sm" style={{ opacity: i === 0 ? 0.4 : 1 }}><Icon name="arrowRight" size={14} /> אחורה</button>
                        <button onClick={() => { if (i >= steps.length - 1) { setI(0); setPlay(true); } else setPlay(!play); }} className="btn btn-solid btn-sm">{play ? 'השהיה' : i >= steps.length - 1 ? 'הרצה מחדש' : 'הרצה'} <Icon name={play ? 'eyeOff' : 'play'} size={14} /></button>
                        <button onClick={() => { setPlay(false); setI(Math.min(steps.length - 1, i + 1)); }} disabled={i >= steps.length - 1} className="btn btn-ghost btn-sm" style={{ opacity: i >= steps.length - 1 ? 0.4 : 1 }}>קדימה <Icon name="arrowLeft" size={14} /></button>
                        <span style={{ marginInlineStart: 'auto', color: '#8b93a7', fontSize: 11.5 }}>{demo.note}</span>
                    </div>
                </div>
            );
        };

        // ממיר קישור סרטון (YouTube / Google Drive) לכתובת הטמעה (embed) לצפייה בתוך העמוד
        const buildVideoEmbed = (raw) => {
            const url = (raw || '').trim();
            if (!url) return null;
            // YouTube — watch / youtu.be / embed / shorts / live
            const yt = url.match(/(?:youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/|shorts\/|live\/)|youtu\.be\/)([\w-]{6,})/);
            if (yt) return `https://www.youtube.com/embed/${yt[1]}?rel=0`;
            // Google Drive
            if (/drive\.google\.com|docs\.google\.com/.test(url)) {
                const d = url.match(/\/d\/([\w-]+)/) || url.match(/[?&]id=([\w-]+)/);
                if (d) return `https://drive.google.com/file/d/${d[1]}/preview`;
                return url.replace(/\/(edit|view)(\?[^#]*)?(#.*)?$/, '/preview');
            }
            return url; // קישור וידאו ישיר (mp4 וכו') או כל קישור אחר
        };

        // Topic learning section — קורס מודרך: פס צד עם שלבים והתקדמות, ותוכן שלב-אחר-שלב
        const TopicLearnSection = ({ topicTitle, customLesson, editable, onEdit }) => {
            const builtin = findLearnTopic(topicTitle);
            const hasCustom = customLesson && (customLesson.intro || (customLesson.sections || []).length || (customLesson.examples || []).length || (customLesson.points || []).length);
            let topic = hasCustom ? {
                title: topicTitle,
                intro: customLesson.intro || '',
                points: customLesson.points || [],
                examples: customLesson.examples || [],
                exercises: customLesson.exercises || [],
            } : builtin;
            const lesson = hasCustom ? (customLesson.sections || []) : ((builtin && TOPIC_LESSONS[builtin.title]) || []);
            const [open, setOpen] = useState(true);
            const [step, setStep] = useState(0);

            // סרטון הסבר (אופציונלי) שהמורה הוסיף לנושא
            const videoUrl = customLesson && customLesson.videoUrl ? String(customLesson.videoUrl).trim() : '';
            const videoTitle = customLesson && customLesson.videoTitle ? customLesson.videoTitle : '';
            const videoEmbed = videoUrl ? buildVideoEmbed(videoUrl) : null;
            // אם יש רק סרטון בלי תוכן קורס — עדיין מציגים עמוד עם שלב הצפייה
            if (!topic && videoEmbed) topic = { title: topicTitle, intro: '', points: [], examples: [], exercises: [] };

            // No course content yet — admins get a build prompt, students see nothing
            if (!topic) {
                if (editable) return (
                    <div className="question-card p-6 mb-8 flex flex-col items-center text-center gap-3" data-screen-label="דף למידה — ריק">
                        <div className="w-12 h-12 rounded-2xl bg-indigo-500/15 text-indigo-300 flex items-center justify-center"><Icon name="book" size={24} /></div>
                        <div className="text-white font-bold text-lg">אין עדיין עמוד פתיחה לנושא הזה</div>
                        <p className="text-slate-400 text-sm max-w-md">בני עמוד קורס מודרך עם הסבר, נקודות מפתח, דוגמאות חיות ותרגול — שיוצג לתלמידות לפני המשימות.</p>
                        <button onClick={onEdit} className="btn btn-solid mt-1"><Icon name="plus" size={16} /> בני עמוד קורס</button>
                    </div>
                );
                return null;
            }

            // Ordered steps of the guided course
            const hasIntroContent = (topic.intro && topic.intro.trim()) || lesson.length || (topic.points && topic.points.length);
            const steps = [];
            if (hasIntroContent || !videoEmbed) steps.push({ key: 'intro', label: 'הסבר הנושא', kind: 'intro' });
            if (videoEmbed) steps.push({ key: 'video', label: videoTitle || 'סרטון הסבר', kind: 'video' });
            topic.examples.forEach((ex, i) => steps.push({ key: 'ex' + i, label: `דוגמה ${i + 1}: ${ex.title}`, kind: 'example', i }));
            if (topic.exercises && topic.exercises.length) steps.push({ key: 'practice', label: 'תרגול עצמי', kind: 'practice' });
            const total = steps.length;
            const cur = Math.min(step, total - 1);
            const s = steps[cur];
            const pct = total > 1 ? Math.round((cur / (total - 1)) * 100) : 100;

            return (
                <div className="question-card overflow-hidden mb-8" data-screen-label="דף למידה לנושא">
                    {/* admin edit bar */}
                    {editable && (
                        <div className="flex items-center justify-between gap-2 px-4 py-2 bg-indigo-500/10 border-b border-indigo-400/20">
                            <span className="text-indigo-200 text-xs font-bold flex items-center gap-1.5"><Icon name="spark" size={13} /> {hasCustom ? 'עמוד קורס מותאם אישית' : 'עמוד קורס מובנה (אוטומטי)'}</span>
                            <button onClick={onEdit} className="btn btn-ghost btn-sm"><Icon name="edit" size={13} /> {hasCustom ? 'עריכת עמוד הקורס' : 'התאמה אישית'}</button>
                        </div>
                    )}
                    {/* header */}
                    <button onClick={() => setOpen(!open)} className="w-full flex items-center gap-3 p-4 md:p-5 text-right hover:bg-indigo-500/5 transition-colors">
                        <div className="w-11 h-11 rounded-xl bg-indigo-500/20 text-indigo-300 flex items-center justify-center flex-shrink-0"><TopicIcon title={topic.title} size={22} /></div>
                        <div className="flex-1 min-w-0">
                            <div className="text-white font-extrabold text-lg">לומדות: {topic.title}</div>
                            <div className="text-sm text-slate-400">קורס קצר ומודרך — הסבר מפורט, {topic.examples.length} דוגמאות חיות{topic.exercises && topic.exercises.length ? ` ו-${topic.exercises.length} תרגילים` : ''}</div>
                        </div>
                        <span className={`text-indigo-300 text-xl transition-transform ${open ? 'rotate-180' : ''}`}>▾</span>
                    </button>
                    {open && (
                      <div className="grid md:grid-cols-[232px_1fr] border-t border-slate-700/60">
                        {/* ===== rail ===== */}
                        <div className="bg-slate-900/40 md:border-l border-b md:border-b-0 border-slate-700/60 p-4 md:p-5">
                            <div className="flex items-center gap-2.5 mb-4">
                                <div className="flex-1 h-1.5 rounded-full bg-slate-700/70 overflow-hidden"><div className="h-full rounded-full transition-all duration-300" style={{ width: pct + '%', background: 'linear-gradient(90deg,#8B5CF6,#6366F1)' }}></div></div>
                                <span className="text-indigo-300 text-[11px] font-bold flex-shrink-0">{pct}%</span>
                            </div>
                            <div className="flex md:flex-col gap-1 overflow-x-auto md:overflow-visible pb-1 md:pb-0">
                                {steps.map((st, i) => {
                                    const state = i < cur ? 'done' : i === cur ? 'current' : 'next';
                                    return (
                                        <button key={st.key} onClick={() => setStep(i)} className={`flex items-center gap-2.5 text-right rounded-lg px-2.5 py-2 transition-colors flex-shrink-0 md:w-full ${state === 'current' ? 'bg-indigo-500/15' : 'hover:bg-slate-700/40'}`}>
                                            <span className={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold flex-shrink-0 ${state === 'done' ? 'bg-emerald-500/20 text-emerald-400' : state === 'current' ? 'bg-indigo-500 text-white' : 'border border-slate-600 text-slate-500'}`}>{state === 'done' ? <Icon name="check" size={11} /> : i + 1}</span>
                                            <span className={`text-[12.5px] leading-tight ${state === 'current' ? 'text-white font-bold' : state === 'done' ? 'text-slate-300' : 'text-slate-500'} whitespace-nowrap md:whitespace-normal`}>{st.label}</span>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                        {/* ===== content ===== */}
                        <div className="p-4 md:p-6 min-w-0 q-swap" key={cur}>
                            {s.kind === 'intro' && (
                                <div className="flex flex-col gap-6">
                                    <div className="flex items-start gap-3 bg-indigo-500/8 border border-indigo-400/20 rounded-xl px-4 py-3.5">
                                        <span className="text-indigo-300 flex-shrink-0 mt-0.5"><Icon name="spark" size={16} /></span>
                                        <p className="text-slate-200 leading-[1.85] text-[15.5px]" style={{ textWrap: 'pretty' }}>{topic.intro}</p>
                                    </div>
                                    {lesson.length > 0 && <LessonProse sections={lesson} />}
                                    {topic.title === 'רשימות מקושרות' && (
                                        <div>
                                            <div className="text-amber-300 font-bold text-sm mb-2.5 flex items-center gap-2"><Icon name="play" size={14} /> הדגמה אינטראקטיבית — איך הקוד רץ שורה-שורה</div>
                                            <LinkedListViz />
                                            <p className="text-slate-400 text-[13px] mt-2 leading-relaxed" style={{ textWrap: 'pretty' }}>לחצי "הרצה" או "קדימה" וצפי איך המצביע pos מטייל לאורך השרשרת — בכל צעד רואים בדיוק איזו שורה רצה, איפה נמצא pos, ומה מודפס.</p>
                                        </div>
                                    )}
                                    {topic.title === 'מחלקות ואובייקטים' && (
                                        <div>
                                            <div className="text-amber-300 font-bold text-sm mb-2.5 flex items-center gap-2"><Icon name="play" size={14} /> הדגמה אינטראקטיבית — מאידאה למימוש</div>
                                            <ClassObjectViz />
                                            <p className="text-slate-400 text-[13px] mt-2 leading-relaxed" style={{ textWrap: 'pretty' }}>המחלקה היא ה"אידאה" המופשטת למעלה; כל new מממש אותה לאובייקט קונקרטי בעולם. צפי איך מאותה תבנית נוצרים מימושים נפרדים — ושינוי באחד לא נוגע באחר.</p>
                                        </div>
                                    )}
                                    {topic.title === 'עצים בינאריים' && (
                                        <div>
                                            <div className="text-amber-300 font-bold text-sm mb-2.5 flex items-center gap-2"><Icon name="play" size={14} /> הדגמה אינטראקטיבית — סריקות ופעולות על עץ</div>
                                            <TreeViz />
                                            <p className="text-slate-400 text-[13px] mt-2 leading-relaxed" style={{ textWrap: 'pretty' }}>בחרי לשונית: שלוש הסריקות (In/Pre/Post-Order) מראות את סדר הביקור בצמתים; הפעולות (חיפוש, מקסימום, הוספה, מחיקה) מראות צעד-אחר-צעד איך יורדים בעץ. לחצי "הרצה" או "קדימה".</p>
                                        </div>
                                    )}
                                    {topic.title === 'תור ומחסנית' && (
                                        <div>
                                            <div className="text-amber-300 font-bold text-sm mb-2.5 flex items-center gap-2"><Icon name="play" size={14} /> הדגמה אינטראקטיבית — תור, מחסנית והיפוך</div>
                                            <QueueStackViz />
                                            <p className="text-slate-400 text-[13px] mt-2 leading-relaxed" style={{ textWrap: 'pretty' }}>בחרי לשונית: בתור (FIFO) ההוספה בזנב וההוצאה מהראש; במחסנית (LIFO) הכול קורה בראש; וההיפוך מראה איך דחיפה ושליפה הופכים את הסדר. לחצי "הרצה" או "קדימה".</p>
                                        </div>
                                    )}
                                    {topic.title === 'מערכים' && (
                                        <div>
                                            <div className="text-amber-300 font-bold text-sm mb-2.5 flex items-center gap-2"><Icon name="play" size={14} /> הדגמה אינטראקטיבית — מעבר על מערך, צעד-אחר-צעד</div>
                                            <ArrayViz />
                                            <p className="text-slate-400 text-[13px] mt-2 leading-relaxed" style={{ textWrap: 'pretty' }}>בחרי דפוס: סכום, מקסימום, ספירה, חיפוש או היפוך. בכל צעד רואים איזו שורת קוד רצה, איפה נמצא האינדקס i, ואיך המשתנים (sum/max/count...) מתעדכנים. לחצי "הרצה" או "קדימה".</p>
                                        </div>
                                    )}
                                    {topic.title === 'רקורסיה' && (
                                        <div>
                                            <div className="text-amber-300 font-bold text-sm mb-2.5 flex items-center gap-2"><Icon name="play" size={14} /> הדגמה אינטראקטיבית — מחסנית הקריאות (חלונות)</div>
                                            <RecursionViz />
                                            <p className="text-slate-400 text-[13px] mt-2 leading-relaxed" style={{ textWrap: 'pretty' }}>בחרי דוגמה (עצרת / סכום / חזקה). בירידה נפתח חלון חדש לכל קריאה; כשמגיעים לתנאי העצירה, החלונות נסגרים אחד-אחד והתשובה נאספת בחזרה אל הקריאה הראשונה. לחצי "הרצה" או "קדימה".</p>
                                        </div>
                                    )}
                                    <div>
                                        <div className="text-indigo-300 font-bold text-sm mb-2.5 flex items-center gap-2"><Icon name="check" size={15} /> לסיכום — נקודות מפתח</div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-2.5">
                                            {topic.points.map((p, i) => (
                                                <div key={i} className="flex items-start gap-2.5 bg-slate-800/60 border border-slate-700/60 rounded-xl px-3.5 py-2.5">
                                                    <span className="text-indigo-400 font-mono text-sm font-bold mt-0.5 flex-shrink-0">{String(i + 1).padStart(2, '0')}</span>
                                                    <span className="text-slate-300 text-sm leading-relaxed">{p}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                            {s.kind === 'video' && (
                                <div className="flex flex-col gap-3">
                                    <div className="flex items-center gap-2 text-rose-300 font-bold text-[15px]"><Icon name="play" size={16} /> {videoTitle || 'סרטון הסבר על הנושא'}</div>
                                    <div className="relative w-full rounded-xl overflow-hidden border border-slate-700 bg-black" style={{ aspectRatio: '16 / 9' }}>
                                        <iframe src={videoEmbed} title={videoTitle || 'סרטון הסבר'} className="absolute inset-0 w-full h-full" style={{ border: 'none' }} allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen" allowFullScreen></iframe>
                                    </div>
                                    <p className="text-slate-400 text-[13px] leading-relaxed" style={{ textWrap: 'pretty' }}>צפי בסרטון ההסבר ואז המשיכי לדוגמאות ולתרגול. אפשר לצפות במסך מלא בעזרת הכפתור בתוך הנגן.</p>
                                </div>
                            )}
                            {s.kind === 'example' && (
                                <div>
                                    <div className="flex items-center gap-2.5 mb-2">
                                        <span className="w-7 h-7 rounded-lg bg-emerald-500/15 text-emerald-400 flex items-center justify-center font-extrabold text-sm flex-shrink-0">{s.i + 1}</span>
                                        <h4 className="text-white font-extrabold text-lg">{topic.examples[s.i].title}</h4>
                                    </div>
                                    <p className="text-slate-300 text-[14.5px] leading-[1.85] mb-4" style={{ textWrap: 'pretty' }}>{topic.examples[s.i].explain}</p>
                                    <TryIt example={topic.examples[s.i]} idx={s.i} />
                                </div>
                            )}
                            {s.kind === 'practice' && (
                                <div>
                                    <div className="mb-1 text-amber-300 font-extrabold text-lg flex items-center gap-2"><Icon name="homework" size={17} /> עכשיו תורך — תרגול עצמי</div>
                                    <p className="text-slate-400 text-sm mb-4">תרגילי חימום קטנים — לא נשמרים ולא מוגשים, רק בשבילך. נסי לבד, ואם נתקעת — יש רמז, ואפשר גם להציץ בפתרון.</p>
                                    <div className="space-y-4">
                                        {topic.exercises.map((ex, i) => <ExerciseCard key={i} ex={ex} idx={i} />)}
                                    </div>
                                </div>
                            )}
                            {/* nav */}
                            <div className="flex items-center justify-between gap-3 mt-7 pt-4 border-t border-slate-700/60">
                                <button onClick={() => setStep(Math.max(0, cur - 1))} disabled={cur === 0} className="px-4 py-2 rounded-lg text-sm font-bold text-slate-300 border border-slate-600 hover:bg-slate-700/50 disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-1.5"><Icon name="arrowRight" size={15} /> הקודם</button>
                                <span className="text-slate-500 text-xs hidden sm:block">{cur + 1} מתוך {total}</span>
                                {cur < total - 1 ? (
                                    <button onClick={() => setStep(cur + 1)} className="px-5 py-2 rounded-lg text-sm font-bold text-white btn-primary flex items-center gap-1.5">הבא <Icon name="arrowLeft" size={15} /></button>
                                ) : (
                                    <span className="px-4 py-2 rounded-lg text-sm font-bold text-emerald-400 bg-emerald-500/10 border border-emerald-500/25 flex items-center gap-1.5"><Icon name="check" size={14} /> סיימת את הנושא</span>
                                )}
                            </div>
                        </div>
                      </div>
                    )}
                </div>
            );
        };

        // Smart question-instructions renderer — code-looking lines go into an LTR monospace box,
        // prose stays as comfortable RTL Hebrew. Fixes the jumbled קוד+עברית mixing.
        const looksLikeCode = (line) => {
            const t = line.trim();
            if (!t) return false;
            if (/^(קלט|פלט|פלט למסך|דוגמה|תיאור|הערה|חתימת הפעולה)\s*:?/.test(t)) return false;
            return /[{};]|<-|->|=>|\(\s*\)|\bpublic\b|\bprivate\b|\bstatic\b|\bvoid\b|\breturn\b|System\.|Node<|BinNode<|\bnew\b|\bfor\s*\(|\bwhile\s*\(|\bif\s*\(|\w+\s*\([^)]*\)|\[\s*\]/.test(t);
        };
        const QuestionInstructions = ({ text }) => {
            if (!text) return null;
            const cleaned = String(text).replace(/```[a-zA-Z]*\n?/g, '').replace(/```/g, '');
            const lines = cleaned.split('\n');
            const blocks = [];
            lines.forEach(line => {
                const code = looksLikeCode(line);
                const last = blocks[blocks.length - 1];
                if (last && last.code === code) last.lines.push(line);
                else blocks.push({ code, lines: [line] });
            });
            const trim = (s) => s.replace(/^\n+|\n+$/g, '');
            return (
                <div className="flex flex-col gap-3">
                    {blocks.map((b, i) => {
                        const content = trim(b.lines.join('\n'));
                        if (!content.trim()) return null;
                        return b.code
                            ? <pre key={i} className="q-codeblock">{content}</pre>
                            : <div key={i} className="q-text" style={{ textWrap: 'pretty' }}>{content}</div>;
                    })}
                </div>
            );
        };

        // ===== Attachments — צירוף PDF / Word / קישור Google Drive לעבודה, משובץ בעמוד =====
        // ממיר קישור לתצוגה משובצת. תומך: Google Drive, PDF ישיר, Word/Office, וקישור כללי.
        const buildEmbed = (att) => {
            if (!att) return null;
            if (att.dataUri) return { mode: 'iframe', src: att.dataUri }; // uploaded PDF (base64)
            const url = (att.url || '').trim();
            if (!url) return null;
            // Google Drive
            const drive = url.match(/\/d\/([\w-]+)/) || url.match(/[?&]id=([\w-]+)/);
            if (/drive\.google\.com|docs\.google\.com/.test(url)) {
                if (drive) return { mode: 'iframe', src: `https://drive.google.com/file/d/${drive[1]}/preview` };
                // Google Docs/Sheets/Slides published or doc links → swap /edit with /preview
                return { mode: 'iframe', src: url.replace(/\/(edit|view)(\?[^#]*)?(#.*)?$/, '/preview') };
            }
            // Direct PDF
            if (/\.pdf($|\?)/i.test(url)) return { mode: 'iframe', src: url };
            // Word / Office documents → Microsoft online viewer
            if (/\.(docx?|pptx?|xlsx?)($|\?)/i.test(url)) return { mode: 'iframe', src: `https://view.officeapps.live.com/op/embed.aspx?src=${encodeURIComponent(url)}` };
            return { mode: 'link', src: url };
        };
        const attachmentLabel = (att) => {
            if (!att) return '';
            if (att.dataUri || /\.pdf($|\?)/i.test(att.url || '')) return 'PDF';
            if (/\.(docx?)($|\?)/i.test(att.url || '')) return 'Word';
            if (/\.(pptx?)($|\?)/i.test(att.url || '')) return 'PowerPoint';
            if (/drive\.google\.com|docs\.google\.com/.test(att.url || '')) return 'Google Drive';
            return 'קובץ מצורף';
        };
        const fileIcon = (size = 16) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5z"/><path d="M14 2v6h6"/></svg>;

        // תצוגת הקובץ המצורף — משובצת ויפה, עם כותרת וכפתור פתיחה במסך מלא
        const AttachmentViewer = ({ attachment }) => {
            const embed = buildEmbed(attachment);
            if (!embed) return null;
            const label = attachmentLabel(attachment);
            const openUrl = attachment.url || attachment.dataUri;
            return (
                <div className="rounded-2xl overflow-hidden border border-slate-700/60 bg-slate-900/50 mb-5">
                    <div className="flex items-center justify-between px-4 py-2.5 border-b border-slate-700/60 bg-slate-800/40">
                        <div className="flex items-center gap-2.5 min-w-0">
                            <span className="w-7 h-7 rounded-lg bg-indigo-500/20 text-indigo-300 flex items-center justify-center flex-shrink-0">{fileIcon(15)}</span>
                            <span className="text-slate-200 font-bold text-sm truncate">{attachment.name || 'חומר מצורף'}</span>
                            <span className="text-[11px] font-bold bg-slate-700/70 text-slate-300 px-2 py-0.5 rounded-full flex-shrink-0">{label}</span>
                        </div>
                        {openUrl && <a href={openUrl} target="_blank" rel="noreferrer" className="flex items-center gap-1.5 text-xs font-bold text-indigo-300 hover:text-indigo-200 flex-shrink-0"><Icon name="upload" size={13} /> פתיחה בכרטיסייה</a>}
                    </div>
                    {embed.mode === 'iframe' ? (
                        <iframe src={embed.src} title={attachment.name || 'attachment'} className="w-full bg-white" style={{ height: '520px', border: 'none' }} allow="autoplay"></iframe>
                    ) : (
                        <a href={embed.src} target="_blank" rel="noreferrer" className="flex items-center gap-3 px-5 py-6 hover:bg-slate-800/40 transition-colors">
                            <span className="w-11 h-11 rounded-xl bg-indigo-500/15 text-indigo-300 flex items-center justify-center flex-shrink-0">{fileIcon(22)}</span>
                            <div className="min-w-0"><div className="text-white font-bold">{attachment.name || 'פתיחת החומר המצורף'}</div><div className="text-slate-400 text-xs truncate" dir="ltr">{embed.src}</div></div>
                        </a>
                    )}
                </div>
            );
        };

        // עורך הצירוף למנהל — הדבקת קישור Drive/URL או העלאת PDF קטן
        const AttachmentEditor = ({ attachment, onChange }) => {
            const [url, setUrl] = useState(attachment?.url || '');
            const [name, setName] = useState(attachment?.name || '');
            const save = (patch) => onChange({ name, url, ...attachment, ...patch });
            return (
                <div className="bg-slate-800/40 border border-dashed border-slate-600 rounded-xl p-4 mb-4">
                    <div className="flex items-center gap-2 mb-3 text-slate-200 font-bold text-sm">{fileIcon(15)} חומר מצורף לעבודה (PDF · Word · Google Drive)</div>
                    {attachment && (attachment.url || attachment.dataUri) ? (
                        <div className="flex items-center justify-between gap-3 bg-slate-900/50 rounded-lg px-3 py-2.5">
                            <div className="flex items-center gap-2.5 min-w-0">
                                <span className="w-8 h-8 rounded-lg bg-indigo-500/20 text-indigo-300 flex items-center justify-center flex-shrink-0">{fileIcon(15)}</span>
                                <div className="min-w-0"><div className="text-slate-200 text-sm font-bold truncate">{attachment.name || 'חומר מצורף'}</div><div className="text-slate-500 text-[11px] truncate" dir="ltr">{attachment.dataUri ? 'קובץ PDF שהועלה' : attachment.url}</div></div>
                            </div>
                            <button onClick={() => onChange(null)} className="action-btn bg-red-600/20 text-red-400 hover:bg-red-600/30 flex-shrink-0"><Icon name="trash" size={13} /> הסרה</button>
                        </div>
                    ) : (
                        <div className="flex flex-col gap-2.5">
                            <input value={name} onChange={e => setName(e.target.value)} placeholder="כותרת לחומר (למשל: דף הנחיות לעבודה)" className="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white text-sm" />
                            <div className="flex gap-2">
                                <input value={url} onChange={e => setUrl(e.target.value)} dir="ltr" placeholder="הדביקי קישור Google Drive / PDF / Word" className="flex-1 px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-white text-sm font-mono" />
                                <button onClick={() => url.trim() && save({ url: url.trim(), dataUri: null })} className="px-4 py-2 rounded-lg btn-primary text-white text-sm font-bold whitespace-nowrap">צירוף</button>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="flex-1 h-px bg-slate-700"></div><span className="text-slate-500 text-xs">או</span><div className="flex-1 h-px bg-slate-700"></div>
                            </div>
                            <label className="flex items-center justify-center gap-2 px-3 py-2.5 rounded-lg bg-slate-700/50 hover:bg-slate-700 border border-slate-600 text-slate-300 text-sm font-bold cursor-pointer">
                                <Icon name="upload" size={15} /> העלאת קובץ PDF (עד 1MB)
                                <input type="file" accept="application/pdf" className="hidden" onChange={e => {
                                    const f = e.target.files[0];
                                    if (!f) return;
                                    if (f.size > 1024 * 1024) { alert('הקובץ גדול מדי (מקסימום 1MB). לקבצים גדולים השתמשי בקישור Google Drive.'); return; }
                                    const reader = new FileReader();
                                    reader.onload = ev => onChange({ name: name || f.name, url: '', dataUri: ev.target.result });
                                    reader.readAsDataURL(f);
                                }} />
                            </label>
                            <p className="text-slate-500 text-[11.5px] leading-relaxed">טיפ: בקישור Google Drive ודאי שההרשאה היא "כל מי שיש לו הקישור יכול לצפות". קבצי Word/PDF גדולים — העלי ל-Drive והדביקי קישור.</p>
                        </div>
                    )}
                </div>
            );
        };

        // Neon code-rain — bright, multicolor "matrix" of Java tokens on a canvas (additive glow)
        const CodeRainCanvas = () => {
            const canvasRef = React.useRef(null);
            React.useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
                const glyphs = ('class{}();=<>+\u2212*/[]if else for while int new void return true 0 1 String boolean && || public static i++ length()').replace(/ /g, '').split('');
                const palette = [188, 200, 262, 288, 330, 152]; // cyan, sky, indigo, violet, pink, emerald
                const fontSize = 17;
                let w, h, dpr, cols, drops, hues, speeds, raf, last = 0;
                const setup = () => {
                    dpr = Math.min(window.devicePixelRatio || 1, 2);
                    w = canvas.clientWidth; h = canvas.clientHeight;
                    canvas.width = Math.max(1, Math.floor(w * dpr));
                    canvas.height = Math.max(1, Math.floor(h * dpr));
                    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                    cols = Math.max(1, Math.floor(w / fontSize));
                    drops = Array.from({ length: cols }, () => Math.random() * -60);
                    hues = Array.from({ length: cols }, () => palette[Math.floor(Math.random() * palette.length)]);
                    speeds = Array.from({ length: cols }, () => 0.6 + Math.random() * 0.9);
                };
                setup();
                const onResize = () => setup();
                window.addEventListener('resize', onResize);
                const rnd = (a) => a[Math.floor(Math.random() * a.length)];
                const drawStatic = () => {
                    ctx.clearRect(0, 0, w, h);
                    ctx.font = `600 ${fontSize}px 'JetBrains Mono', monospace`; ctx.textAlign = 'center';
                    ctx.globalCompositeOperation = 'lighter';
                    for (let i = 0; i < cols; i++) {
                        for (let j = 2; j < h / fontSize; j += 1) {
                            if (Math.random() > 0.16) continue;
                            ctx.fillStyle = `hsla(${hues[i]},95%,72%,0.5)`;
                            ctx.fillText(rnd(glyphs), i * fontSize + fontSize / 2, j * fontSize);
                        }
                    }
                };
                const draw = (t) => {
                    raf = requestAnimationFrame(draw);
                    if (t - last < 48) return; // calm cadence ~20fps
                    last = t;
                    // fade previous frame to transparent so the deep gradient + aurora show through
                    ctx.globalCompositeOperation = 'destination-out';
                    ctx.fillStyle = 'rgba(0,0,0,0.085)';
                    ctx.fillRect(0, 0, w, h);
                    // additive neon glyphs
                    ctx.globalCompositeOperation = 'lighter';
                    ctx.font = `600 ${fontSize}px 'JetBrains Mono', monospace`; ctx.textAlign = 'center';
                    for (let i = 0; i < cols; i++) {
                        const x = i * fontSize + fontSize / 2;
                        const y = drops[i] * fontSize;
                        const hue = hues[i];
                        ctx.shadowColor = `hsla(${hue},100%,72%,0.7)`;
                        ctx.shadowBlur = 11;
                        ctx.fillStyle = `hsla(${hue},100%,88%,0.78)`; // bright head
                        ctx.fillText(rnd(glyphs), x, y);
                        ctx.shadowBlur = 5;
                        ctx.fillStyle = `hsla(${hue},96%,66%,0.36)`; // soft trailing glyph
                        ctx.fillText(rnd(glyphs), x, y - fontSize);
                        ctx.shadowBlur = 0;
                        if (y > h && Math.random() > 0.97) { drops[i] = Math.random() * -18; hues[i] = rnd(palette); speeds[i] = 0.6 + Math.random() * 0.9; }
                        drops[i] += speeds[i];
                    }
                };
                if (reduce) drawStatic();
                else raf = requestAnimationFrame(draw);
                return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', onResize); };
            }, []);
            return <canvas ref={canvasRef} className="code-rain-canvas" aria-hidden="true"></canvas>;
        };

        // Login ambience — neon code-rain canvas + aurora glow
        const LoginAmbience = () => {
            return (
                <div className="login-aurora" aria-hidden="true">
                    <div className="aurora-blob aurora-1"></div>
                    <div className="aurora-blob aurora-2"></div>
                    <div className="aurora-blob aurora-3"></div>
                    <CodeRainCanvas />
                </div>
            );
        };

        // Typewriter — types a Java line, pauses, deletes, loops
        const Typewriter = ({ lines, className }) => {
            const [txt, setTxt] = useState('');
            const [li, setLi] = useState(0);
            const [del, setDel] = useState(false);
            useEffect(() => {
                const full = lines[li % lines.length];
                let to;
                if (!del && txt === full) to = setTimeout(() => setDel(true), 1700);
                else if (del && txt === '') { setDel(false); setLi(v => v + 1); }
                else to = setTimeout(() => setTxt(del ? full.slice(0, txt.length - 1) : full.slice(0, txt.length + 1)), del ? 38 : 70);
                return () => clearTimeout(to);
            }, [txt, del, li, lines]);
            return <span className={className} dir="ltr">{txt}<span className="type-caret"></span></span>;
        };

        // Login Screen — open landing, content visible but locked until sign-in
        const LoginScreen = ({ onLogin, loading }) => (            <div className="min-h-screen flex flex-col login-stage">
                <LoginAmbience />
                <div className="relative flex flex-col min-h-screen" style={{ zIndex: 1 }}>
                {/* Header */}
                <header className="flex items-center justify-between px-5 md:px-9 py-4 border-b border-slate-400/10">
                    <div className="flex items-center gap-3">
                        <div className="logo-coin w-10 h-10 rounded-xl flex items-center justify-center text-white font-mono font-bold text-base">{'{ }'}</div>
                        <div>
                            <div className="text-slate-100 font-extrabold leading-tight">Java לבגרות</div>
                            <div className="text-indigo-300 text-[11px] font-semibold">אולפנה 'למרחב' · שכבות יא–יב</div>
                        </div>
                    </div>
                    <button onClick={onLogin} disabled={loading} className="google-btn login-cta !rounded-full" style={{ boxShadow: '0 4px 18px rgba(99,102,241,0.35)' }}>
                        {loading ? <div className="spinner w-5 h-5"></div> : (
                            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        )}
                        {loading ? 'מתחברות...' : 'התחברות עם Google'}
                    </button>
                </header>
                {/* Hero */}
                <main className="flex-1 flex flex-col items-center text-center px-5 pt-14 md:pt-20 pb-16">
                    <div className="flex items-center gap-2 bg-indigo-500/15 border border-indigo-400/35 text-indigo-200 rounded-full px-4 py-1.5 text-sm font-semibold mb-6">
                        <span className="w-2 h-2 rounded-full bg-indigo-400 inline-block animate-pulse"></span>
                        ממתין להתחברות כדי לפתוח את התוכן
                    </div>
                    <h1 className="text-4xl md:text-6xl font-black text-slate-50 leading-tight max-w-2xl mb-5" style={{ textWrap: 'pretty' }}>כותבות קוד.<br/>ניגשות לבגרות בביטחון.</h1>
                    <p className="text-slate-400 text-lg leading-relaxed max-w-xl mb-6" style={{ textWrap: 'pretty' }}>יחידות לימוד לפי נושאים, עבודות ומבחנים עם משוב מיידי על הקוד — הכול במקום אחד, מותאם לשכבה שלך.</p>
                    {/* Live typewriter code line */}
                    <div className="inline-flex items-center gap-2 bg-[#21252B]/80 border border-slate-700/60 rounded-xl px-4 py-2.5 mb-10 font-mono text-sm md:text-base" style={{ direction: 'ltr' }}>
                        <span className="text-emerald-400">$</span>
                        <Typewriter className="text-indigo-200" lines={['System.out.println("שלום, בוא נתחיל!");', 'for (int i = 1; i <= 100; i++)', 'while (לומדות) { מצליחות++; }']} />
                    </div>
                    {/* Locked preview cards — each topic its own unit */}
                    <div className="grid grid-cols-2 md:grid-cols-3 gap-4 w-full max-w-4xl">
                        {[['01', 'משתנים'], ['02', 'תנאים'], ['03', 'לולאות'], ['04', 'מערכים'], ['05', 'מחרוזות'], ['06', 'מחלקות ואובייקטים']].map(([num, name]) => (
                            <div key={num} className="question-card p-5 text-right">
                                <div className="flex items-center justify-between mb-3">
                                    <span className="font-mono text-indigo-300 text-xs font-semibold">{num}</span>
                                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#64748B" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                                </div>

        // Java linter function (used by CodeMirror 6)
        const javaLinterRules = (text) => {
            const diagnostics = [];
            const lines = text.split('\n');
            let pos = 0;
            
            // Track brackets
            let braceCount = 0;
            let parenCount = 0;
            let bracketCount = 0;
            
            // Valid Java keywords and types
            const validTypes = ['int', 'double', 'float', 'String', 'boolean', 'char', 'long', 'short', 'byte', 'void', 'Integer', 'Double', 'Float', 'Boolean', 'Character', 'Long', 'Short', 'Byte', 'Object', 'System', 'Math', 'Scanner', 'ArrayList', 'HashMap', 'List', 'Map', 'Set', 'Arrays', 'Node', 'Random', 'Stack', 'Queue', 'LinkedList'];
            const validKeywords = ['public', 'private', 'protected', 'static', 'final', 'abstract', 'class', 'interface', 'extends', 'implements', 'new', 'return', 'if', 'else', 'for', 'while', 'do', 'switch', 'case', 'default', 'break', 'continue', 'try', 'catch', 'finally', 'throw', 'throws', 'import', 'package', 'void', 'null', 'true', 'false', 'this', 'super', 'instanceof', 'enum', 'assert'];
            const validMethods = ['println', 'print', 'printf', 'length', 'charAt', 'substring', 'equals', 'compareTo', 'indexOf', 'toLowerCase', 'toUpperCase', 'trim', 'split', 'replace', 'contains', 'isEmpty', 'toString', 'parseInt', 'parseDouble', 'valueOf', 'add', 'get', 'set', 'remove', 'size', 'clear', 'next', 'nextInt', 'nextDouble', 'nextLine', 'hasNext', 'sqrt', 'pow', 'abs', 'max', 'min', 'random', 'round', 'floor', 'ceil', 'getValue', 'getNext', 'setNext', 'setValue', 'getHead', 'setHead', 'push', 'pop', 'peek', 'poll', 'offer', 'enqueue', 'dequeue', 'front', 'rear', 'isEmpty', 'isFull', 'getData', 'setData', 'hasValue', 'getInfo', 'setInfo'];
            
            // Methods that MUST have parentheses
            const methodsNeedParens = ['getValue', 'getNext', 'setNext', 'setValue', 'getHead', 'setHead', 'push', 'pop', 'peek', 'poll', 'offer', 'enqueue', 'dequeue', 'front', 'rear', 'isEmpty', 'isFull', 'getData', 'setData', 'hasValue', 'getInfo', 'setInfo', 'size', 'toString', 'equals', 'compareTo', 'trim', 'toLowerCase', 'toUpperCase', 'charAt', 'substring', 'indexOf', 'contains', 'replace', 'split', 'add', 'get', 'set', 'remove', 'clear', 'next', 'hasNext', 'nextInt', 'nextDouble', 'nextLine'];
            
            const allValidWords = new Set([...validTypes, ...validKeywords, ...validMethods]);
            
            // Common typos
            const typoMap = {
                // public
                'pubic': 'public', 'pubilc': 'public', 'pulic': 'public', 'publc': 'public', 'publi': 'public', 'pbulic': 'public', 'pulbic': 'public',
                // static
                'statc': 'static', 'ststic': 'static', 'staic': 'static', 'statik': 'static', 'srtai': 'static', 'sattic': 'static',
                'sr': 'static', 'st': 'static', 'sta': 'static', 'stat': 'static', 'stati': 'static', 'satic': 'static', 'sttaic': 'static', 'staric': 'static',
                // void
                'viod': 'void', 'vold': 'void', 'vid': 'void', 'voi': 'void', 'vaid': 'void', 'voif': 'void',
                // String
                'stirng': 'String', 'sting': 'String', 'strng': 'String', 'srtring': 'String', 'Stirng': 'String', 'Sting': 'String', 'Strng': 'String',
                // boolean values
                'flase': 'false', 'fasle': 'false', 'ture': 'true', 'treu': 'true', 'fales': 'false', 'tru': 'true', 'fals': 'false',
                // null
                'nul': 'null', 'nill': 'null', 'nll': 'null', 'nulp': 'null',
                // return
                'retrun': 'return', 'reutrn': 'return', 'retrn': 'return', 'rturn': 'return', 'retur': 'return', 'retunr': 'return', 'retutn': 'return', 'retuen': 'return',
                // class
                'calss': 'class', 'clas': 'class', 'clss': 'class', 'classs': 'class',
                // private
                'priate': 'private', 'privte': 'private', 'priavte': 'private', 'privat': 'private', 'prviate': 'private',
                // protected
                'protcted': 'protected', 'proected': 'protected', 'proteced': 'protected', 'protectd': 'protected',
                // boolean
                'boolen': 'boolean', 'bolean': 'boolean', 'boolaen': 'boolean', 'boolena': 'boolean', 'booelan': 'boolean',
                // double/float
                'doubel': 'double', 'doble': 'double', 'duoble': 'double', 'doulbe': 'double',
                'flot': 'float', 'flaot': 'float', 'floar': 'float', 'flaot': 'float',
                // int/Integer
                'itn': 'int', 'nit': 'int', 'iny': 'int', 'inr': 'int',
                'intger': 'Integer', 'integr': 'Integer', 'Intger': 'Integer', 'Integr': 'Integer',
                // System
                'systme': 'System', 'ssytem': 'System', 'sytem': 'System', 'Systme': 'System', 'Sytem': 'System', 'Ssytem': 'System',
                // Scanner
                'scaner': 'Scanner', 'scnner': 'Scanner', 'Scanenr': 'Scanner', 'Scaner': 'Scanner', 'Scnner': 'Scanner',
                // length/println
                'lenght': 'length', 'legth': 'length', 'lentgh': 'length', 'lengt': 'length',
                'pirntln': 'println', 'printl': 'println', 'prinln': 'println', 'prnintln': 'println', 'printlm': 'println',
                // if/else/for/while
                'fi': 'if', 'esle': 'else', 'els': 'else', 'elss': 'else',
                'fro': 'for', 'forr': 'for', 'fo': 'for',
                'whiel': 'while', 'whil': 'while', 'wihle': 'while', 'hwile': 'while',
                // new
                'nwe': 'new', 'enw': 'new', 'ne': 'new',
                // char
                'cahr': 'char', 'chr': 'char', 'cha': 'char'
            };
            
            // Concatenated words (missing space)
            const concatenatedPatterns = {
                'returntrue': 'return true',
                'returnfalse': 'return false',
                'returnnull': 'return null',
                'returnthis': 'return this',
                'elseif': 'else if',
                'newint': 'new int',
                'newString': 'new String',
                'newNode': 'new Node',
                'publicstatic': 'public static',
                'publicvoid': 'public void',
                'privateint': 'private int',
                'staticint': 'static int',
                'staticvoid': 'static void',
                'intx': 'int x',
                'inty': 'int y',
                'inti': 'int i',
                'intj': 'int j',
                'intn': 'int n',
                'intsum': 'int sum',
                'intcount': 'int count',
                'intresult': 'int result'
            };
            
            lines.forEach((line, lineIndex) => {
                const trimmed = line.trim();
                const lineStart = pos;
                const lineEnd = pos + line.length;
                
                // Skip empty lines and comments
                if (!trimmed || trimmed.startsWith('//') || trimmed.startsWith('/*') || trimmed.startsWith('*')) {
                    pos = lineEnd + 1;
                    return;
                }
                
                // 🔴 Check for Hebrew characters (very common mistake!)
                const hebrewChars = line.match(/[\u0590-\u05FF]+/g);
                if (hebrewChars) {
                    hebrewChars.forEach(match => {
                        const idx = line.indexOf(match);
                        diagnostics.push({
                            from: lineStart + idx,
                            to: lineStart + idx + match.length,
                            message: `❌ תווים בעברית "${match}"! שנה למקלדת אנגלית (Alt+Shift)`,
                            severity: 'error'
                        });
                    });
                }
                
                // 🔴 Check for common operator mistakes
                if (trimmed.includes('=+') && !trimmed.includes('+=')) {
                    const idx = line.indexOf('=+');
                    diagnostics.push({
                        from: lineStart + idx,
                        to: lineStart + idx + 2,
                        message: `❌ האם התכוונת ל-+= (הוספה למשתנה)?`,
                        severity: 'error'
                    });
                }
                if (trimmed.includes('=-') && !trimmed.includes('-=')) {
                    const idx = line.indexOf('=-');
                    diagnostics.push({
                        from: lineStart + idx,
                        to: lineStart + idx + 2,
                        message: `❌ האם התכוונת ל--= (חיסור מהמשתנה)?`,
                        severity: 'error'
                    });
                }
                
                // 🔴 Check for = instead of == in conditions
                const ifMatch = trimmed.match(/if\s*\([^=]*[^=!<>]=[^=][^)]*\)/);
                if (ifMatch && !trimmed.includes('==') && !trimmed.includes('!=') && !trimmed.includes('<=') && !trimmed.includes('>=')) {
                    diagnostics.push({
                        from: lineStart,
                        to: lineEnd,
                        message: `⚠️ האם התכוונת ל-== (השוואה) במקום = (השמה)?`,
                        severity: 'warning'
                    });
                }
                
                // 🔴 Check for string comparison with ==
                if (trimmed.match(/==\s*"/) || trimmed.match(/"\s*==/)) {
                    diagnostics.push({
                        from: lineStart,
                        to: lineEnd,
                        message: `⚠️ השוואת מחרוזות: עדיף להשתמש ב-.equals() במקום ==`,
                        severity: 'warning'
                    });
                }
                
                // 🔴 Check for array without size
                const arrayNoSize = trimmed.match(/new\s+(int|double|String|char|boolean|float)\s*\[\s*\]\s*;/);
                if (arrayNoSize) {
                    diagnostics.push({
                        from: lineStart,
                        to: lineEnd,
                        message: `❌ חסר גודל מערך! צריך לציין מספר בסוגריים המרובעים, למשל: new ${arrayNoSize[1]}[10]`,
                        severity: 'error'
                    });
                }
                
                // 🔴 Check for method call without parentheses (comprehensive check for all methods)
                for (const method of methodsNeedParens) {
                    const pattern = new RegExp(`\\.${method}(?!\\s*\\()`, 'g');
                    let match;
                    while ((match = pattern.exec(line)) !== null) {
                        // Make sure it's not followed by ( and not part of a longer word
                        const afterMatch = line.substring(match.index + method.length + 1);
                        if (!afterMatch.startsWith('(') && !/^[a-zA-Z0-9_]/.test(afterMatch)) {
                            diagnostics.push({
                                from: lineStart + match.index,
                                to: lineStart + match.index + method.length + 1,
                                message: `❌ חסרות סוגריים! צריך .${method}()`,
                                severity: 'error'
                            });
                        }
                    }
                }
                
                // 🔴 Check for Scanner without .close() reminder (just info)
                if (trimmed.includes('new Scanner') && !trimmed.includes('//')) {
                    diagnostics.push({
                        from: lineStart,
                        to: lineEnd,
                        message: `💡 זכור לסגור את ה-Scanner בסוף עם in.close()`,
                        severity: 'info'
                    });
                }
                
                // 🔴 Check for potential infinite loop
                if (trimmed.match(/while\s*\(\s*true\s*\)/) && !trimmed.includes('break')) {
                    diagnostics.push({
                        from: lineStart,
                        to: lineEnd,
                        message: `⚠️ לולאת while(true) - וודא שיש break בפנים למניעת לולאה אינסופית`,
                        severity: 'warning'
                    });
                }
                
                // 🔴 Check for division that might be integer division
                const divisionMatch = trimmed.match(/(\d+)\s*\/\s*(\d+)/);
                if (divisionMatch) {
                    const a = parseInt(divisionMatch[1]);
                    const b = parseInt(divisionMatch[2]);
                    if (b !== 0 && a % b !== 0) {
                        diagnostics.push({
                            from: lineStart,
                            to: lineEnd,
                            message: `💡 חלוקה שלמה: ${a}/${b} = ${Math.floor(a/b)} (לא ${(a/b).toFixed(2)}). להשתמש ב-double לתוצאה עשרונית`,
                            severity: 'info'
                        });
                    }
                }
                
                // 🔴 Check for common for loop mistakes
                const forLoopMatch = trimmed.match(/for\s*\(\s*int\s+(\w+)\s*=\s*(\d+)\s*;\s*\1\s*(<|<=|>|>=)\s*(\d+)\s*;\s*\1\s*(\+\+|--)/);
                if (forLoopMatch) {
                    const [, varName, start, op, end, inc] = forLoopMatch;
                    const startNum = parseInt(start);
                    const endNum = parseInt(end);
                    // Check if loop will never run
                    if ((op === '<' && startNum >= endNum) || (op === '<=' && startNum > endNum)) {
                        if (inc === '++') {
                            diagnostics.push({
                                from: lineStart,
                                to: lineEnd,
                                message: `⚠️ הלולאה לא תרוץ! ${varName} מתחיל ב-${start} וכבר ${op} ${end}`,
                                severity: 'warning'
                            });
                        }
                    }
                    // Check for wrong direction
                    if ((op === '<' || op === '<=') && inc === '--') {
                        diagnostics.push({
                            from: lineStart,
                            to: lineEnd,
                            message: `❌ לולאה אינסופית! תנאי ${op} עם ${inc} - שנה ל-++ או הפוך את התנאי`,
                            severity: 'error'
                        });
                    }
                    if ((op === '>' || op === '>=') && inc === '++') {
                        diagnostics.push({
                            from: lineStart,
                            to: lineEnd,
                            message: `❌ לולאה אינסופית! תנאי ${op} עם ${inc} - שנה ל--- או הפוך את התנאי`,
                            severity: 'error'
                        });
                    }
                }
                
                // Count brackets
                for (let char of line) {
                    if (char === '{') braceCount++;
                    if (char === '}') braceCount--;
                    if (char === '(') parenCount++;
                    if (char === ')') parenCount--;
                    if (char === '[') bracketCount++;
                    if (char === ']') bracketCount--;
                }
                
                // 🆕 Check for code outside method/class (very common beginner mistake!)
                // braceCount 0 = outside class, 1 = inside class but outside method
                const prevBraceCount = braceCount - (line.match(/{/g) || []).length + (line.match(/}/g) || []).length;
                
                // Check if line looks like executable code or variable declaration
                const looksLikeCode = /^\s*(int|double|float|String|boolean|char|long|short|byte|Node|Stack|Queue|BinNode)\s*(<.*>)?\s*\w+/.test(trimmed) ||
                                     /^\s*(System\.|Math\.|return\s|if\s*\(|for\s*\(|while\s*\()/.test(trimmed);
                
                // Check if it's a valid class-level declaration (has access modifier or is static)
                const isClassLevelDecl = /^\s*(public|private|protected|static|final|class|interface|enum|import|package)/.test(trimmed);
                
                // Check if it's just opening/closing braces or simple statements
                const isStructural = /^\s*[{}]\s*$/.test(trimmed) || /^\s*(else|try|catch|finally)\s*{?\s*$/.test(trimmed);
                
                // If we're at brace level 0-1 and have code that's not a class-level declaration
                if (prevBraceCount <= 1 && looksLikeCode && !isClassLevelDecl && !isStructural) {
                    if (prevBraceCount === 0) {
                        diagnostics.push({
                            from: lineStart,
                            to: lineEnd,
                            message: `❌ קוד מחוץ למחלקה! ב-Java כל הקוד חייב להיות בתוך class`,
                            severity: 'error'
                        });
                    } else if (prevBraceCount === 1 && !trimmed.includes('(')) {
                        // Inside class but outside method, and it's not a method declaration
                        diagnostics.push({
                            from: lineStart,
                            to: lineEnd,
                            message: `💡 נראה שהקוד מחוץ לפונקציה. האם שכחת לכתוב אותו בתוך main או פונקציה אחרת?`,
                            severity: 'warning'
                        });
                    }
                }
                
                // 🆕 Check for comparing two String variables with ==
                if (/String\s+\w+/.test(text) && trimmed.match(/\b\w+\s*==\s*\w+\b/) && !trimmed.includes('null')) {
                    const varCompare = trimmed.match(/\b(\w+)\s*==\s*(\w+)\b/);
                    if (varCompare && !['true', 'false', 'null'].includes(varCompare[1]) && !['true', 'false', 'null'].includes(varCompare[2])) {
                        // Check if variables might be strings
                        if (!/\d/.test(varCompare[1]) && !/\d/.test(varCompare[2])) {
                            diagnostics.push({
                                from: lineStart,
                                to: lineEnd,
                                message: `💡 אם אלה מחרוזות, השתמש ב-.equals() להשוואה: ${varCompare[1]}.equals(${varCompare[2]})`,
                                severity: 'info'
                            });
                        }
                    }
                }
                
                // 🆕 Check for empty catch block (bad practice!)
                if (trimmed.match(/catch\s*\([^)]+\)\s*\{\s*\}/) || (trimmed.includes('catch') && lines[lineIndex + 1]?.trim() === '}')) {
                    diagnostics.push({
                        from: lineStart,
                        to: lineEnd,
                        message: `⚠️ catch ריק! לפחות הוסף: ex.printStackTrace(); כדי לראות שגיאות`,
                        severity: 'warning'
                    });
                }
                
                // 🆕 Check for missing break in switch (look for case without break before next case)
                if (trimmed.startsWith('case ') && lineIndex > 0) {
                    // Look back for previous non-empty line
                    let prevLineIndex = lineIndex - 1;
                    while (prevLineIndex >= 0 && !lines[prevLineIndex].trim()) prevLineIndex--;
                    if (prevLineIndex >= 0) {
                        const prevLine = lines[prevLineIndex].trim();
                        if (prevLine.startsWith('case ') || (prevLine && !prevLine.includes('break') && !prevLine.includes('return') && !prevLine.includes('throw') && !prevLine.endsWith(':'))) {
                            // Previous case might be missing break
                            if (!prevLine.startsWith('case ') && !prevLine.endsWith('{')) {
                                diagnostics.push({
                                    from: pos - lines[prevLineIndex].length - 1,
                                    to: pos - 1,
                                    message: `💡 שכחת break? ב-switch בלי break הקוד ממשיך ל-case הבא (fall-through)`,
                                    severity: 'warning'
                                });
                            }
                        }
                    }
                }
                
                // 🆕 Check for array index that might be wrong (common off-by-one errors)
                const arrayAccessMatch = trimmed.match(/\[(\w+)\s*\+\s*1\]|\[length\]|\[size\(\)\]/);
                if (arrayAccessMatch) {
                    diagnostics.push({
                        from: lineStart,
                        to: lineEnd,
                        message: `💡 זכור: אינדקס מערך מתחיל מ-0! האיבר האחרון הוא [length-1] או [size()-1]`,
                        severity: 'info'
                    });
                }
                
                // 🆕 Check for potential infinite loop (while true without break)
                if (trimmed.match(/while\s*\(\s*true\s*\)/) && !text.includes('break')) {
                    diagnostics.push({
                        from: lineStart,
                        to: lineEnd,
                        message: `⚠️ לולאה אינסופית! while(true) בלי break יריץ לנצח`,
                        severity: 'warning'
                    });
                }
                
                // 🆕 Check for common logical errors in conditions
                if (trimmed.match(/if\s*\(\s*\w+\s*=\s*[^=]/)) {

                // 🔬 מחקר: Possible typo in main method signature
                const mainCheck = trimmed.match(/public\s+static\s+void\s+(Main|mian|mainn|mai|MAIN)\s*\(/);
                if (mainCheck && mainCheck[1] !== 'main') {
                    diagnostics.push({
                        from: lineStart, to: lineEnd,
                        message: `❌ שגיאת כתיב! "${mainCheck[1]}" צריך להיות "main" (אותיות קטנות)`,
                        severity: 'error'
                    });
                }
                
                // 🔬 מחקר Decaf: Double semicolon
                if (trimmed.includes(';;')) {
                    diagnostics.push({
                        from: lineStart + trimmed.indexOf(';;'), to: lineStart + trimmed.indexOf(';;') + 2,
                        message: `⚠️ נקודה-פסיק כפולה - מיותר`,
                        severity: 'warning'
                    });
                }
                
                pos = lineEnd + 1;
            });
            
            // Check bracket balance
            const lastPos = text.length - 1;
            if (braceCount > 0) {
                diagnostics.push({ from: lastPos, to: lastPos + 1, message: `❌ חסרות ${braceCount} סוגריים מסולסלים }`, severity: 'error' });
            } else if (braceCount < 0) {
                diagnostics.push({ from: lastPos, to: lastPos + 1, message: `❌ יש ${Math.abs(braceCount)} סוגריים } מיותרים`, severity: 'error' });
            }
            if (parenCount !== 0) {
                diagnostics.push({ from: lastPos, to: lastPos + 1, message: parenCount > 0 ? `❌ חסרות ${parenCount} סוגריים עגולים )` : `❌ יש ${Math.abs(parenCount)} סוגריים ) מיותרים`, severity: 'error' });
            }
            
            return diagnostics;
        };
        
        // Store globally for CM6 module to access
        window.javaLinterRules = javaLinterRules;
        console.log('✅ javaLinterRules registered globally');

        // Helper function to export automata to text format for AI grading
        const exportAutomataToText = (automataData) => {
            if (!automataData || !automataData.states) return 'אין נתוני אוטומט';
            
            const { states, transitions, type } = automataData;
            let text = `סוג אוטומט: ${type === 'DFA' ? 'אוטומט סופי דטרמיניסטי (DFA)' : type === 'NFA' ? 'אוטומט סופי אי-דטרמיניסטי (NFA)' : 'אוטומט מחסנית (PDA)'}\n\n`;
            
            const initialState = states.find(s => s.isInitial);
            const acceptingStates = states.filter(s => s.isAccepting);
            
            text += `מצבים: ${states.map(s => s.name).join(', ')}\n`;
            text += `מצב התחלתי: ${initialState?.name || 'לא הוגדר'}\n`;
            text += `מצבים מקבלים: ${acceptingStates.map(s => s.name).join(', ') || 'אין'}\n\n`;
            text += `מעברים:\n`;
            
            (transitions || []).forEach(t => {
                const fromName = states.find(s => s.id === t.from)?.name || '?';
                const toName = states.find(s => s.id === t.to)?.name || '?';
                if (type === 'PDA') {
                    text += `  ${fromName} --[${t.label}, ${t.stackPop || 'ε'}/${t.stackPush || 'ε'}]--> ${toName}\n`;
                } else {
                    text += `  ${fromName} --[${t.label}]--> ${toName}\n`;
                }
            });
            
            return text;
        };

        // Data Structures Reference - מילון מבני נתונים
        const DATA_STRUCTURES_HELP = {
            'Node': {
                name: 'Node<T> - חוליה ברשימה מקושרת',
                description: 'חוליה המכילה ערך ומצביע לחוליה הבאה',

            },

                name: 'Queue<T> - תור',
                description: 'מבנה נתונים FIFO - הראשון שנכנס יוצא ראשון',

                methods: [

                    { signature: 'boolean hasLeft()', description: 'בודק אם יש ילד שמאלי' },

                ],
                example: 'BinNode<Integer> root = new BinNode<>(10);\nroot.setLeft(new BinNode<>(5));'
            }
        };

        // Helper function to detect data structures in code
        const detectDataStructures = (code) => {
            if (!code) return [];
            const detected = [];
            const patterns = {
                'Node': /\bNode\s*<|new\s+Node\s*[<(]|\bNode\b.*=|Node\s+\w+/,
                'Stack': /\bStack\s*<|new\s+Stack\s*[<(]|\bStack\b.*=|\.push\(|\.pop\(|\.top\(/,
                'Queue': /\bQueue\s*<|new\s+Queue\s*[<(]|\bQueue\b.*=|\.insert\(|\.remove\(|\.head\(/,
                'BinNode': /\bBinNode\s*<|new\s+BinNode\s*[<(]|\bBinNode\b.*=|\.getLeft\(|\.getRight\(/,
            };
            
            for (const [name, pattern] of Object.entries(patterns)) {
                if (pattern.test(code)) {
                    detected.push(name);
                }
            }
            return detected;
        };

        // Data Structures Help Panel Component
        const DataStructuresHelp = ({ code, isOpen, onClose }) => {

                                <h5 className="text-indigo-300 font-bold mb-2 text-sm">פעולות:</h5>

                            </>
                        )}
