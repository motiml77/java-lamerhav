        /* Unified professional button system — single accent (indigo), neutral ghost for the rest */

        /* ===== Login ambience — neon code-rain canvas + aurora + typewriter ===== */
        .login-stage { position: relative; overflow: hidden; background: radial-gradient(1100px 680px at 80% -12%, rgba(56,189,248,0.09), transparent 60%), radial-gradient(900px 620px at 6% 112%, rgba(168,85,247,0.10), transparent 60%), linear-gradient(160deg, #0b1026 0%, #0a0d1c 55%, #080a16 100%); }
        .code-rain-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; opacity: 0.58; }
        .login-aurora { position: absolute; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
        .aurora-blob { position: absolute; border-radius: 50%; filter: blur(70px); opacity: .4; will-change: transform; }
        .aurora-1 { width: 480px; height: 480px; top: -160px; right: -120px; background: radial-gradient(circle, rgba(99,102,241,0.55), transparent 70%); animation: auroraA 18s ease-in-out infinite; }
        .aurora-2 { width: 420px; height: 420px; bottom: -160px; left: -100px; background: radial-gradient(circle, rgba(139,92,246,0.45), transparent 70%); animation: auroraB 22s ease-in-out infinite; }
        .aurora-3 { width: 360px; height: 360px; top: 30%; left: 40%; background: radial-gradient(circle, rgba(56,189,248,0.22), transparent 70%); animation: auroraA 26s ease-in-out infinite reverse; }
        @keyframes auroraA { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-50px,40px) scale(1.12); } }
        @keyframes auroraB { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(60px,-30px) scale(1.15); } }
        .code-token { position: absolute; font-family: 'JetBrains Mono', monospace; font-weight: 600; color: rgba(165,180,252,0.18); user-select: none; pointer-events: none; white-space: nowrap; animation: tokenFloat linear infinite; will-change: transform, opacity; }
        @keyframes tokenFloat { 0% { transform: translateY(40px) rotate(-4deg); opacity: 0; } 12% { opacity: 1; } 88% { opacity: 1; } 100% { transform: translateY(-120px) rotate(4deg); opacity: 0; } }
        .type-caret { display: inline-block; width: 2px; height: 1.05em; background: #818CF8; vertical-align: -2px; margin-right: 3px; animation: caretBlink 1s steps(1) infinite; }
        @keyframes caretBlink { 50% { opacity: 0; } }
        .login-cta { position: relative; overflow: hidden; }

        @keyframes ctaSheen { 0%, 60% { left: -120%; } 80%, 100% { left: 140%; } }
        @media (prefers-reduced-motion: reduce) { .aurora-blob, .code-token, .type-caret, .login-cta::after { animation: none !important; } .code-token { opacity: .14; } }

        const ActionMenu = ({ items, trigger }) => {
            const [open, setOpen] = React.useState(false);
            const menuRef = React.useRef(null);

            React.useEffect(() => {
                if (!open) return;
                const handleClickOutside = (e) => {
                    if (menuRef.current && !menuRef.current.contains(e.target)) setOpen(false);
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, [open]);

            return (
                <div className="action-dropdown" ref={menuRef}>
                    <button onClick={(e) => { e.stopPropagation(); setOpen(!open); }} className="p-1 hover:bg-slate-600 rounded text-gray-400 hover:text-white transition-colors">
                        {trigger || <Icon name="moreVert" size={16} />}
                    </button>
                    {open && (
                        <div className="action-dropdown-menu">
                            {items.map((item, i) => item.divider ? (
                                <div key={i} className="action-dropdown-divider" />
                            ) : (
                                <button key={i} className={`action-dropdown-item ${item.danger ? 'danger' : ''}`} onClick={(e) => { e.stopPropagation(); setOpen(false); item.onClick(); }}>
                                    {item.icon && <span className={item.danger ? 'text-red-400' : item.color || 'text-gray-400'}>{item.icon}</span>}

                        </div>

                </div>

            async loadStudentScores(email) {
                if (!db || !email) return { exams: [], homeworks: [] };
                const safeEmail = email.replace(/[.@]/g, '_');
                try {
                    const exams = [];
                    const homeworks = [];
                    
                    // Load exam responses (using correct collection name with underscore)
                    const examSnapshot = await db.collection('exam_responses').get();
                    for (const examDoc of examSnapshot.docs) {
                        const studentDoc = await examDoc.ref.collection('students').doc(safeEmail).get();
                        if (studentDoc.exists) {
                            const data = studentDoc.data();
                            if (data.sentToStudent && data.finalGrade !== undefined) {
                                exams.push({ examId: examDoc.id, grade: data.finalGrade });
                            }
                        }
                    }
                    
                    // Load homework responses (using correct collection name with underscore)
                    const hwSnapshot = await db.collection('homework_responses').get();
                    for (const hwDoc of hwSnapshot.docs) {
                        const studentDoc = await hwDoc.ref.collection('students').doc(safeEmail).get();
                        if (studentDoc.exists) {
                            const data = studentDoc.data();
                            // Calculate homework score from AI feedback
                            let totalScore = 0;
                            let totalMax = 0;
                            Object.values(data.answers || {}).forEach(ans => {
                                if (ans.aiFeedback?.aiScore !== undefined) {
                                    totalScore += ans.aiFeedback.aiScore;
                                    totalMax += ans.aiFeedback.maxPoints || 100;
                                }
                            });
                            if (totalMax > 0) {
                                homeworks.push({ examId: hwDoc.id, grade: Math.round((totalScore / totalMax) * 100) });
                            }
                        }
                    }
                    
                    return { exams, homeworks };
                } catch (e) { console.error('Load student scores error:', e); return { exams: [], homeworks: [] }; }
            },

            async saveStudentAnswer(examId, examType, email, studentName, questionIndex, code, pasteAttempt = null, automataData = null) {
                const safeEmail = email.replace(/[.@]/g, '_');
                const collection = this.getResponseCollection(examType);
                if (!db) return false;
                try {
                    const docRef = db.collection(collection).doc(examId).collection('students').doc(safeEmail);
                    const doc = await docRef.get();
                    const existing = doc.exists ? doc.data() : {};
                    
                    // Ensure answers and pasteAttempts objects exist
                    if (!existing.answers) existing.answers = {};
                    if (!existing.pasteAttempts) existing.pasteAttempts = [];
                    
                    // Save either code or automata data
                    if (automataData) {
                        // Clean automata data - remove functions and undefined values for Firebase
                        const cleanAutomata = {
                            type: automataData.type || 'DFA',
                            states: (automataData.states || []).map(s => ({
                                id: s.id,
                                name: s.name,
                                x: s.x,
                                y: s.y,
                                isInitial: s.isInitial || false,
                                isAccepting: s.isAccepting || false
                            })),
                            transitions: (automataData.transitions || []).map(t => ({
                                id: t.id,
                                from: t.from,
                                to: t.to,
                                label: t.label || '',
                                stackPop: t.stackPop || '',
                                stackPush: t.stackPush || ''
                            }))
                        };
                        existing.answers[questionIndex] = { automata: cleanAutomata };
                    } else {
                        existing.answers[questionIndex] = { code: code || '' };
                    }
                    
                    existing.email = email;
                    existing.studentName = studentName;
                    existing.lastSaved = new Date().toISOString();
                    existing.examType = examType;
                    if (!existing.submitted) existing.submitted = false;
                    if (pasteAttempt) {
                        existing.pasteAttempts.push({
                            questionIndex,
                            content: pasteAttempt.substring(0, 500), // Limit size
                            timestamp: new Date().toISOString()
                        });
                    }
                    
                    // Clean undefined values before saving to Firebase
                    const cleanData = JSON.parse(JSON.stringify(existing, (key, value) => {
                        return value === undefined ? null : value;
                    }));
                    
                    await docRef.set(cleanData);
                    return true;
                } catch (e) { console.error('Save error:', e); return false; }
            },

                let examCount = 0;
                let homeworkCount = 0;
                
                try {
                    // Clear all exam responses (using correct collection name with underscore)
                    const examSnapshot = await db.collection('exam_responses').get();
                    for (const examDoc of examSnapshot.docs) {
                        const studentsSnapshot = await examDoc.ref.collection('students').get();
                        // Handle batch limit of 500
                        const docs = studentsSnapshot.docs;
                        for (let i = 0; i < docs.length; i += 500) {
                            const batch = db.batch();
                            docs.slice(i, i + 500).forEach(doc => batch.delete(doc.ref));
                            await batch.commit();
                        }
                        examCount += studentsSnapshot.size;
                    }
                    
                    // Clear all homework responses (using correct collection name with underscore)
                    const hwSnapshot = await db.collection('homework_responses').get();
                    for (const hwDoc of hwSnapshot.docs) {

                        // Handle batch limit of 500

                            docs.slice(i, i + 500).forEach(doc => batch.delete(doc.ref));
                            await batch.commit();
                        }
                        homeworkCount += studentsSnapshot.size;
                    }
                    
                    return { exams: examCount, homeworks: homeworkCount };

                { h: 'double — מספרים עשרוניים', p: `כשצריך שבר או נקודה עשרונית — זה הטיפוס. הוא מחזיק מספרים כמו 3.14, 92.5 או 0.001.\nלמה משמש: ממוצעים, מחירים, אחוזים, מדידות — כל דבר שאינו "עגול".\nמגבלות: הדיוק אינו מושלם. בגלל הדרך שהמחשב שומר שברים, חישוב כמו 0.1 + 0.2 עלול לצאת 0.30000000004. לכן לא משווים שני double עם == אלא בודקים אם ההפרש ביניהם זעיר. טיפ חשוב: כדי לקבל ממוצע מדויק מחלוקת שני int, "ממירים" אחד מהם ל-double עם (double).`, code: `double avg = 92.5;\ndouble price = 19.90;\ndouble mean = (double) sum / count;  // חלוקה מדויקת` },

                { h: 'String — מחרוזת טקסט', p: `מחזיק טקסט שלם: רצף של תווים, בין מרכאות כפולות. בניגוד לארבעת הקודמים, String אינו טיפוס "בסיסי" אלא אובייקט — ולכן עובדים איתו דרך מתודות (length, charAt, substring, equals).\nלמה משמש: שמות, הודעות למשתמשת, כל טקסט.\nמגבלות שחשוב לזכור: (1) להשוואה משתמשים ב-s1.equals(s2) ולעולם לא ב-== — כי == בודק מיקום בזיכרון ולא את התוכן. (2) מחרוזת אינה ניתנת לשינוי ("immutable"): כל "שינוי" באמת יוצר מחרוזת חדשה.`, code: `String name = "נעמה";\nString msg = "שלום " + name;     // חיבור מחרוזות עם +\nif (name.equals("נעמה")) { ... }  // השוואה נכונה` },
                { h: 'איזה טיפוס לבחור? וטיפוסים נוספים', p: `הכלל פשוט: מספר שלם → int · מספר עם שבר → double · כן/לא → boolean · אות בודדת → char · טקסט → String.\nלידיעה בלבד (פחות נפוץ בכיתה יא): long הוא int לטווח ענק, float הוא double "קצר" ופחות מדויק, ו-byte/short הם מספרים שלמים קטנים יותר. ברוב מבחני הבגרות מסתדרים מצוין עם חמשת הטיפוסים העיקריים שלמעלה.` },
                { h: 'השמה — איך מכניסים ערך', p: `סימן השוויון = הוא לא "שווה" מהמתמטיקה! הוא אומר: "קח את מה שמימין, ושים אותו במשתנה שמשמאל". לכן כותבים תמיד משתנה = ערך, אף פעם לא הפוך.\nאפשר גם לשנות ערך אחרי שכבר נתנו אותו — למשל age = age + 1 לוקח את הגיל הנוכחי, מוסיף לו 1, ושומר בחזרה.` },
                { h: 'קלט ופלט — לדבר עם המשתמשת', p: `פלט הוא מה שהתוכנית מציגה על המסך, עם System.out.println(...). כל קריאה כזו מדפיסה שורה ויורדת לשורה הבאה.\nקלט הוא מה שהמשתמשת מקלידה. קולטים אותו עם Scanner: למספר שלם משתמשים ב-nextInt(), ולמחרוזת ב-next() או nextLine(). כך התוכנית יכולה להגיב למה שכותבים לה.`, code: `Scanner sc = new Scanner(System.in);\nSystem.out.println("מה שמך?");\nString name = sc.next();\nSystem.out.println("שלום " + name);` },
            ],
            'תנאים': [
                { h: 'תוכנית שיודעת להחליט', p: `עד עכשיו התוכנית רצה ישר מלמעלה למטה. אבל החיים מלאים החלטות: אם ירד גשם — קחי מטריה, אחרת — אל תיקחי. תנאי (if) נותן לתוכנית בדיוק את היכולת הזו: לבדוק משהו, ולפי התשובה לבחור מה לעשות.` },
                { h: 'איך כותבים תנאי', p: `כותבים את המילה if, ובתוך סוגריים עגולים שאלה שהתשובה לה היא "כן" או "לא" (אמת או שקר). אם התשובה אמת — רץ הקוד שבתוך הסוגריים המסולסלים. אפשר להוסיף else שירוץ במקרה ההפוך.`, code: `int grade = 56;\nif (grade >= 56) {\n    System.out.println("עברת!");\n} else {\n    System.out.println("לא עברת");\n}` },
                { h: 'אופרטורים של השוואה', p: `כדי לשאול שאלות משתמשים בסימנים מיוחדים:\n==  שווה?   (שימי לב: שני סימני שווה! סימן אחד = הוא השמה)\n!=  שונה?\n>   גדול מ   ·   <   קטן מ   ·   >=   גדול-או-שווה   ·   <=   קטן-או-שווה\nהטעות הכי נפוצה בבגרות היא לכתוב = במקום == בתוך תנאי — שימי לב לזה!` },
                { h: 'לחבר כמה תנאים יחד', p: `לפעמים צריך שכמה דברים יתקיימו ביחד, או לפחות אחד מהם:\n&&  פירושו "וגם" — שני הצדדים חייבים להיות נכונים.\n||  פירושו "או" — מספיק שצד אחד נכון.\nלמשל: if (age >= 18 && hasLicense) — גם בת 18 ומעלה, וגם יש רישיון. אם תרצי "מ-90 ומעלה או בדיוק 100" תכתבי (g >= 90 || g == 100).` },
                { h: 'כמה אפשרויות? else if', p: `כשיש יותר משתי אפשרויות, משרשרים else if. המחשב בודק אותם מלמעלה למטה, נעצר בראשון שמתאים, ומדלג על השאר. כך בונים, למשל, המרת ציון מספרי לאות.`, code: `if (g >= 90)      System.out.println("מצוין");\nelse if (g >= 70) System.out.println("טוב");\nelse if (g >= 56) System.out.println("עובר");\nelse              System.out.println("נכשל");` },
                { h: 'תנאים מקוננים (if בתוך if)', p: `אפשר לשים תנאי בתוך תנאי — קודם בודקים שאלה כללית, ורק אם היא נכונה שואלים שאלה נוספת. למשל: קודם לבדוק אם המספר חיובי, ורק אז לבדוק אם הוא זוגי. כך מפרקים החלטה מורכבת לשלבים פשוטים.`, code: `if (n > 0) {\n    if (n % 2 == 0) System.out.println("חיובי וזוגי");\n    else            System.out.println("חיובי ואי-זוגי");\n}` },
                { h: 'הסדר חשוב — מלכודת נפוצה', p: `בשרשרת else if המחשב עוצר בתנאי הראשון שמתאים. לכן אם תכתבי קודם if (g >= 56) ורק אחר כך else if (g >= 90), אף תלמידה לא תקבל "מצוין" — כי 95 כבר נתפס בתנאי הראשון! הכלל: מתחילים מהתנאי הגבוה/המחמיר ביותר ויורדים.` },
                { h: 'switch — בחירה לפי ערך', p: `כשבודקים משתנה אחד מול כמה ערכים מדויקים (כמו מספר היום בשבוע), switch קריא יותר משרשרת else if. כל case הוא אפשרות, break מסיים אותה, ו-default הוא "כל מקרה אחר". שכחת break? הביצוע "זולג" ל-case הבא — מלכודת מפורסמת.`, code: `switch (day) {\n    case 1: System.out.println("ראשון"); break;\n    case 7: System.out.println("שבת"); break;\n    default: System.out.println("יום חול");\n}` },
            ],
            'לולאות': [
                { h: 'למה צריך לולאות?', p: `נניח שצריך להדפיס "שלום" מאה פעמים. לכתוב מאה שורות? בזבוז ענק. לולאה אומרת למחשב: "חזור על הפעולה הזו שוב ושוב כל עוד יש צורך". כך שלוש שורות קוד יכולות לעשות עבודה של מאות.` },
                { h: 'לולאת for — כשיודעים כמה פעמים', p: `for מושלמת כשידוע מראש מספר החזרות. יש לה שלושה חלקים בתוך הסוגריים, מופרדים בנקודה-פסיק:\n1) התחלה — int i = 1 (יוצרים מונה ומאתחלים אותו)\n2) תנאי המשך — i <= 10 (כל עוד נכון, ממשיכים)\n3) קפיצה — i++ (מה קורה בסוף כל סיבוב, כאן: מוסיפים 1)`, code: `for (int i = 1; i <= 5; i++) {\n    System.out.println("סיבוב מספר " + i);\n}` },
                { h: 'לולאת while — כל עוד נכון', p: `while פשוטה יותר: יש לה רק תנאי. היא ממשיכה לרוץ כל עוד התנאי נכון, ועוצרת ברגע שהוא הופך לשקר. משתמשים בה כשלא יודעים מראש כמה סיבובים יידרשו — למשל "תמשיכי לחלק ב-2 עד שמגיעים ל-1".`, code: `int n = 80, count = 0;\nwhile (n > 1) {\n    n = n / 2;\n    count++;\n}` },
                { h: 'משתנה צובר — הדפוס החשוב ביותר', p: `רוב הלולאות בבגרות בנויות סביב "משתנה צובר": משתנה שמתחילים אותו בערך התחלתי (0 לחיבור, 1 לכפל), ובכל סיבוב מעדכנים אותו. בסוף הלולאה הוא מחזיק את התשובה הסופית — סכום, מכפלה, ספירה או מקסימום.` },
                { h: 'זהירות: לולאה אינסופית', p: `אם התנאי לעולם לא הופך לשקר — הלולאה לא תיעצר אף פעם, והתוכנית "תיתקע". זה קורה למשל אם שוכחים את i++, או כותבים while (n > 1) אבל אף פעם לא משנים את n בתוך הלולאה. תמיד ודאי שמשהו בתוך הלולאה מקדם אותך לעבר העצירה.` },
                { h: 'for מול while — מתי כל אחת', p: `הכלל פשוט: אם ידוע מראש כמה פעמים לחזור (10 ציונים, אורך מערך) — for. אם לא יודעים והעצירה תלויה בתנאי שמשתנה תוך כדי (כל עוד המשתמשת מקלידה, עד שמגיעים ל-1) — while. שתיהן יכולות לעשות אותו דבר, אבל כל אחת קריאה יותר במצב שלה.` },
                { h: 'לולאות מקוננות', p: `לולאה בתוך לולאה: הפנימית מסיימת סבב שלם על כל סבב של החיצונית. משתמשים בזה לטבלאות, מטריצות, ולוחות. שימי לב: אם החיצונית רצה 3 פעמים והפנימית 4 — הקוד בפנים ירוץ 12 פעמים בסך הכל.`, code: `for (int i = 1; i <= 3; i++) {\n    for (int j = 1; j <= 4; j++) {\n        System.out.print(i * j + " ");\n    }\n    System.out.println();\n}` },
                { h: 'break ו-continue', p: `בתוך לולאה: break עוצר את הלולאה מיד ויוצא ממנה לגמרי (למשל ברגע שמצאנו את מה שחיפשנו). continue מדלג רק על שארית הסיבוב הנוכחי וממשיך לסיבוב הבא. שתיהן כלים חזקים — אבל כדאי להשתמש בהן במשורה כדי שהקוד יישאר ברור.` },
                { h: 'while לעומק — שלושת המרכיבים', p: `ב-for שלושת החלקים (אתחול, תנאי, קפיצה) כתובים יחד בשורה אחת. ב-while הם מפוזרים, ואת חייבת לזכור את כולם בעצמך: (1) אתחול — לפני הלולאה מכינים את המשתנה. (2) תנאי — בתוך הסוגריים, נבדק לפני כל סיבוב. (3) עדכון — בתוך גוף הלולאה, מקרב אותנו לעצירה. אם שכחת את העדכון — הלולאה אינסופית!`, code: `int n = 16;                 // 1. אתחול\nwhile (n > 1) {             // 2. תנאי\n    System.out.println(n);\n    n = n / 2;             // 3. עדכון\n}` },
                { h: 'מתי while ומתי for — מדריך החלטה', p: `השאלה היחידה שצריך לשאול: "האם אני יודעת מראש כמה פעמים?". אם כן (לרוץ על מערך באורך n, להדפיס 10 שורות, לעבור על תווי מחרוזת) — for, כי המונה והגבול ברורים. אם לא (לקרוא קלט עד שמקלידים 0, לחלק ב-2 עד שמגיעים ל-1, לטייל על רשימה מקושרת עד null) — while, כי העצירה תלויה בתנאי שמתגלה תוך כדי. כלל אצבע: מערכים ומספרים ידועים → for · קלט, חיפוש עד תנאי, ומבני נתונים מקושרים → while.` },
                { h: 'דוגמה שממחישה את ההבדל', p: `אותו דבר — סכום 1 עד 5 — בשתי הצורות. ב-for הכול בשורה אחת ומסודר. ב-while צריך לזכור i=1 לפני, ו-i++ בתוך. כאן for ברורה יותר כי מספר החזרות ידוע. אבל אם היינו צריכים "סכמי מספרים עד שהסכום עובר 100" — לא יודעים כמה סיבובים, ואז while הכרחית.`, code: `int sum = 0;\nfor (int i = 1; i <= 5; i++) sum += i;   // for\n\nint s = 0, i = 1;\nwhile (i <= 5) { s += i; i++; }          // while` },
            ],
            'מערכים': [
                { h: 'הבעיה שמערך פותר', p: `נניח שצריך לשמור 30 ציונים. לפתוח 30 משתנים נפרדים (grade1, grade2, ...) זה סיוט. מערך הוא פתרון אלגנטי: משתנה אחד שמכיל שורה שלמה של תאים מאותו סוג, אחד ליד השני.` },
                { h: 'אינדקס — לכל תא יש מספר', p: `לכל תא במערך יש "כתובת" — מספר מקום שנקרא אינדקס. נקודה קריטית: הספירה מתחילה מ-0, לא מ-1! כך שבמערך עם 5 תאים, האינדקסים הם 0,1,2,3,4. התא הראשון הוא arr[0], והאחרון הוא arr[arr.length - 1].`, code: `int[] grades = {85, 92, 78, 96, 88};\nSystem.out.println(grades[0]);  // 85 — הראשון\nSystem.out.println(grades[4]);  // 88 — האחרון\nSystem.out.println(grades.length); // 5 — כמה תאים` },
                { h: 'מעבר על מערך עם לולאה', p: `הצמד הכי נפוץ בבגרות הוא מערך + לולאת for. הלולאה רצה מ-0 ועד אורך המערך (לא כולל), ובכל סיבוב ניגשת לתא הבא דרך arr[i]. כך אפשר לסכם, לספור, למצוא מקסימום או לחפש ערך — תמיד באותו דפוס.`, code: `for (int i = 0; i < grades.length; i++) {\n    System.out.println(grades[i]);\n}` },
                { h: 'שגיאת החריגה מהתחום', p: `אם תנסי לגשת ל-arr[5] במערך של 5 תאים (שהאינדקס המקסימלי בו הוא 4) — התוכנית תקרוס עם שגיאת ArrayIndexOutOfBounds. לכן התנאי בלולאה הוא תמיד i < arr.length (קטן ממש), אף פעם לא i <= arr.length.` },
                { h: 'שתי דרכים ליצור מערך', p: `דרך ראשונה: כשכבר יודעים את הערכים — כותבים אותם בתוך סוגריים מסולסלים. דרך שנייה: כשרוצים מערך ריק בגודל מסוים — משתמשים ב-new, וכל התאים מתחילים ב-0 (או ב-null למחרוזות). בשתיהן הגודל נקבע בהתחלה ולא משתנה.`, code: `int[] a = {85, 92, 78};        // ערכים ידועים\nint[] b = new int[5];          // 5 תאים, כולם 0` },
                { h: 'דפוסים נפוצים בבגרות', p: `כמעט כל שאלת מערך היא וריאציה על אותם דפוסים, וכולם משתמשים באותו מעבר for: סכום (צוברים ל-sum), ממוצע (סכום חלקי האורך), מקסימום/מינימום (שומרים את הקיצוני שראינו), ספירה לפי תנאי (מונה), וחיפוש (דגל boolean). מי שמכירה את החמישה — פותרת כמעט הכל.` },
                { h: 'מערך דו-ממדי (מטריצה)', p: `מערך יכול להיות גם טבלה — שורות ועמודות, כמו לוח שחמט. ניגשים לתא לפי שתי כתובות: m[i][j] (שורה i, עמודה j). עוברים עליו עם לולאה בתוך לולאה: החיצונית על השורות, הפנימית על העמודות.`, code: `int[][] m = new int[2][3];\nfor (int i = 0; i < m.length; i++)\n    for (int j = 0; j < m[i].length; j++)\n        m[i][j] = i + j;` },
                { h: 'סגנון מעבר 1 — מעבר פשוט (קדימה)', p: `המעבר הבסיסי ביותר: מתחילים מאינדקס 0 ומתקדמים אחד-אחד עד הסוף. זהו "סוס העבודה" — רוב הדפוסים בנויים עליו. שימי לב לשלושת החלקים של ה-for: התחלה i=0, תנאי i<arr.length, וקידום i++. בכל סיבוב i עולה ב-1 ו-arr[i] הוא התא הנוכחי.`, code: `for (int i = 0; i < arr.length; i++) {\n    // arr[i] הוא התא הנוכחי\n    System.out.println(arr[i]);\n}` },
                { h: 'סגנון מעבר 2 — מהסוף להתחלה', p: `לפעמים צריך לעבור הפוך: מהתא האחרון (אינדקס length-1) אל הראשון (0). משתמשים בזה להדפסה הפוכה, או כשמשנים את המערך ולא רוצים "לדרוך" על תאים שעוד לא עברנו. שימי לב: מתחילים מ-length-1, התנאי הוא i>=0, והקידום הוא i-- (יורד).`, code: `for (int i = arr.length - 1; i >= 0; i--) {\n    System.out.println(arr[i]);\n}` },
                { h: 'סגנון מעבר 3 — בקפיצות', p: `אפשר לקפוץ ביותר מ-1 בכל סיבוב. למשל i += 2 עובר רק על האינדקסים הזוגיים (0,2,4...) — שימושי לעבד "כל שני" איברים. שינוי הקפיצה פותח דפוסים רבים: דילוג, עיבוד קבוצות, ועוד.`, code: `// רק התאים במקומות זוגיים\nfor (int i = 0; i < arr.length; i += 2) {\n    System.out.println(arr[i]);\n}` },
                { h: 'סגנון מעבר 4 — שני מצביעים', p: `טכניקה חזקה: שני אינדקסים שזזים זה לקראת זה — אחד מההתחלה (left) ואחד מהסוף (right). משתמשים בזה כדי להפוך מערך במקום, לבדוק אם מערך הוא פלינדרום, ועוד. בכל סיבוב left עולה ו-right יורד, עד שהם נפגשים באמצע.`, code: `int left = 0, right = arr.length - 1;\nwhile (left < right) {\n    // עובדים על arr[left] ו-arr[right]\n    left++;\n    right--;\n}` },
                { h: 'דפוס: סכום וממוצע', p: `הדפוס הקלאסי ביותר — "משתנה צובר". פותחים sum=0 לפני הלולאה, ובכל סיבוב מוסיפים את התא הנוכחי. בסוף sum מחזיק את הסכום הכולל, והממוצע הוא הסכום חלקי מספר התאים. חשוב: כדי לקבל ממוצע מדויק עם שבר, ממירים ל-double.`, code: `int sum = 0;\nfor (int i = 0; i < arr.length; i++)\n    sum += arr[i];\ndouble avg = (double) sum / arr.length;` },
                { h: 'דפוס: מציאת מקסימום', p: `מתחילים בהנחה שהתא הראשון הוא הגדול ביותר (max = arr[0]). עוברים על השאר, ובכל פעם שמוצאים תא גדול יותר — מעדכנים את max. בסוף max מחזיק את הערך הגדול ביותר. אותו רעיון בדיוק עובד למינימום (רק עם השוואה הפוכה).`, code: `int max = arr[0];\nfor (int i = 1; i < arr.length; i++)\n    if (arr[i] > max)\n        max = arr[i];` },
                { h: 'דפוס: ספירה לפי תנאי', p: `רוצים לדעת כמה תאים מקיימים תנאי? פותחים מונה count=0, עוברים על המערך, ובכל תא שמקיים את התנאי מגדילים את המונה ב-1. למשל לספור כמה ציונים עוברים (>=56), או כמה מספרים זוגיים.`, code: `int count = 0;\nfor (int i = 0; i < arr.length; i++)\n    if (arr[i] >= 56)\n        count++;` },
                { h: 'דפוס: חיפוש ערך', p: `כדי לבדוק אם ערך קיים במערך, עוברים תא-תא ומשווים. אם מצאנו — מסמנים דגל boolean (או שומרים את האינדקס) ואפשר לעצור עם break. אם סיימנו את הלולאה בלי למצוא — הערך לא קיים. זהו "חיפוש לינארי".`, code: `boolean found = false;\nfor (int i = 0; i < arr.length; i++)\n    if (arr[i] == target) {\n        found = true;\n        break;  // אין טעם להמשיך\n    }` },
                { h: 'שאלות העמקה לדוגמה', p: `כדי באמת לשלוט במערכים, כדאי להתאמן על שאלות מסוגים שונים (כמו באתרים GeeksforGeeks ו-HackerRank):\n• היפוך מערך במקום (שני מצביעים).\n• האם המערך ממוין? (השוואת כל תא לשכן שלו).\n• מציאת השני בגודלו.\n• ספירת הופעות של ערך.\n• חיבור שני מערכים איבר-איבר.\n• מציאת הפרש בין המקסימום למינימום.\nשימי לב: כמעט כולן הן שילוב של דפוס מעבר + משתנה עוזר. ההדגמה האינטראקטיבית למטה מראה כמה מהן צעד-אחר-צעד.` },
            ],
            'מחרוזות': [
                { h: 'מחרוזת = רצף של תווים', p: `מחרוזת (String) היא פשוט טקסט: רצף של תווים בזה אחר זה. המילה "Java" היא מחרוזת באורך 4: התו במקום 0 הוא J, במקום 1 הוא a, וכן הלאה. בדיוק כמו מערך — הספירה מתחילה מ-0.` },
                { h: 'המתודות החשובות', p: `על מחרוזת לא ניגשים עם סוגריים מרובעים, אלא קוראים ל"מתודות" (פעולות מובנות) עם נקודה:\nlength() — כמה תווים יש\ncharAt(i) — איזה תו נמצא במקום i\nsubstring(a, b) — חותכת חתיכה מהמחרוזת, מ-a עד b (לא כולל את b)\nindexOf("x") — באיזה מקום מופיע "x" לראשונה (או 1- אם לא נמצא)`, code: `String s = "Java";\nSystem.out.println(s.length());     // 4\nSystem.out.println(s.charAt(0));    // J\nSystem.out.println(s.substring(1,3)); // av` },
                { h: 'מעבר תו-תו', p: `כדי לעבד מחרוזת רצים עליה בלולאה מ-0 עד s.length(), ובכל סיבוב לוקחים את התו הנוכחי עם s.charAt(i). זה בדיוק כמו מעבר על מערך — רק שבמקום arr[i] כותבים s.charAt(i). כך סופרים אותיות, הופכים מחרוזת, או בודקים אם היא פלינדרום.` },
                { h: 'אזהרה: השוואת מחרוזות', p: `כדי לבדוק אם שתי מחרוזות זהות אסור להשתמש ב-==! הסימן == בודק אם זה אותו מקום בזיכרון, לא אם הטקסט זהה. תמיד משתמשים ב-s1.equals(s2) — שמחזיר אמת אם התוכן זהה. זו אחת הטעויות הקלאסיות בבגרות.` },
                { h: 'עוד מתודות שימושיות', p: `מעבר ל-length ו-charAt יש עוד פעולות נפוצות: indexOf("x") מחזירה היכן מופיע "x" (או 1- אם לא קיים), contains בודקת אם תת-מחרוזת קיימת, toUpperCase/toLowerCase משנות אותיות גדולות/קטנות, ו-trim מסירה רווחים מההתחלה והסוף. כולן מחזירות ערך — לא משנות את המקור.`, code: `String s = "Hello";\nSystem.out.println(s.indexOf("l"));     // 2\nSystem.out.println(s.toUpperCase());   // HELLO` },
                { h: 'אי-שינוי (immutable) והמרות', p: `מחרוזת אי אפשר לשנות "במקום" — כל פעולה מחזירה מחרוזת חדשה, אז חייבים לשמור אותה: s = s.toUpperCase(). להמרות: Integer.parseInt("42") הופך טקסט למספר, ו-"" + 42 הופך מספר לטקסט. תו אפשר להוסיף למחרוזת עם +.` },
                { h: 'משימות קלאסיות', p: `הדפוסים שחוזרים במבחנים: ספירת אות/תו (מעבר + מונה), היפוך מחרוזת (בונים חדשה מהסוף להתחלה), ובדיקת פלינדרום (משווים תו מההתחלה מול תו מהסוף, עד האמצע). כולם נשענים על אותו מעבר charAt בלולאה.`, code: `String rev = "";\nfor (int i = s.length() - 1; i >= 0; i--)\n    rev += s.charAt(i);   // היפוך` },
            ],
            'מחלקות ואובייקטים': [
                { h: 'מחלקה היא שבלונה', p: `עד עכשיו עבדנו עם מספרים ומחרוזות. אבל איך מתארים "תלמידה" שיש לה גם שם וגם ציון? מחלקה (class) היא שבלונה — תבנית שמתארת מאיזה חלקים בנוי דבר מסוים, ומה הוא יודע לעשות. למשל מחלקה Student מתארת שלכל תלמידה יש שם וציון.` },
                { h: 'אובייקט הוא מופע אמיתי', p: `המחלקה היא רק התבנית — כמו שרטוט של בית. אובייקט הוא בית אמיתי שבנו לפי השרטוט. מאותה מחלקה Student אפשר ליצור הרבה אובייקטים: נעמה, תהילה, שרה — לכל אחת אותם סוגי תכונות, אבל ערכים משלה. יוצרים אובייקט עם המילה new.`, code: `Student a = new Student("נעמה", 95);\nStudent b = new Student("שרה", 88);` },
                { h: 'תכונות, בנאי וגישה', p: `תכונות (משתנים בתוך המחלקה) מסומנות כמעט תמיד private — כלומר מוסתרות מבחוץ, כדי לשמור על המידע. הבנאי (constructor) הוא פעולה מיוחדת בשם המחלקה, שרצה ברגע היצירה וממלאת את התכונות בערכים ההתחלתיים. המילה this מציינת "האובייקט הנוכחי הזה".` },
                { h: 'get ו-set', p: `כיוון שהתכונות private, העולם החיצון ניגש אליהן דרך פעולות מיוחדות: getName() מחזירה את השם (קריאה), ו-setGrade(90) משנה את הציון (כתיבה). כך המחלקה שולטת בדיוק מה מותר לקרוא ומה מותר לשנות — וזה הלב של "תכנות מונחה עצמים".` },
                { h: 'הרעיון המופשט מול המימוש', p: `דרך יפה לחשוב על מחלקה: היא כמו "אידאה" — רעיון מושלם ומופשט של דבר, שעדיין אין לו מימוש ממשי בעולם. המחלקה Student היא הרעיון "תלמידה" באופן כללי: לכל תלמידה יש שם וציון, וכל תלמידה יודעת להציג את עצמה. אבל הרעיון לבדו לא תופס מקום ולא מחזיק נתונים — הוא רק תבנית. רק כשמממשים אותו (יוצרים אובייקט) הוא "יורד לעולם" ומקבל ערכים קונקרטיים. מאותו רעיון אחד אפשר לממש אינסוף עותקים — נעמה, שרה, תהילה — כל אחת ייצוג ממשי ושונה של אותה אידאה.` },
                { h: 'דוגמאות לאידאה ומימושים שלה', p: `כדי שזה יישב טוב, הנה כמה זוגות של "אידאה" (מחלקה) והמימושים שלה (אובייקטים):\n• אידאת "כלב" — לכל כלב יש גזע, שם וגיל. המימושים: רקסי (לברדור, בן 3), לונה (פודל, בת 1). אותה אידאה, כלבים שונים לגמרי.\n• אידאת "מכונית" — לכל מכונית יש יצרן, צבע ומהירות. המימושים: טויוטה אדומה, מאזדה כחולה.\n• אידאת "ספר" — כותרת, מחבר ומספר עמודים. המימושים: כל ספר ממשי על המדף.\nשימי לב לדפוס: האידאה תמיד מתארת אילו תכונות יש (בלי ערכים), והמימוש נותן לתכונות האלה ערכים קונקרטיים.` },
                { h: 'דוגמה מורחבת — תלמיד עם 5 תכונות', p: `נחזור ל-Student, הפעם עשיר יותר: לכל תלמיד שם, גיל, עיר, ציון ותחביב. זו עדיין רק האידאה — תבנית ריקה. כשנכתוב new ניצור מימושים ממשיים: אברהם (20, פתח תקווה, 95, כדורגל), שרה (17, ירושלים, 88, ציור), דוד (19, חיפה, 100, גיטרה). שלושתם "בנים" של אותה אידאה אחת — אבל כל אחד ישות עצמאית עם הערכים שלו. הבנאי הוא ש"מוליד" כל בן: הוא מקבל את הערכים וממלא אותם תכונה-תכונה. צפי בהדגמה האינטראקטיבית למטה כדי לראות בדיוק איך כל שורת קוד בונה בן חדש, שדה אחרי שדה.`, code: `public class Student {\n    private String name;\n    private int age;\n    private String city;\n    private int grade;\n    private String hobby;\n}\nStudent a = new Student("אברהם", 20, "פתח תקווה", 95, "כדורגל");\nStudent b = new Student("שרה", 17, "ירושלים", 88, "ציור");` },
                { h: 'האנטומיה של מחלקה', p: `מחלקה מורכבת משלושה חלקים קבועים: (1) תכונות — המשתנים שמתארים מה יש לאובייקט (שם, ציון). (2) בנאי — נוסחת ההקמה, פעולה ששמה כשם המחלקה ורצה ברגע היצירה כדי למלא את התכונות. (3) מתודות — הפעולות שהאובייקט יודע לבצע. הנה התבנית המלאה:`, code: `public class Student {
    private String name;   // תכונה
    private int grade;     // תכונה

    public Student(String name, int grade) {  // בנאי
        this.name = name;
        this.grade = grade;
    }
    public int getGrade() { return grade; }   // מתודה
}` },
                { h: 'this — "האובייקט הזה"', p: `בתוך הבנאי כתבנו this.name = name. למה? כי יש שני "name": הפרמטר שהגיע מבחוץ, והתכונה של האובייקט. המילה this אומרת "התכונה של האובייקט הנוכחי הזה" — כך מבדילים ביניהם. בכל פעם שיוצרים אובייקט חדש, this מצביע בדיוק על העותק שנוצר עכשיו, וכל אובייקט מקבל עותק נפרד משלו של התכונות.` },
                { h: 'כל אובייקט — עולם נפרד', p: `זה הלב של העניין: כשכותבים new Student(...) פעמיים, נוצרים שני אובייקטים נפרדים לחלוטין בזיכרון, כל אחד עם הערכים שלו. שינוי הציון של נעמה לא נוגע בשרה בכלל. הם חולקים את אותה תבנית (אותם סוגי תכונות ואותן מתודות), אבל הנתונים שלהם עצמאיים — בדיוק כמו ששני בתים שנבנו מאותו שרטוט הם שני בתים שונים.`, code: `Student a = new Student("נעמה", 95);
Student b = new Student("שרה", 88);
a.setGrade(100);   // משנה רק את נעמה
// b.getGrade() עדיין 88` },
                { h: 'אנקפסולציה — למה private', p: `התכונות מסומנות private ("מוסתרות") כדי שאף אחד מבחוץ לא ישנה אותן בטעות לערך לא חוקי (למשל ציון 500). במקום זה, הגישה עוברת דרך מתודות get ו-set שהמחלקה שולטת בהן — וכך אפשר גם לבדוק תקינות לפני שינוי. העיקרון הזה, שהאובייקט "שומר על הנתונים שלו", נקרא אנקפסולציה והוא יסוד בתכנות מונחה עצמים.` },
            ],
            'רשימות מקושרות': [
                { h: 'למה לא פשוט מערך?', p: `במערך הגודל קבוע מראש, ולהוסיף איבר באמצע פירושו להזיז המון תאים. רשימה מקושרת פותרת זאת: היא בנויה מחוליות נפרדות, וכל חוליה "מחזיקה ביד" של הבאה אחריה. הגודל גמיש לחלוטין — מוסיפים ומורידים חוליות בקלות.` },
                { h: 'חוליה (Node)', p: `כל חוליה היא אובייקט קטן עם שני חלקים: הערך עצמו (getValue), וחץ — מצביע — לחוליה הבאה (getNext). החוליה האחרונה מצביעה ל-null, שזה הסימן ל"סוף הרשימה". שרשרת של חוליות כאלה היא הרשימה.`, code: `// בונים שרשרת 1 ← 2 ← 3\nNode<Integer> head = new Node<>(1);\nhead.setNext(new Node<>(2));\nhead.getNext().setNext(new Node<>(3));` },
                { h: 'מעבר על רשימה', p: `כאן אין אינדקסים. במקום זה משתמשים ב"מצביע מטייל": מתחילים מהראש (pos = head), ובכל סיבוב קופצים לחוליה הבאה עם pos = pos.getNext(). ממשיכים כל עוד pos != null. זה הדפוס שחוזר כמעט בכל שאלת רשימה בבגרות.`, code: `Node<Integer> pos = head;\nwhile (pos != null) {\n    System.out.println(pos.getValue());\n    pos = pos.getNext();\n}` },
                { h: 'הכלל הזהב: לא לאבד את הראש', p: `ברגע שמזיזים את pos קדימה — אין דרך לחזור אחורה ברשימה מקושרת רגילה! לכן שומרים תמיד מצביע נפרד לראש הרשימה (head), ומטיילים רק עם משתנה עזר (pos). אם תאבדי את הראש — איבדת את כל הרשימה.` },
                { h: 'ציור: איך רשימה מקושרת נראית', p: `הכי קל להבין רשימה מקושרת דרך ציור. כל חוליה היא קופסה עם שני תאים: משמאל הערך, ומימין חץ שמצביע על החוליה הבאה. החוליה האחרונה מצביעה על null — סימן הסוף. head הוא מצביע חיצוני ששומר היכן הרשימה מתחילה. בלי head — אין לנו דרך למצוא את הרשימה בכלל!`, code: `   head\n    |\n    v\n  [ 1 | •-]--> [ 2 | •-]--> [ 3 | • ]--> null` },
                { h: 'head ו-pos — למה צריך שני מצביעים', p: `כדי לטייל על הרשימה אנחנו מזיזים מצביע קדימה (pos = pos.getNext()). אבל אם נזיז את head עצמו — נאבד את תחילת הרשימה לנצח, כי ברשימה מקושרת רגילה אי אפשר לחזור אחורה! לכן הכלל הזהב: head תמיד נשאר במקום ושומר על הראש, ולטיולים יוצרים מצביע-עזר חדש (pos) שמתחיל מ-head וזז קדימה.`, code: `Node<Integer> pos = head;   // pos מתחיל מהראש\nwhile (pos != null) {\n    pos = pos.getNext();    // רק pos זז — head נשאר!\n}` },
                { h: 'הוספת חוליה בראש הרשימה', p: `להוסיף חוליה חדשה בהתחלה זה שני צעדים: (1) מחברים את החוליה החדשה כך שתצביע על הראש הנוכחי. (2) מעדכנים את head שיצביע על החדשה. הסדר קריטי! אם קודם נשנה את head — נאבד את שאר הרשימה.`, code: `Node<Integer> n = new Node<Integer>(0);\nn.setNext(head);   // 1. החדשה מצביעה על הראש הישן\nhead = n;          // 2. head מצביע על החדשה\n// התוצאה: 0 -> 1 -> 2 -> 3 -> null` },
                { h: 'הסרת חוליה והשוואה למערך', p: `ברשימה מקושרת, להסיר חוליה זה פשוט "לדלג" עליה: מחברים את החוליה שלפניה ישירות לחוליה שאחריה. אין צורך להזיז שום דבר אחר. זה היתרון הגדול על מערך — במערך, מחיקת איבר באמצע דורשת להזיז את כל מה שאחריו. החיסרון: ברשימה אין גישה ישירה לפי אינדקס — תמיד צריך לטייל מההתחלה.`, code: `prev.setNext( prev.getNext().getNext() );\n// [1] -> [2] -> [3]   הופך ל   [1] -> [3]` },

            'תור ומחסנית': [
                { h: 'מבני נתונים עם "חוקים"', p: `תור ומחסנית הם שני מבנים שמחזיקים אוסף של ערכים — אבל עם חוק נוקשה לגבי הסדר שבו נכנסים ויוצאים. ההבדל ביניהם הוא בדיוק החוק הזה, וזה מה שהופך כל אחד למתאים למשימות שונות.` },

                { h: 'מחסנית (Stack) — LIFO', p: `מחסנית היא ההפך — כמו ערימת צלחות: מניחים צלחת על צלחת, וכשמרימים — לוקחים את העליונה, זו שהונחה אחרונה (Last In First Out). מוסיפים עם push(x) ומוציאים עם pop(). מצוין כדי להפוך סדר, או לבדוק התאמת סוגריים.`, code: `Stack<Integer> s = new Stack<>();\ns.push(1);\ns.push(2);\ns.pop();  // מוציא 2 — נכנס אחרון` },
                { h: 'איך עוברים על מבנה כזה?', p: `אין כאן אינדקס וגם אין getNext. הדרך היחידה "לראות" את הערכים היא להוציא אותם אחד-אחד בלולאה, כל עוד המבנה לא ריק: while (!s.isEmpty()) ובתוכה s.pop(). שימי לב — אחרי שעברת ככה, המבנה התרוקן! אם צריך לשמור את הנתונים, מעבירים אותם למבנה עזר תוך כדי.` },
                { h: 'הפעולות של תור — בפירוט', p: `לתור יש ארבע פעולות בסיס: insert(x) מוסיף את x בסוף התור (בזנב); remove() מוציא ומחזיר את הראשון (מהראש); head() מציץ בראשון בלי להוציא אותו; ו-isEmpty() בודק אם התור ריק. שימי לב להבדל: head() רק "מסתכל", remove() באמת מוציא. הוספה תמיד בקצה אחד (זנב), הוצאה תמיד מהקצה השני (ראש) — וזה בדיוק מה שיוצר את חוק FIFO.`, code: `Queue<Integer> q = new Queue<>();\nq.insert(10);   // [10]\nq.insert(20);   // [10, 20]\nq.head();       // 10 (רק מציץ)\nq.remove();     // מוציא 10 → [20]` },
                { h: 'הפעולות של מחסנית — בפירוט', p: `למחסנית יש ארבע פעולות מקבילות, אבל הכול קורה בקצה אחד — ה"ראש" (top): push(x) מניח את x למעלה; pop() מוציא ומחזיר את העליון; top() מציץ בעליון בלי להוציא; ו-isEmpty() בודק ריקות. כיוון שגם הדחיפה וגם השליפה הן מאותו קצה — מי שנכנס אחרון יוצא ראשון (LIFO).`, code: `Stack<Integer> s = new Stack<>();\ns.push(10);   // [10]\ns.push(20);   // [10, 20]  (20 למעלה)\ns.top();      // 20 (רק מציץ)\ns.pop();      // מוציא 20 → [10]` },
                { h: 'מתי בוחרים תור ומתי מחסנית?', p: `הכלל פשוט ותלוי בשאלה "מי צריך לצאת ראשון?". אם רוצים לשמר את סדר ההגעה — תור: הדמיית תור לקופה, משימות להדפסה, חיפוש לרוחב (BFS). אם רוצים להפוך סדר או לחזור אחורה — מחסנית: בדיקת התאמת סוגריים, כפתור "בטל" (undo), היסטוריית דפדפן, וקריאות רקורסיה (המחשב עצמו משתמש במחסנית!). שאלי תמיד: "מה צריך לצאת ראשון — הישן או החדש?"` },
                { h: 'דוגמה קלאסית — היפוך עם מחסנית', p: `מחסנית הופכת סדר באופן טבעי. אם דוחפים 1,2,3 ואז שולפים — מקבלים 3,2,1. כך אפשר להפוך רשימה, מחרוזת או תור: דוחפים הכול פנימה, ואז שולפים הכול החוצה — והסדר מתהפך. זה דפוס נפוץ מאוד בבגרות.`, code: `// הופכים את 1,2,3\ns.push(1); s.push(2); s.push(3);\nwhile (!s.isEmpty())\n    System.out.print(s.pop()); // 3 2 1` },
            ],
            'רקורסיה': [
                { h: 'פונקציה שקוראת לעצמה', p: `רקורסיה היא רעיון שנשמע מוזר בהתחלה: פונקציה שבתוכה קוראת... לעצמה. דמייני בובת מטריושקה — כל בובה מכילה בובה קטנה יותר, עד שמגיעים לקטנטנה שכבר לא נפתחת. רקורסיה פותרת בעיה גדולה על ידי פתרון גרסה קטנה יותר של אותה בעיה, שוב ושוב.` },
                { h: 'שני חלקים הכרחיים', p: `לכל פונקציה רקורסיבית חייבים להיות שני חלקים:\n1) תנאי עצירה (Base Case) — המקרה הכי פשוט, שבו עונים ישר בלי לקרוא שוב. בלעדיו הרקורסיה לא תיעצר לעולם!\n2) קריאה רקורסיבית — קוראים לפונקציה עם בעיה קטנה יותר (n-1, n/2 וכד'), שמתקרבת אל תנאי העצירה.`, code: `int factorial(int n) {\n    if (n == 0) return 1;        // תנאי עצירה\n    return n * factorial(n - 1); // קריאה רקורסיבית\n}` },
                { h: 'איך זה רץ בפועל', p: `כשקוראים factorial(3), המחשב "משהה" אותה כדי לחשב factorial(2), שמשהה כדי לחשב factorial(1), עד factorial(0) שמחזיר 1 מיד. ואז הכול "מתגלגל בחזרה": 1×1=1, אחר כך 2×1=2, ולבסוף 3×2=6. כל קריאה ממתינה לתשובה של הקריאה שמתחתיה.` },
                { h: 'מתי משתמשים', p: `רקורסיה זוהרת בבעיות שאפשר לפרק לתת-בעיות זהות: סכום ספרות, חזקה, חיפוש, ובמיוחד מבנים מקוננים כמו עצים. לרוב כל מה שאפשר לכתוב בלולאה אפשר גם ברקורסיה ולהפך — אבל בעצים ובמבני נתונים מקוננים, הרקורסיה כמעט תמיד פשוטה ואלגנטית יותר.` },
                { h: 'איך כותבים רקורסיה — שיטת 3 השאלות', p: `הדרך הבטוחה לכתוב פונקציה רקורסיבית היא לענות על שלוש שאלות, לפי הסדר:\n1) מה המקרה הכי פשוט שאפשר לענות עליו מיד, בלי לקרוא שוב? — זה תנאי העצירה.\n2) איך מקטינים את הבעיה צעד אחד לכיוון המקרה הפשוט? — זו הקריאה הרקורסיבית (n-1, n/2, הילד בעץ...).\n3) איך מחברים את התשובה של הבעיה הקטנה לתשובה של הבעיה הנוכחית? — זו השורה שמשלבת את התוצאה.\nאם ענית על שלושתן — הפונקציה כמעט כותבת את עצמה.` },
                { h: 'אמון רקורסיבי — "תסמכי על הקסם"', p: `הטעות הנפוצה ביותר היא לנסות "לעקוב בראש" אחרי כל הקריאות — וזה מבלבל. במקום זה, האמיני: כשאת כותבת factorial(n-1), הניחי שהיא כבר מחזירה את התשובה הנכונה ל-n-1, גם בלי לדעת איך. כל מה שנשאר לך הוא להשתמש בתשובה הזו. זה נקרא "קפיצת האמונה הרקורסיבית" — סומכים שהקריאה הקטנה עובדת, ומתמקדים רק בצעד אחד.` },
                { h: 'מחסנית הקריאות (Call Stack)', p: `מאחורי הקלעים המחשב שומר "מחסנית" של קריאות: כל קריאה חדשה פותחת "חלון" (מסגרת) חדש מעל הקודם, עם הערכים שלה. החלון העליון הוא זה שרץ עכשיו. כשהוא מגיע ל-return — החלון נסגר, התשובה חוזרת לחלון שמתחתיו, וכך הלאה עד שמגיעים בחזרה לקריאה הראשונה. ההדגמה האינטראקטיבית למטה מראה בדיוק את זה: חלונות שנפתחים בירידה, ונאספים בחזרה בעלייה.` },
                { h: 'דוגמאות נוספות', p: `כדי לחזק את הביטחון, הנה עוד פונקציות רקורסיביות קלאסיות:\n• סכום 1 עד n: אם n==0 מחזירים 0, אחרת n + sum(n-1).\n• חזקה a^b: אם b==0 מחזירים 1, אחרת a * power(a, b-1).\n• סכום ספרות: אם n<10 מחזירים n, אחרת n%10 + digitSum(n/10).\n• פיבונאצ'י: fib(n) = fib(n-1) + fib(n-2), עם שני תנאי עצירה (n==0, n==1).\nשימי לב לדפוס המשותף: תנאי עצירה פשוט + חיבור התוצאה של בעיה קטנה יותר.`, code: `int sum(int n) {\n    if (n == 0) return 0;       // עצירה\n    return n + sum(n - 1);      // חיבור\n}\nint power(int a, int b) {\n    if (b == 0) return 1;\n    return a * power(a, b - 1);\n}` },
                { h: 'משל פשוט — שורה של אנשים', p: `דמייני שאת עומדת בשורה ארוכה ורוצה לדעת כמה אנשים עומדים לפנייך, אבל את לא רואה את ראש השורה. מה תעשי? תשאלי את האדם שלפנייך: "כמה אנשים יש לפניך?" — והוא ישאל את מי שלפניו, וכך הלאה. האדם הראשון בשורה (שאין לפניו אף אחד) עונה "0" — זה תנאי העצירה. כל אחד מקבל את התשובה מקדימה, מוסיף 1 (בשביל עצמו) ומעביר אחורה. זו רקורסיה בדיוק: כל אחד פותר חלק קטנטן (מוסיף 1) וסומך על השאר שיענו על השאלה הקטנה יותר.` },
                { h: 'רקורסיה מול לולאה — מתי מה', p: `לולאה ורקורסיה הן שתי דרכים לחזור על פעולה, ולרוב אפשר להחליף ביניהן. ההבדל ברוח: לולאה "דוחפת קדימה" עם משתנה שמתעדכן (i++), בעוד רקורסיה "מפרקת" את הבעיה לבעיה קטנה יותר וסומכת על עצמה. מתי רקורסיה עדיפה? כשהבעיה עצמה בנויה מתת-בעיות זהות — בעיקר במבנים מקוננים כמו עצים, או בבעיות "הסתעפות" (כמו פיבונאצ'י). שם הלולאה תהיה מסורבלת מאוד, והרקורסיה — קצרה ואלגנטית. מתי לולאה עדיפה? במעבר פשוט וישיר (סכום מערך), כי היא חוסכת את ה"חלונות" שהרקורסיה פותחת בזיכרון.` },
                { h: 'איך בודקים שהרקורסיה נכונה', p: `במקום לעקוב בראש אחרי עשרות קריאות, בדקי שני דברים בלבד: (1) האם תנאי העצירה נכון — כשמגיעים אליו, התשובה שמוחזרת נכונה? (2) האם בהנחה שהקריאה הקטנה (n-1) מחזירה תשובה נכונה, הצעד שלך מרכיב ממנה את התשובה הנכונה ל-n? אם שתי הבדיקות עוברות — הפונקציה נכונה לכל הערכים, בזכות "אפקט הדומינו": העצירה נכונה, וכל צעד מעביר את הנכונות הלאה. זו בדיוק החשיבה שמאחורי אינדוקציה במתמטיקה.` },
                { h: 'דוגמה מודרכת — סכום ספרות', p: `נכתוב יחד פונקציה שמחזירה את סכום הספרות של מספר (למשל 482 → 4+8+2 = 14), לפי שיטת 3 השאלות:\n1) מקרה פשוט: מספר בן ספרה אחת (קטן מ-10) — סכום הספרות שלו הוא הוא עצמו.\n2) הקטנה: n/10 מוריד את הספרה האחרונה (482 → 48).\n3) חיבור: n%10 היא הספרה האחרונה (482 → 2), ומחברים אותה לסכום של השאר.\nוכך נולדת הפונקציה — קצרה ומדויקת:`, code: `int digitSum(int n) {\n    if (n < 10) return n;            // ספרה אחת\n    return n % 10 + digitSum(n / 10); // אחרונה + השאר\n}\n// digitSum(482) = 2 + digitSum(48)\n//              = 2 + 8 + digitSum(4) = 2 + 8 + 4 = 14` },
                { h: 'טעויות נפוצות', p: `שלוש מלכודות שכדאי להכיר: (1) בלי תנאי עצירה — הרקורסיה רצה לנצח עד שהמחשב "נחנק" (StackOverflow). (2) הקריאה לא מקטינה את הבעיה — למשל קוראים שוב עם אותו n, ואז לעולם לא מגיעים לעצירה. (3) שוכחים את ה-return — אם לא מחזירים את תוצאת הקריאה הרקורסיבית, התשובה "הולכת לאיבוד". תמיד ודאי: יש עצירה, הבעיה קטֵנה בכל צעד, ויש return.` },
            ],
            'עצים בינאריים': [
                { h: 'מה זה עץ בינארי?', p: `עץ בינארי הוא מבנה שמזכיר עץ משפחה הפוך: בראש יש "שורש", וכל צומת יכול להוביל לשני צמתים מתחתיו — ילד שמאלי וילד ימני. "בינארי" פירושו: עד שני ילדים לכל צומת. צומת בלי ילדים נקרא "עלה".` },
                { h: 'הצומת (BinNode)', p: `כל צומת הוא אובייקט עם שלושה חלקים: הערך שלו (getValue), מצביע לתת-העץ השמאלי (getLeft), ומצביע לתת-העץ הימני (getRight). אם אין ילד — המצביע הוא null. בודקים זאת עם hasLeft() ו-hasRight() לפני שניגשים, כדי לא לקרוס.` },
                { h: 'עצים אוהבים רקורסיה', p: `הנה התובנה המרכזית: כל ילד של צומת הוא בעצמו שורש של עץ קטן יותר! לכן כמעט כל פעולה על עץ נכתבת ברקורסיה: כדי לסכם את כל הערכים בעץ, מחזירים את הערך בשורש ועוד (סכום העץ השמאלי) ועוד (סכום העץ הימני). תנאי העצירה: עץ ריק (null) שסכומו 0.`, code: `int sum(BinNode<Integer> t) {\n    if (t == null) return 0;        // עץ ריק\n    return t.getValue()\n         + sum(t.getLeft())\n         + sum(t.getRight());\n}` },
                { h: 'סריקות העץ', p: `יש שלוש דרכים קלאסיות "לטייל" על כל צמתי העץ, שנבדלות בסדר: In-Order (שמאל → שורש → ימין), Pre-Order (שורש → שמאל → ימין), ו-Post-Order (שמאל → ימין → שורש). בעץ חיפוש בינארי, דווקא ה-In-Order מחזירה את הערכים ממוין מקטן לגדול — תכונה שימושית מאוד.` },
                { h: 'עץ חיפוש בינארי (BST)', p: `עץ חיפוש בינארי הוא עץ עם חוק מסדר: לכל צומת, כל הערכים בתת-העץ השמאלי קטנים ממנו, וכל הערכים בתת-העץ הימני גדולים ממנו. החוק הזה הוא קסם — הוא מאפשר לחפש ערך מהר מאוד: בכל צומת משווים, ואם המבוקש קטן יותר פונים שמאלה, אם גדול יותר ימינה. כך בכל צעד "זורקים" חצי מהעץ, בדיוק כמו חיפוש בינארי במערך ממוין.`, code: `// חוק ה-BST:\n//   כל מה שמשמאל לצומת < הצומת\n//   כל מה שמימין לצומת > הצומת` },
                { h: 'חיפוש ב-BST', p: `כדי לחפש ערך מתחילים מהשורש ומשווים: אם הערך שווה — מצאנו. אם המבוקש קטן מהצומת — ממשיכים לילד השמאלי; אם גדול — לילד הימני. חוזרים על זה עד שמוצאים, או עד שמגיעים ל-null (אין כזה ערך). בעץ מאוזן זה לוקח רק כ-log n צעדים — מהיר בהרבה ממעבר על כל הצמתים.`, code: `boolean search(BinNode<Integer> t, int x) {\n    if (t == null) return false;        // לא נמצא\n    if (t.getValue() == x) return true; // נמצא!\n    if (x < t.getValue())\n        return search(t.getLeft(), x);  // שמאלה\n    else\n        return search(t.getRight(), x); // ימינה\n}` },
                { h: 'מינימום ומקסימום ב-BST', p: `בזכות חוק הסדר, המינימום והמקסימום קלים למצוא: הערך הקטן ביותר נמצא תמיד הכי שמאלה (ממשיכים getLeft עד הסוף), והגדול ביותר תמיד הכי ימינה (ממשיכים getRight עד הסוף). אין צורך לסרוק את כל העץ — פשוט "גולשים" לאורך קצה אחד.`, code: `int findMax(BinNode<Integer> t) {\n    while (t.hasRight())\n        t = t.getRight();   // תמיד ימינה\n    return t.getValue();\n}` },
                { h: 'הוספת צומת ל-BST', p: `מוסיפים צומת חדש בדיוק כמו שמחפשים: יורדים מהשורש שמאלה/ימינה לפי ההשוואה, עד שמגיעים ל"מקום פנוי" (ילד שהוא null) — ושם תולים את הצומת החדש. כך העץ נשאר חוקי: כל ערך מוצא את מקומו הנכון. צומת חדש נכנס תמיד כעלה.`, code: `// להוסיף 5: 5<8→שמאל, 5>3→ימין,\n// 5<6→שמאל, 5>4→ימין → 5 נתלה\n// כילד ימני של 4` },
                { h: 'הסרת צומת', p: `הסרה היא הפעולה המורכבת ביותר, ויש שלושה מקרים: (1) הצומת עלה (בלי ילדים) — פשוט מנתקים אותו. (2) צומת עם ילד אחד — "עוקפים" אותו: ההורה מתחבר ישירות לנכד. (3) צומת עם שני ילדים — מחליפים אותו ביורש: הערך הקטן ביותר בתת-העץ הימני (או הגדול ביותר בשמאלי), ואז מוחקים את היורש ממקומו המקורי. ההדגמה למטה מראה את המקרה הפשוט של הסרת עלה.` },
            ],
        };

        const findLearnTopic = (title) => {

        };

        // שיוך שכבה לנושא לפי הכותרת: יא = משתנים, לולאות, מחרוזות, פונקציות, מחלקות, מערכים · השאר = יב
        const GRADE_YA_KEYWORDS = ['משתנ', 'לולא', 'מחרוז', 'פונקצ', 'מתוד', 'מחלק', 'אובייקט', 'עצמים', 'מערכ'];
        const topicGradeFor = (title) => {

        // Try-it mini editor — תלמידה מריצה דוגמה ורואה פלט בזמן אמת
        const TryIt = ({ example, idx }) => {
            const [code, setCode] = useState(example.code);

                    let txt = String(res || '').trim();
                    txt = txt.replace(/^```[a-z]*\n?/g, '').replace(/```$/g, '').trim();
                    setOutput(txt || '(אין פלט)');

            return (

                        </button>
                        <button onClick={() => { setCode(example.code); setOutput(null); }} className="px-3 py-1.5 rounded-lg bg-slate-700 hover:bg-slate-600 text-slate-300 text-sm">↺ איפוס</button>
                        <span className="text-xs text-slate-500 mr-auto hidden md:inline">נסי לשנות את הקוד ולהריץ שוב</span>
                    </div>
                    {output !== null && (
                        <div className="learn-console mt-2 rounded-lg border border-slate-700">{output}</div>
                    )}

            );
        };

        // Exercise card — תרגיל קטן עם רמז ופתרון
        const ExerciseCard = ({ ex, idx }) => {
            const [showHint, setShowHint] = useState(false);
            const [showSol, setShowSol] = useState(false);
            return (
                <div className="bg-slate-800/50 border border-amber-400/20 rounded-2xl p-4">
                    <div className="flex items-start gap-3 mb-3">
                        <span className="w-8 h-8 rounded-lg bg-amber-400/15 text-amber-300 flex items-center justify-center font-black text-sm flex-shrink-0">{idx + 1}</span>
                        <p className="text-slate-100 text-[15px] leading-relaxed pt-1" style={{ textWrap: 'pretty' }}>{ex.task}</p>

                    <div className="flex gap-2 mt-2.5">
                        <button onClick={() => setShowHint(!showHint)} className={`px-3 py-1.5 rounded-lg text-sm font-bold inline-flex items-center gap-1.5 ${showHint ? 'bg-amber-500/30 text-amber-200' : 'bg-slate-700 text-amber-300 hover:bg-slate-600'}`}><Icon name="spark" size={14} /> רמז</button>
                        <button onClick={() => setShowSol(!showSol)} className={`px-3 py-1.5 rounded-lg text-sm font-bold inline-flex items-center gap-1.5 ${showSol ? 'bg-indigo-500/30 text-indigo-200' : 'bg-slate-700 text-indigo-300 hover:bg-slate-600'}`}><Icon name={showSol ? 'eyeOff' : 'eye'} size={14} /> {showSol ? 'הסתרת פתרון' : 'הצגת פתרון'}</button>
                    </div>

                    )}

        };

        // Renders the detailed lesson prose (TOPIC_LESSONS) — heading, body, optional code box
        const LessonProse = ({ sections }) => (
            <div className="flex flex-col gap-5">
                {sections.map((s, i) => (

        // ===== Interactive linked-list visualizer — 3 demos (traversal / insertion / deletion), step-by-step trace =====
        const LL_COLORS = {
            normal: { border: '2px solid #A78BFA', shadow: '0 4px 22px rgba(139,92,246,0.5)', val: 'linear-gradient(150deg,#A78BFA,#7C6BF0)', valC: '#fff', nxt: '#3a3470', nxtC: '#DDD6FE' },
            active: { border: '2px solid #FCD34D', shadow: '0 0 30px rgba(251,191,36,0.55)', val: 'linear-gradient(150deg,#FCD34D,#F59E0B)', valC: '#3a2a05', nxt: '#6b5212', nxtC: '#FDE68A' },
            ghost: { border: '2px solid #5b6374', shadow: 'none', val: 'linear-gradient(150deg,#475569,#334155)', valC: '#cbd5e1', nxt: '#2a3346', nxtC: '#64748B', op: 0.42 },
            fresh: { border: '2px solid #6EE7B7', shadow: '0 0 28px rgba(16,185,129,0.55)', val: 'linear-gradient(150deg,#6EE7B7,#10B981)', valC: '#06281c', nxt: '#0d5440', nxtC: '#A7F3D0' },
        };
        const LLArrowIcon = ({ color, w = 24 }) => <svg width={w} height="16" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12h15M13 6l6 6-6 6"/></svg>;
        const LLArrow = ({ mod }) => <div style={{ alignSelf: 'flex-start', marginTop: 56, opacity: mod === 'fade' ? 0.28 : 1 }}><LLArrowIcon color={mod === 'skip' ? '#34D399' : mod === 'fade' ? '#475569' : '#C4B5FD'} /></div>;
        const LLNull = ({ active }) => (

                <div style={{ height: 16 }}></div>

        );
        // head ALWAYS shown in the bottom slot; moving pointer (pos/cur/prev/n) in the top slot; print badge stacks above
        const LLNode = ({ v, state = 'normal', topPtr, headHere, nextNull, reading, printVal, fresh }) => {
            const c = LL_COLORS[state];
            return (
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5, flexShrink: 0, opacity: c.op || 1, transition: 'opacity .35s', animation: fresh ? 'popIn .45s cubic-bezier(.34,1.56,.64,1)' : 'none' }}>
                    <div style={{ height: 46, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'flex-end', gap: 2 }}>
                        {reading && <div style={{ display: 'inline-flex', alignItems: 'center', gap: 4, background: 'rgba(16,185,129,0.18)', border: '1px solid #34D399', color: '#6EE7B7', borderRadius: 8, padding: '2px 8px', fontFamily: "'JetBrains Mono', monospace", fontWeight: 700, fontSize: 11.5, whiteSpace: 'nowrap' }}><Icon name="book" size={11} /> מדפיס {printVal}</div>}
                        {topPtr && <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center' }}><span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, fontWeight: 700, color: topPtr.color }}>{topPtr.text}</span><svg width="14" height="9" viewBox="0 0 14 9"><path d="M7 9L0 0h14z" fill={topPtr.color}/></svg></div>}
                    </div>
                    <div style={{ display: 'flex', alignItems: 'stretch', borderRadius: 11, overflow: 'hidden', border: c.border, boxShadow: c.shadow, transition: 'all .35s', animation: reading ? 'llread 1s ease-in-out infinite' : 'none' }}>
                        <div style={{ width: 50, height: 50, display: 'flex', alignItems: 'center', justifyContent: 'center', background: c.val, color: c.valC, fontWeight: 800, fontSize: 21, fontFamily: "'JetBrains Mono', monospace" }}>{v}</div>
                        <div style={{ width: 30, height: 50, display: 'flex', alignItems: 'center', justifyContent: 'center', background: c.nxt, color: c.nxtC }}>
                            {nextNull ? <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11, color: '#F87171' }}>∅</span> : <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>}
                        </div>
                    </div>
                    <div style={{ height: 16 }}>{headHere && <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 11.5, fontWeight: 800, color: '#60A5FA' }}>head</span>}</div>
                </div>
            );
        };
        const LinkedListViz = () => {
            const DEMOS = {
                traversal: {
                    label: 'מעבר', title: 'מעבר על הרשימה — pos מטייל חוליה-חוליה', foot: '1 → 2 → 3 → null', showOut: true,
                    code: ['Node<Integer> pos = head;', 'while (pos != null) {', '    System.out.println( pos.getValue() );', '    pos = pos.getNext();', '}'],
                    steps: [
                        { line: 0, pos: 0, out: [], desc: 'pos מקבל את head — מצביע על החוליה הראשונה (1). head נשאר במקומו תמיד.' },
                        { line: 1, pos: 0, out: [], desc: 'התנאי: pos הוא חוליה אמיתית (לא null) → נכנסים ללולאה.' },
                        { line: 2, pos: 0, out: [1], print: 1, desc: 'println קורא את הערך מהחוליה הנוכחית ומדפיס: 1.' },
                        { line: 3, pos: 1, out: [1], desc: 'pos.getNext() קורא את חלק ה-next וקופץ לחוליה 2.' },
                        { line: 1, pos: 1, out: [1], desc: 'התנאי שוב: pos=2, לא null → ממשיכים.' },
                        { line: 2, pos: 1, out: [1, 2], print: 2, desc: 'println מדפיס את הערך הנוכחי: 2.' },
                        { line: 3, pos: 2, out: [1, 2], desc: 'ה-next של 2 מצביע על 3 — pos קופץ ל-3.' },
                        { line: 1, pos: 2, out: [1, 2], desc: 'התנאי: pos=3 → ממשיכים.' },
                        { line: 2, pos: 2, out: [1, 2, 3], print: 3, desc: 'println מדפיס את הערך הנוכחי: 3.' },
                        { line: 3, pos: 3, out: [1, 2, 3], desc: 'ה-next של 3 הוא null — לכן pos הופך ל-null.' },
                        { line: 1, pos: 3, out: [1, 2, 3], desc: 'התנאי: pos == null → שקרי. יוצאים מהלולאה. סיימנו!' },
                    ],
                    render: (st) => {
                        const vals = [1, 2, 3]; const els = [];
                        vals.forEach((v, idx) => {
                            if (idx > 0) els.push(<LLArrow key={'a' + idx} />);
                            els.push(<LLNode key={idx} v={v} state={st.pos === idx ? 'active' : 'normal'} nextNull={idx === 2} headHere={idx === 0} topPtr={st.pos === idx ? { text: 'pos', color: '#FBBF24' } : null} reading={st.print != null && st.pos === idx} printVal={v} />);
                        });
                        els.push(<LLArrow key="an" />); els.push(<LLNull key="null" active={st.pos === 3} />);
                        return els;
                    },
                },
                insert: {
                    label: 'הוספה', title: 'הוספת חוליה — יוצרים תא ומקשרים לרשימה', foot: 'מוסיפים את 0 בראש', showOut: false,
                    code: ['Node<Integer> n = new Node<Integer>(0);', '// next של n הוא null אוטומטית', 'n.setNext(head);', 'head = n;'],
                    steps: [
                        { line: -1, ph: 0, desc: 'נקודת התחלה: הרשימה 1 → 2 → 3 → null. head מצביע על החוליה הראשונה.' },
                        { line: 0, ph: 1, desc: 'יוצרים חוליה חדשה n עם הערך 0. ה-next שלה null אוטומטית — היא עומדת בנפרד. head עדיין על 1.' },
                        { line: 2, ph: 2, desc: 'n.setNext(head) — מחברים את ה-next של החוליה החדשה לראש הקיים (1). עכשיו 0 → 1. head עדיין על 1.' },
                        { line: 3, ph: 3, desc: 'head = n — head עובר להצביע על החוליה החדשה. הוספנו לראש: 0 → 1 → 2 → 3 → null!' },
                    ],
                    render: (st) => {
                        const vals = [1, 2, 3];
                        if (st.ph <= 1) {
                            const list = [];
                            vals.forEach((v, idx) => { if (idx > 0) list.push(<LLArrow key={'a' + idx} />); list.push(<LLNode key={idx} v={v} nextNull={idx === 2} headHere={idx === 0} />); });
                            list.push(<LLArrow key="an" />); list.push(<LLNull key="null" />);
                            const fresh = st.ph === 1 ? (
                                <div style={{ display: 'flex', alignItems: 'center', gap: 2, marginBottom: 14, width: '100%', justifyContent: 'center' }}>
                                    <LLNode v={0} state="fresh" nextNull={true} fresh={true} topPtr={{ text: 'n', color: '#34D399' }} />
                                    <LLArrow mod="fade" /><LLNull />
                                </div>
                            ) : null;
                            return (
                                <div style={{ display: 'flex', flexDirection: 'column', gap: 6, width: '100%' }}>
                                    {fresh}
                                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 2, flexWrap: 'wrap' }}>{list}</div>
                                </div>
                            );
                        }
                        const isHead3 = st.ph === 3; const els = [];
                        els.push(<LLNode key="new" v={0} state="fresh" nextNull={false} topPtr={{ text: 'n', color: '#34D399' }} headHere={isHead3} />);
                        els.push(<LLArrow key="askip" mod="skip" />);
                        vals.forEach((v, idx) => { if (idx > 0) els.push(<LLArrow key={'a' + idx} />); els.push(<LLNode key={idx} v={v} nextNull={idx === 2} headHere={idx === 0 && !isHead3} />); });
                        els.push(<LLArrow key="an" />); els.push(<LLNull key="null" />);
                        return els;
                    },
                },
                del: {
                    label: 'מחיקה', title: 'מחיקה — דילוג מעל חוליה עם שני מצביעים', foot: 'מוחקים את 2', showOut: false,
                    code: ['Node<Integer> prev = head;', 'Node<Integer> cur = head.getNext();', '// רוצים למחוק את cur (הערך 2)', 'prev.setNext( cur.getNext() );'],
                    steps: [
                        { line: 0, prev: 0, cur: -1, skip: false, desc: 'prev מתחיל על החוליה הראשונה (1) — זו שלפני זו שנמחק. הוא יושב על אותה חוליה כמו head.' },
                        { line: 1, prev: 0, cur: 1, skip: false, desc: 'cur = head.getNext() — cur מצביע על החוליה שרוצים למחוק (2).' },
                        { line: 3, prev: 0, cur: 1, skip: true, desc: 'prev.setNext(cur.getNext()) — ה-next של 1 "מדלג" מעל 2 ומצביע ישר על 3.' },
                        { line: -1, prev: -1, cur: -1, skip: true, done: true, desc: 'התוצאה: 1 → 3 → null. מחקנו את 2 בלי להזיז כלום — רק שינינו מצביע אחד. זה היתרון של רשימה מקושרת!' },
                    ],
                    render: (st) => {
                        const vals = [1, 2, 3]; const els = [];
                        vals.forEach((v, idx) => {
                            if (idx > 0) {
                                if (st.skip && idx === 2) { /* skip arrow already drawn after node 1 */ }
                                else if (st.skip && idx === 1) els.push(<LLArrow key={'a' + idx} mod="fade" />);
                                else els.push(<LLArrow key={'a' + idx} />);
                            }
                            const isDel = st.done && idx === 1;
                            els.push(<LLNode key={idx} v={v} state={isDel ? 'ghost' : st.cur === idx ? 'active' : 'normal'} nextNull={idx === 2} headHere={idx === 0}
                                topPtr={st.prev === idx ? { text: 'prev', color: '#60A5FA' } : st.cur === idx ? { text: 'cur', color: '#FBBF24' } : null} />);
                            if (st.skip && idx === 1) els.push(<LLArrow key="askip" mod="skip" />);
                        });
                        els.push(<LLArrow key="an" />); els.push(<LLNull key="null" />);
                        return els;
                    },
                },
            };
            const [mode, setMode] = useState('traversal');
            const [i, setI] = useState(0);
            const [play, setPlay] = useState(false);
            const demo = DEMOS[mode];
            const steps = demo.steps;
            useEffect(() => { setI(0); setPlay(false); }, [mode]);
            useEffect(() => {
                if (!play) return;
                if (i >= steps.length - 1) { setPlay(false); return; }
                const t = setTimeout(() => setI(v => v + 1), 1300);
                return () => clearTimeout(t);
            }, [play, i, mode]);
            const st = steps[Math.min(i, steps.length - 1)];
            return (
                <div style={{ background: '#0E1424', border: '1px solid rgba(148,163,184,0.18)', borderRadius: 16, overflow: 'hidden', margin: '4px 0 8px' }}>

                            <button key={k} onClick={() => setMode(k)} style={{ padding: '6px 14px', borderRadius: 8, border: 'none', cursor: 'pointer', fontFamily: "'Heebo', sans-serif", fontWeight: 700, fontSize: 13, background: mode === k ? 'linear-gradient(135deg,#7C3AED,#6366F1)' : 'rgba(51,65,85,0.5)', color: mode === k ? '#fff' : '#CBD5E1' }}>{d.label}</button>
                        ))}
                        <span style={{ marginInlineStart: 'auto', color: '#64748B', fontSize: 12, fontFamily: "'JetBrains Mono', monospace", paddingInlineEnd: 6 }}>{i + 1}/{steps.length}</span>
                    </div>
                    {/* step bar — shows the exact line running */}
                    {st.line >= 0 && (
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '9px 16px', background: 'rgba(251,191,36,0.08)', borderBottom: '1px solid rgba(251,191,36,0.18)' }}>
                            <span style={{ background: '#FBBF24', color: '#3a2a05', fontWeight: 800, fontSize: 11, padding: '2px 9px', borderRadius: 999, fontFamily: "'JetBrains Mono', monospace" }}>שורה {st.line + 1}</span>
                            <span style={{ color: '#FCD34D', fontSize: 12.5, fontWeight: 600, fontFamily: "'JetBrains Mono', monospace", direction: 'ltr' }}>{demo.code[st.line].trim()}</span>
                        </div>
                    )}
                    {/* legend */}
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 18, padding: '12px 16px 0', flexWrap: 'wrap', color: '#94A3B8', fontSize: 12 }}>
                        <span style={{ display: 'flex', alignItems: 'center', gap: 7 }}><span style={{ display: 'inline-flex', borderRadius: 7, overflow: 'hidden', border: '2px solid #A78BFA' }}><span style={{ width: 26, height: 26, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'linear-gradient(150deg,#A78BFA,#7C6BF0)', color: '#fff', fontWeight: 800, fontSize: 13, fontFamily: "'JetBrains Mono', monospace" }}>5</span><span style={{ width: 18, height: 26, display: 'flex', alignItems: 'center', justifyContent: 'center', background: '#3a3470', color: '#DDD6FE' }}><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span></span> חוליה: ערך + next</span>
                        <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}><span style={{ fontFamily: "'JetBrains Mono', monospace", color: '#60A5FA', fontWeight: 800 }}>head</span> תמיד מסמן את ראש הרשימה</span>
                    </div>
                    {/* diagram */}
                    <div style={{ padding: '12px 18px 18px', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 2, flexWrap: 'wrap', minHeight: 150, direction: 'ltr' }}>{demo.render(st)}</div>
                    {/* code */}
                    <div style={{ padding: '12px 0', background: '#21262E', direction: 'ltr', borderTop: '1px solid rgba(148,163,184,0.12)' }}>
                        {demo.code.map((ln, idx) => (

                                <span style={{ width: 32, textAlign: 'right', color: st.line === idx ? '#FBBF24' : '#4B5263', paddingInlineEnd: 12, flexShrink: 0, userSelect: 'none', fontWeight: st.line === idx ? 800 : 400 }}>{st.line === idx ? '▶' : idx + 1}</span>
                                <span style={{ color: st.line === idx ? '#FDE68A' : '#ABB2BF', whiteSpace: 'pre' }}>{ln}</span>
                            </div>
                        ))}
                    </div>
                    {/* explanation + output */}
                    <div style={{ padding: '14px 16px', display: 'flex', flexDirection: 'column', gap: 10 }}>
                        <div style={{ display: 'flex', gap: 9, alignItems: 'flex-start', background: 'rgba(124,58,237,0.1)', border: '1px solid rgba(167,139,250,0.28)', borderRadius: 11, padding: '11px 14px' }}>
                            <span style={{ color: '#A78BFA', flexShrink: 0, marginTop: 1 }}><Icon name="spark" size={15} /></span>

                        </div>

                                <span style={{ color: '#64748B', fontFamily: "'JetBrains Mono', monospace", fontSize: 12 }}>פלט ▶</span>
                                <span style={{ color: '#98C379', fontFamily: "'JetBrains Mono', monospace", fontSize: 14, fontWeight: 600 }}>{(st.out || []).join('  ')}</span>
                            </div>
                        )}
                    </div>
                    {/* controls */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '12px 16px', borderTop: '1px solid rgba(148,163,184,0.12)' }}>
                        <button onClick={() => { setPlay(false); setI(Math.max(0, i - 1)); }} disabled={i === 0} className="btn btn-ghost btn-sm" style={{ opacity: i === 0 ? 0.4 : 1 }}><Icon name="arrowRight" size={14} /> אחורה</button>
                        <button onClick={() => { if (i >= steps.length - 1) { setI(0); setPlay(true); } else setPlay(!play); }} className="btn btn-solid btn-sm">{play ? 'השהיה' : i >= steps.length - 1 ? 'הרצה מחדש' : 'הרצה'} <Icon name={play ? 'eyeOff' : 'play'} size={14} /></button>
                        <button onClick={() => { setPlay(false); setI(Math.min(steps.length - 1, i + 1)); }} disabled={i >= steps.length - 1} className="btn btn-ghost btn-sm" style={{ opacity: i >= steps.length - 1 ? 0.4 : 1 }}>קדימה <Icon name="arrowLeft" size={14} /></button>
                        <span style={{ marginInlineStart: 'auto', color: '#64748B', fontSize: 12 }}>{demo.foot}</span>
                    </div>
                </div>
            );
        };

        // ===== Interactive class→objects visualizer — the Platonic "idea → manifestations" metaphor =====

                'Student c = new Student("דוד", 19, "חיפה", 100, "גיטרה");',
            ];
            // each step: which code line is running, the children so far, and which field is being filled now
            const FIELD_KEYS = ['name', 'age', 'city', 'grade', 'hobby'];

            const part = (o, fields) => { const r = { id: o.id }; FIELD_KEYS.forEach(k => { r[k] = fields.includes(k) ? o[k] : null; }); return r; };
            const ALL = FIELD_KEYS;
            const steps = [
                { line: 0, objs: [], fill: null, desc: 'זו ה"אידאה": מחלקת Student היא רעיון מופשט של "תלמיד" — לכל תלמיד יש שם, גיל, עיר, ציון ותחביב. אבל האידאה עצמה ריקה — היא לא תלמיד מסוים, אלא הרעיון של "תלמיד" בכלל.' },
                { line: 7, objs: [part(A, [])], fill: { id: 'a', f: null }, desc: 'שורה 8 — new Student(...) קורא לבנאי: נולד בן ראשון, עדיין שלד ריק עם תאים ריקים (?). עכשיו הבנאי ימלא אותו תכונה-תכונה.' },
                { line: 7, objs: [part(A, ['name'])], fill: { id: 'a', f: 'name' }, desc: 'הארגומנט הראשון "אברהם" נכנס לתכונה name. התא המופשט שבאידאה מקבל עכשיו ערך ממשי.' },
                { line: 7, objs: [part(A, ['name', 'age'])], fill: { id: 'a', f: 'age' }, desc: 'הארגומנט השני 20 נכנס לתכונה age.' },
                { line: 7, objs: [part(A, ['name', 'age', 'city'])], fill: { id: 'a', f: 'city' }, desc: 'הארגומנט השלישי "פתח תקוה" נכנס ל-city.' },
                { line: 7, objs: [part(A, ['name', 'age', 'city', 'grade'])], fill: { id: 'a', f: 'grade' }, desc: 'הארגומנט הרביעי 95 נכנס ל-grade.' },
                { line: 7, objs: [part(A, ALL)], fill: { id: 'a', f: 'hobby' }, desc: 'הארגומנט האחרון "כדורגל" נכנס ל-hobby. הבן אברהם הושלם — התממשות מלאה של האידאה, עם חמשת הערכים!' },
                { line: 8, objs: [A, part(B, [])], fill: { id: 'b', f: null }, desc: 'שורה 9 — אותה אידאה מולידה בן נוסף: שלד ריק חדש (b).' },
                { line: 8, objs: [A, part(B, ALL)], fill: { id: 'b', f: 'all' }, desc: 'הבנאי ממלא את שרה, 17, ירושלים, 88, ציור. אותה תבנית — ערכים שונים לגמרי.' },
                { line: 9, objs: [A, B, part(C, [])], fill: { id: 'c', f: null }, desc: 'שורה 10 — בן שלישי נולד מאותה אידאה: שלד ריק (c).' },
                { line: 9, objs: [A, B, part(C, ALL)], fill: { id: 'c', f: 'all' }, desc: 'דוד, 19, חיפה, 100, גיטרה. שלושה בנים — שלוש התממשויות שונות של אותה אידאה אחת. כל אחד ישות עצמאית עם ערכים משלו.' },
            ];
            const [i, setI] = useState(0);
            const [play, setPlay] = useState(false);
            useEffect(() => {
                if (!play) return;
                if (i >= steps.length - 1) { setPlay(false); return; }
                const t = setTimeout(() => setI(v => v + 1), 1600);
                return () => clearTimeout(t);
            }, [play, i]);
            const st = steps[i];
            const FieldRow = ({ k, v, filling }) => {
                const empty = v === null || v === undefined;
                return (
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12, padding: '4px 10px', background: filling ? 'rgba(52,211,153,0.16)' : 'rgba(15,23,42,0.5)', border: filling ? '1px solid #34D399' : '1px solid transparent', borderRadius: 7, fontFamily: "'JetBrains Mono', monospace", fontSize: 12, transition: 'all .25s' }}>
                        <span style={{ color: '#94A3B8' }}>{k}</span>
                        <span style={{ color: empty ? '#5B6374' : filling ? '#6EE7B7' : '#E2E8F0', fontWeight: 700, transition: 'color .3s' }}>{empty ? '?' : v}</span>
                    </div>
                );
            };
            const ObjectCard = ({ o, fillF }) => {
                const complete = FIELD_KEYS.every(k => o[k] != null);
                return (
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 5, width: 200, flexShrink: 0, background: 'linear-gradient(160deg,rgba(99,102,241,0.18),rgba(99,102,241,0.05))', border: complete ? '2px solid #818CF8' : '2px dashed #6366F1', borderRadius: 13, padding: '11px 12px 12px', boxShadow: complete ? '0 8px 26px rgba(99,102,241,0.35)' : '0 4px 16px rgba(99,102,241,0.2)', transition: 'all .3s' }}>

                        <FieldRow k="grade" v={o.grade} filling={fillF === 'grade' || fillF === 'all'} />
                        <FieldRow k="hobby" v={o.hobby} filling={fillF === 'hobby' || fillF === 'all'} />

            return (
                <div style={{ background: '#0E1424', border: '1px solid rgba(148,163,184,0.18)', borderRadius: 16, overflow: 'hidden', margin: '4px 0 8px' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '10px 16px', borderBottom: '1px solid rgba(148,163,184,0.14)', background: 'rgba(124,58,237,0.1)' }}>
                        <span style={{ color: '#C4B5FD' }}><Icon name="play" size={15} /></span>
                        <span style={{ color: '#E2E8F0', fontWeight: 800, fontSize: 14 }}>הדגמה — מאידאה (מחלקה) למימושים (אובייקטים)</span>
                        <span style={{ marginInlineStart: 'auto', color: '#64748B', fontSize: 12, fontFamily: "'JetBrains Mono', monospace" }}>{i + 1}/{steps.length}</span>
                    </div>
                    {/* step bar */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '9px 16px', background: 'rgba(251,191,36,0.08)', borderBottom: '1px solid rgba(251,191,36,0.18)' }}>
                        <span style={{ background: '#FBBF24', color: '#3a2a05', fontWeight: 800, fontSize: 11, padding: '2px 9px', borderRadius: 999, fontFamily: "'JetBrains Mono', monospace" }}>שורה {st.line + 1}</span>
                        <span style={{ color: '#FCD34D', fontSize: 12.5, fontWeight: 600, fontFamily: "'JetBrains Mono', monospace", direction: 'ltr' }}>{code[st.line].trim()}</span>
                    </div>
                    {/* diagram: the IDEA births children via descending lines */}
                    <div style={{ padding: '20px 18px 22px', direction: 'ltr' }}>
                        {/* the idea / class blueprint */}
                        <div style={{ display: 'flex', justifyContent: 'center' }}>
                            <div style={{ width: 250, background: 'repeating-linear-gradient(135deg,rgba(167,139,250,0.08),rgba(167,139,250,0.08) 10px,rgba(167,139,250,0.03) 10px,rgba(167,139,250,0.03) 20px)', border: '2px dashed #A78BFA', borderRadius: 14, padding: '12px 14px', boxShadow: '0 0 34px rgba(167,139,250,0.3)' }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginBottom: 8 }}>
                                    <span style={{ color: '#C4B5FD' }}><Icon name="spark" size={15} /></span>
                                    <span style={{ color: '#DDD6FE', fontWeight: 800, fontSize: 13.5 }}>class Student</span>
                                    <span style={{ marginInlineStart: 'auto', background: 'rgba(167,139,250,0.2)', color: '#C4B5FD', fontSize: 10.5, fontWeight: 700, padding: '2px 8px', borderRadius: 999 }}>אידאה · תבנית</span>
                                </div>
                                <div style={{ display: 'flex', flexDirection: 'column', gap: 4, fontFamily: "'JetBrains Mono', monospace", fontSize: 12 }}>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', color: '#94A3B8' }}><span>name</span><span style={{ color: '#6B7280' }}>String · ?</span></div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', color: '#94A3B8' }}><span>age</span><span style={{ color: '#6B7280' }}>int · ?</span></div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', color: '#94A3B8' }}><span>city</span><span style={{ color: '#6B7280' }}>String · ?</span></div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', color: '#94A3B8' }}><span>grade</span><span style={{ color: '#6B7280' }}>int · ?</span></div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', color: '#94A3B8' }}><span>hobby</span><span style={{ color: '#6B7280' }}>String · ?</span></div>
                                </div>
                                <div style={{ marginTop: 7, paddingTop: 7, borderTop: '1px dashed rgba(167,139,250,0.3)', color: '#8b93a7', fontSize: 11, textAlign: 'center' }}>רעיון מופשט — עדיין בלי צורה</div>
                            </div>
                        </div>
                        {/* descending "birth" lines from the idea to each child */}
                        {st.objs.length > 0 && (() => {
                            const n = st.objs.length;
                            const xs = st.objs.map((_, k) => Math.round(((k + 0.5) / n) * 1000) / 10);
                            return (
                                <div style={{ position: 'relative', height: 58 }}>
                                    <svg viewBox="0 0 100 58" preserveAspectRatio="none" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', overflow: 'visible' }}>

                                            <linearGradient id="birthln" x1="0" y1="0" x2="0" y2="1">
