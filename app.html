                </div>
            );
        };

        // תבניות קוד מוכנות להוספה מהירה בעורך
        const CODE_SNIPPETS = [
            { label: 'תוכנית ראשית (main)', code: 'public class Main {\n    public static void main(String[] args) {\n        // נקודת הכניסה לתוכנית — הריצה מתחילה כאן\n        \n    }\n}\n' },
            { label: 'לולאת for', code: 'for (int i = 0; i < n; i++) {\n    // i סופר מ-0 ועולה ב-1 בכל סיבוב, עד ש-i מגיע ל-n\n    \n}\n' },
            { label: 'לולאת while', code: 'while (תנאי) {\n    // חוזר כל עוד התנאי נכון — דאגי לשנות אותו בפנים כדי לעצור\n    \n}\n' },
            { label: 'תנאי if-else', code: 'if (תנאי) {\n    // מתבצע כשהתנאי נכון (true)\n    \n} else {\n    // מתבצע בכל מקרה אחר\n    \n}\n' },
            { label: 'מעבר על מערך', code: 'for (int i = 0; i < arr.length; i++) {\n    // arr.length = מספר התאים; ניגשים לכל תא לפי האינדקס i\n    System.out.println(arr[i]);\n}\n' },
            { label: 'קלט עם Scanner', code: 'Scanner i = new Scanner(System.in);  // פותח ערוץ קריאה מהמשתמש\nint num = i.nextInt();               // קורא מספר שלם שהוקלד\n' },
            { label: 'מעבר על רשימה מקושרת', code: 'Node<Integer> pos = head;   // מתחילים מראש הרשימה\nwhile (pos != null) {       // כל עוד לא הגענו לסוף\n    \n    pos = pos.getNext();    // מתקדמים לחוליה הבאה\n}\n' },
            { label: 'פונקציה (מתודה)', code: 'public static int myFunc(int n) {\n    // מקבלת קלט n, מבצעת חישוב, ומחזירה תוצאה\n    \n    return 0;  // הערך שחוזר לקורא של הפונקציה\n}\n' }
        ];

        // רמזים חכמים בעברית — זיהוי טעויות נפוצות בזמן כתיבה
        const getHebrewHints = (code) => {
            if (!code || !code.trim()) return ['התחילי לכתוב — או לחצי על "תבנית" לקבלת שלד מוכן'];
            const hints = [];
            const open = (code.match(/{/g) || []).length, close = (code.match(/}/g) || []).length;
            if (open !== close) hints.push(`יש ${open} סוגריים פותחים { אבל ${close} סוגרים } — משהו לא סגור`);
            const op = (code.match(/\(/g) || []).length, cp = (code.match(/\)/g) || []).length;
            if (op !== cp) hints.push('מספר הסוגריים ( ) לא מאוזן — בדקי שכל פתיחה נסגרת');
            if (/if\s*\([^)=!<>]*[^=!<>]=[^=][^)]*\)/.test(code)) hints.push('בתוך if משווים עם == (סימן = בודד הוא השמה!)');
            if (/\w+\s*==\s*"/.test(code)) hints.push('להשוואת מחרוזות משתמשים ב-s.equals("...") ולא ב-==');
            if (/\[\s*\]/.test(code) && /\.length\(\)/.test(code)) hints.push('למערך: arr.length בלי סוגריים · למחרוזת: s.length() עם סוגריים');
            if (/<=\s*\w+\.length\b/.test(code)) hints.push('זהירות: i <= arr.length חורג מהמערך — כנראה צריך < במקום <=');
            if (/while\s*\(\s*true\s*\)/.test(code)) hints.push('while(true) רצה לנצח — ודאי שיש תנאי עצירה או break');
            if (/system\.out/.test(code)) hints.push('אות גדולה בהתחלה: System.out.println (S גדולה)');
            if (/\bstring\b/.test(code)) hints.push('הטיפוס נקרא String — עם S גדולה');
            return hints.slice(0, 3);
        };

        // Code Editor Component - wraps CodeMirror 6
        const CodeEditor = ({ code, onChange, readOnly, enableLinting = false, title = 'Main.java', onPasteAttempt, blockPaste = false, examMode = false }) => {
            const ref = useRef(null);
            const editorRef = useRef(null);
            const [cm6Ready, setCm6Ready] = useState(!!window.createCodeEditor);
            const [loadTimeout, setLoadTimeout] = useState(false);
            const [editorError, setEditorError] = useState(false); // Track editor creation errors
            const [showDSHelp, setShowDSHelp] = useState(false);
            const [showSnippets, setShowSnippets] = useState(false);
            const [fontSize, setFontSize] = useState(15);
            const [copied, setCopied] = useState(false);

            const insertSnippet = (txt) => {
                const v = editorRef.current && editorRef.current.view;
                if (!v || readOnly) return;
                const pos = v.state.selection.main.head;
                v.dispatch({ changes: { from: pos, insert: txt }, selection: { anchor: pos + txt.length } });
                v.focus();
                setShowSnippets(false);
            };
            const copyCode = () => {
                try {
                    const ta = document.createElement('textarea');
                    ta.value = code || '';
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                    setCopied(true);
                    setTimeout(() => setCopied(false), 1500);
                } catch (e) {}
            };
            const hints = (!readOnly) ? getHebrewHints(code) : [];
            const lineCount = (code || '').split('\n').length;
            
            // Detect data structures in code
            const detectedDS = detectDataStructures(code);
            
            // Wait for CM6 to load with timeout
            useEffect(() => {
                if (window.createCodeEditor) {
                    setCm6Ready(true);
                    return;
                }
                
                // Timeout after 10 seconds
                const timeoutId = setTimeout(() => {
                    if (!window.createCodeEditor) {
                        console.error('CodeMirror failed to load after 10s');
                        setLoadTimeout(true);
                    }
                }, 10000);
                
                const checkInterval = setInterval(() => {
                    if (window.createCodeEditor) {
                        setCm6Ready(true);
                        clearInterval(checkInterval);
                        clearTimeout(timeoutId);
                    } else if (window.cm6LoadError) {
                        // Module loaded but had an error
                        console.error('CodeMirror module had load error');
                        setEditorError(true);
                        clearInterval(checkInterval);
                        clearTimeout(timeoutId);
                    }
                }, 100);
                
                return () => {
                    clearInterval(checkInterval);
                    clearTimeout(timeoutId);
                };
            }, []);
            
            useEffect(() => {
                if (!ref.current || !cm6Ready || !window.createCodeEditor) return;
                
                // Clear the container first
                if (ref.current) {
                    ref.current.innerHTML = '';
                }
                
                // Destroy existing editor
                if (editorRef.current) {
                    try {
                        editorRef.current.destroy();
                    } catch (e) {
                        console.log('Editor cleanup error:', e);
                    }
                    editorRef.current = null;
                }
                
                // Create new editor with CM6
                try {
                    editorRef.current = window.createCodeEditor(ref.current, {
                        doc: code || '',
                        readOnly: readOnly || false,
                        enableLinting: enableLinting,
                        enableAutocomplete: !examMode && !readOnly,
                        blockPaste: blockPaste,
                        onChange: (value) => {
                            if (onChange && !readOnly) onChange(value);
                        },
                        onPasteBlocked: (text) => {
                            if (onPasteAttempt && text.trim()) onPasteAttempt(text);
                        }
                    });
                    
                    // Check if editor was created successfully
                    if (!editorRef.current || !editorRef.current.view) {
                        console.error('Editor created but view is missing');
                        setEditorError(true);
                    }
                } catch (e) {
                    console.error('Editor creation error:', e);
                    setEditorError(true); // Show fallback textarea
                }
                
                return () => {
                    if (editorRef.current) {
                        try {
                            editorRef.current.destroy();
                        } catch (e) {
                            console.log('Editor cleanup error:', e);
                        }
                        editorRef.current = null;
                    }
                };
            }, [cm6Ready, enableLinting, blockPaste, readOnly, examMode]);
            
            // Update content when code prop changes
            useEffect(() => {
                if (editorRef.current && editorRef.current.view) {
                    const currentContent = editorRef.current.view.state.doc.toString();
                    if (code !== currentContent) {
                        editorRef.current.view.dispatch({
                            changes: { from: 0, to: currentContent.length, insert: code || '' }
                        });
                    }
                }
            }, [code]);
            
            return (
                <div className="code-editor-wrapper relative">
                    <div className="code-editor-header flex-wrap">
                        <div className="code-editor-dot red"></div>
                        <div className="code-editor-dot yellow"></div>
                        <div className="code-editor-dot green"></div>
                        <span className="code-editor-title">{title}</span>
                        {enableLinting && <span className="text-xs bg-emerald-500/15 text-emerald-300 px-2 py-0.5 rounded-full border border-emerald-500/30 inline-flex items-center gap-1"><Icon name="spark" size={12} /> עזרה פעילה</span>}
                        {readOnly && <span className="text-xs bg-slate-600/50 text-slate-300 px-2 py-0.5 rounded-full inline-flex items-center gap-1"><Icon name="lock" size={11} /> קריאה בלבד</span>}

                        {/* תבניות קוד — לא במבחן */}
                        {!readOnly && !examMode && (
                            <div className="relative">
                                <button onClick={() => setShowSnippets(!showSnippets)} className={`text-xs px-2 py-0.5 rounded flex items-center gap-1 transition-colors ${showSnippets ? 'bg-indigo-600 text-white' : 'bg-indigo-600/25 text-indigo-300 border border-indigo-500/40 hover:bg-indigo-600/45'}`}>➕ תבנית</button>
                                {showSnippets && (
                                    <div className="absolute top-full right-0 mt-1 z-50 bg-slate-800 border border-slate-600 rounded-lg shadow-2xl py-1 min-w-[185px]">
                                        {CODE_SNIPPETS.map((s, i) => (
                                            <button key={i} onClick={() => insertSnippet(s.code)} className="w-full text-right px-3 py-1.5 text-[12.5px] text-slate-200 hover:bg-indigo-600/30">{s.label}</button>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* גודל גופן + העתקה */}
                        <div className="flex items-center gap-1 mr-auto">
                            <button onClick={() => setFontSize(f => Math.max(11, f - 1))} className="text-xs w-6 h-6 rounded bg-slate-700/70 text-slate-300 hover:bg-slate-600" title="הקטנת גופן">A-</button>
                            <button onClick={() => setFontSize(f => Math.min(22, f + 1))} className="text-xs w-6 h-6 rounded bg-slate-700/70 text-slate-300 hover:bg-slate-600" title="הגדלת גופן">A+</button>
                            <button onClick={copyCode} className="text-xs px-2 h-6 rounded bg-slate-700/70 text-slate-300 hover:bg-slate-600" title="העתקת הקוד">{copied ? '✓ הועתק' : '📋'}</button>
                        </div>

                        {/* Data Structures Help Button - shows when DS detected (לא במבחן) */}
                        {detectedDS.length > 0 && !examMode && (
                            <button 
                                onClick={() => setShowDSHelp(!showDSHelp)}
                                className={`text-xs px-2 py-0.5 rounded flex items-center gap-1 transition-colors ${
                                    showDSHelp 
                                        ? 'bg-blue-600 text-white' 
                                        : 'bg-blue-600/30 text-blue-400 border border-blue-600/50 hover:bg-blue-600/50'
                                }`}
                            >
                                📚 עזרה: {detectedDS.join(', ')}
                            </button>
                        )}
                    </div>
                    {(loadTimeout || editorError) ? (
                        /* Fallback textarea when CodeMirror fails to load */
                        <div className="relative">
                            <div className="absolute top-2 right-2 left-2 flex justify-between items-center z-10">
                                <span className="text-xs text-yellow-400 bg-yellow-900/50 px-2 py-1 rounded">
                                    ⚠️ עורך הקוד לא נטען - משתמש במצב פשוט
                                </span>
                                <button 
                                    onClick={() => window.location.reload()}
                                    className="text-xs text-blue-400 bg-blue-900/50 px-2 py-1 rounded hover:bg-blue-800/50"
                                 style={{display:'inline-flex',alignItems:'center',gap:'5px'}}>
                                    <Icon name="refresh" size={13} /> רענן דף
                                </button>
                            </div>
                            <textarea
                                value={code || ''}
                                onChange={e => onChange && !readOnly && onChange(e.target.value)}
                                readOnly={readOnly}
                                className="w-full h-64 p-4 pt-12 bg-white text-gray-900 font-mono text-sm border-0 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 rounded-b-xl"
                                dir="ltr"
                                placeholder="// כתוב את הקוד שלך כאן..."
                                style={{ fontFamily: "'JetBrains Mono', monospace" }}
                            />
                        </div>
                    ) : !cm6Ready ? (
                        <div className="flex items-center justify-center h-48 bg-white rounded-b-xl">
                            <div className="spinner"></div>
                            <span className="mr-2 text-gray-600">טוען עורך קוד...</span>
                        </div>
                    ) : (
                        <div ref={ref} className="cm-host" style={{ fontSize: fontSize + 'px' }} />
                    )}

                    {/* שורת מצב + רמזים חכמים בעברית (לא במבחן) */}
                    {!readOnly && !examMode && !loadTimeout && !editorError && cm6Ready && (
                        <div className="px-3 py-1.5 bg-[#14141E] border-t border-[#2C2C3C] flex items-start gap-3">
                            <span className="text-[11px] text-slate-500 font-mono pt-0.5 flex-shrink-0">{lineCount} שורות</span>
                            <div className="flex flex-col gap-0.5 min-w-0">
                                {hints.map((h, i) => (
                                    <span key={i} className="text-[12px] text-amber-300/90 leading-snug">💡 {h}</span>
                                ))}
                            </div>
                        </div>
                    )}
                    
                    {/* Data Structures Help Panel (לא במבחן) */}
                    {!examMode && <DataStructuresHelp code={code} isOpen={showDSHelp} onClose={() => setShowDSHelp(false)} />}
                </div>
            );
        };

        // =====================================================
        // AUTOMATA EDITOR - עורך אוטומטים ויזואלי
        // =====================================================
        
        const AutomataEditor = ({ value, onChange, readOnly = false, automataType = 'DFA', alphabet = 'a,b' }) => {
            // State for automaton
            const [states, setStates] = useState(value?.states || []);
            const [transitions, setTransitions] = useState(value?.transitions || []);
            const [selectedState, setSelectedState] = useState(null);
            const [draggingState, setDraggingState] = useState(null);
            const [pendingDrag, setPendingDrag] = useState(null);
            const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
            const [editingTransition, setEditingTransition] = useState(null);
            const [selectedSymbols, setSelectedSymbols] = useState([]);
            const [stackPop, setStackPop] = useState('');
            const [stackPush, setStackPush] = useState('');
            const [creatingTransition, setCreatingTransition] = useState(null); // Source state ID for new transition
            const [mousePos, setMousePos] = useState({ x: 0, y: 0 }); // Current mouse position for drawing line
            const svgRef = useRef(null);
            
            const STATE_RADIUS = 30;
            const CANVAS_WIDTH = 700;
            const CANVAS_HEIGHT = 400;
            
            // Parse alphabet into array of symbols
            const alphabetSymbols = useMemo(() => {
                const symbols = alphabet.split(',').map(s => s.trim()).filter(s => s.length > 0);
                // Add epsilon for NFA and PDA
                if ((automataType === 'NFA' || automataType === 'PDA') && !symbols.includes('ε')) {
                    symbols.push('ε');
                }
                return symbols;
            }, [alphabet, automataType]);
            
            // Initialize with parsed value
            useEffect(() => {
                if (value?.states) setStates(value.states);
                if (value?.transitions) setTransitions(value.transitions);
            }, []);
            
            // Notify parent of changes
            useEffect(() => {
                if (onChange && !readOnly) {
                    onChange({ states, transitions, type: automataType, alphabet });
                }
            }, [states, transitions]);
            
            // Generate next state name
            const getNextStateName = () => {
                const usedNumbers = states.map(s => {
                    const match = s.name.match(/^q(\d+)$/);
                    return match ? parseInt(match[1]) : -1;
                });
                let next = 0;
                while (usedNumbers.includes(next)) next++;
                return `q${next}`;
            };
            
            // Add new state
            const addState = () => {
                if (readOnly) return;
                const name = getNextStateName();
                const newState = {
                    id: Date.now().toString(),
                    name,
                    x: 100 + (states.length % 5) * 120,
                    y: 80 + Math.floor(states.length / 5) * 100,
                    isInitial: states.length === 0, // First state is initial
                    isAccepting: false
                };
                setStates([...states, newState]);
            };
            
            // Delete state
            const deleteState = (stateId) => {
                if (readOnly) return;
                setStates(states.filter(s => s.id !== stateId));
                setTransitions(transitions.filter(t => t.from !== stateId && t.to !== stateId));
                setSelectedState(null);
            };
            
            // Toggle accepting state
            const toggleAccepting = (stateId) => {
                if (readOnly) return;
                setStates(states.map(s => 
                    s.id === stateId ? { ...s, isAccepting: !s.isAccepting } : s
                ));
            };
            
            // Set initial state
            const setInitialState = (stateId) => {
                if (readOnly) return;
                setStates(states.map(s => ({ ...s, isInitial: s.id === stateId })));
            };
            
            // Handle mouse down on state
            const handleStateMouseDown = (e, state) => {
                e.stopPropagation();
                if (readOnly) return;
                
                const svg = svgRef.current;
                const pt = svg.createSVGPoint();
                pt.x = e.clientX;
                pt.y = e.clientY;
                const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
                
                if (e.shiftKey) {
                    // Shift+Click: Start creating transition from this state
                    setCreatingTransition(state.id);
                    setMousePos({ x: state.x, y: state.y });
                    setSelectedState(state.id);
                } else {
                    // Regular click: Select state
                    setSelectedState(state.id);
                    // Store drag info but don't start dragging yet (wait for mouse move)
                    setDragOffset({ x: svgP.x - state.x, y: svgP.y - state.y });
                    // Mark potential drag target
                    setPendingDrag(state.id);
                }
            };
            
            // Handle mouse move
            const handleMouseMove = (e) => {
                const svg = svgRef.current;
                if (!svg) return;
                
                const pt = svg.createSVGPoint();
                pt.x = e.clientX;
                pt.y = e.clientY;
                const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
                
                // Update mouse position for transition line
                if (creatingTransition) {
                    setMousePos({ x: svgP.x, y: svgP.y });
                }
                
                // Convert pending drag to actual dragging on movement
                if (pendingDrag && !draggingState && !readOnly) {
                    setDraggingState(pendingDrag);
                    setPendingDrag(null);
                }
                
                // Handle state dragging
                if (draggingState && !readOnly) {
                    const newX = Math.max(STATE_RADIUS, Math.min(CANVAS_WIDTH - STATE_RADIUS, svgP.x - dragOffset.x));
                    const newY = Math.max(STATE_RADIUS, Math.min(CANVAS_HEIGHT - STATE_RADIUS, svgP.y - dragOffset.y));
                    
                    setStates(states.map(s => 
                        s.id === draggingState ? { ...s, x: newX, y: newY } : s
                    ));
                }
            };
            
            // Handle mouse up on canvas (cancel transition creation)
            const handleMouseUp = () => {
                setDraggingState(null);
                setPendingDrag(null);
                setCreatingTransition(null);
            };
            
            // Handle mouse up on state (create transition if dragging)
            const handleStateMouseUp = (e, targetState) => {
                e.stopPropagation();
                if (readOnly) return;
                
                if (creatingTransition && creatingTransition !== targetState.id) {
                    // Create transition from source to target
                    const existingTransition = transitions.find(t => t.from === creatingTransition && t.to === targetState.id);
                    if (!existingTransition) {
                        const defaultSymbol = alphabetSymbols[0] || 'a';
                        const newTransition = {
                            id: Date.now().toString(),
                            from: creatingTransition,
                            to: targetState.id,
                            label: defaultSymbol,
                            stackPop: automataType === 'PDA' ? 'ε' : undefined,
                            stackPush: automataType === 'PDA' ? 'ε' : undefined
                        };
                        setTransitions([...transitions, newTransition]);
                        setEditingTransition(newTransition.id);
                        setSelectedSymbols([defaultSymbol]);
                        setStackPop('ε');
                        setStackPush('ε');
                    }
                } else if (creatingTransition === targetState.id) {
                    // Self-loop: Create transition to self
                    const existingTransition = transitions.find(t => t.from === creatingTransition && t.to === creatingTransition);
                    if (!existingTransition) {
                        const defaultSymbol = alphabetSymbols[0] || 'a';
                        const newTransition = {
                            id: Date.now().toString(),
                            from: creatingTransition,
                            to: creatingTransition,
                            label: defaultSymbol,
                            stackPop: automataType === 'PDA' ? 'ε' : undefined,
                            stackPush: automataType === 'PDA' ? 'ε' : undefined
                        };
                        setTransitions([...transitions, newTransition]);
                        setEditingTransition(newTransition.id);
                        setSelectedSymbols([defaultSymbol]);
                        setStackPop('ε');
                        setStackPush('ε');
                    }
                }
                
                setCreatingTransition(null);
                setDraggingState(null);
                setPendingDrag(null);
            };
            
            // Handle canvas click
            const handleCanvasClick = (e) => {
                if (e.target === svgRef.current) {
                    setSelectedState(null);
                }
            };
            
            // Delete transition
            const deleteTransition = (transId) => {
                if (readOnly) return;
                setTransitions(transitions.filter(t => t.id !== transId));
                setEditingTransition(null);
                setSelectedSymbols([]);
            };
            
            // Toggle symbol in selected symbols
            const toggleSymbol = (symbol) => {
                if (selectedSymbols.includes(symbol)) {
                    // Remove symbol, but keep at least one
                    if (selectedSymbols.length > 1) {
                        setSelectedSymbols(selectedSymbols.filter(s => s !== symbol));
                    }
                } else {
                    // Add symbol
                    setSelectedSymbols([...selectedSymbols, symbol]);
                }
            };
            
            // Save transition label
            const saveTransitionLabel = () => {
                if (!editingTransition || selectedSymbols.length === 0) return;
                const label = selectedSymbols.join(',');
                setTransitions(transitions.map(t => 
                    t.id === editingTransition 
                        ? { ...t, label, stackPop: stackPop || 'ε', stackPush: stackPush || 'ε' } 
                        : t
                ));
                setEditingTransition(null);
                setSelectedSymbols([]);
            };
            
            // Calculate arrow path for transition
            const getTransitionPath = (fromState, toState, isSelfLoop = false, transitionId = null) => {
                if (isSelfLoop) {
                    // Self loop
                    const cx = fromState.x;
                    const cy = fromState.y - STATE_RADIUS - 25;
                    return `M ${fromState.x - 15} ${fromState.y - STATE_RADIUS + 5} 
                            C ${cx - 40} ${cy - 30}, ${cx + 40} ${cy - 30}, ${fromState.x + 15} ${fromState.y - STATE_RADIUS + 5}`;
                }
                
                // Regular transition
                const dx = toState.x - fromState.x;
                const dy = toState.y - fromState.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const normX = dx / dist;
                const normY = dy / dist;
                
                const startX = fromState.x + normX * STATE_RADIUS;
                const startY = fromState.y + normY * STATE_RADIUS;
                const endX = toState.x - normX * (STATE_RADIUS + 8);
                const endY = toState.y - normY * (STATE_RADIUS + 8);
                
                // Check if there's a reverse transition (bend the arrow)
                const hasReverse = transitions.some(t => t.from === toState.id && t.to === fromState.id);
                
                if (hasReverse) {
                    const midX = (startX + endX) / 2;
                    const midY = (startY + endY) / 2;
                    // Determine curve direction: use state IDs to ensure consistent opposite curves
                    // The transition going from lower ID to higher ID curves one way,
                    // the one going from higher to lower curves the other way
                    const curveDirection = fromState.id < toState.id ? 1 : -1;
                    const curveAmount = 35; // pixels to curve
                    const perpX = -normY * curveAmount * curveDirection;
                    const perpY = normX * curveAmount * curveDirection;
                    return `M ${startX} ${startY} Q ${midX + perpX} ${midY + perpY} ${endX} ${endY}`;
                }
                
                return `M ${startX} ${startY} L ${endX} ${endY}`;
            };
            
            // Get label position for transition
            const getLabelPosition = (fromState, toState, isSelfLoop = false, transitionId = null) => {
                if (isSelfLoop) {
                    return { x: fromState.x, y: fromState.y - STATE_RADIUS - 45 };
                }
                
                const hasReverse = transitions.some(t => t.from === toState.id && t.to === fromState.id);
                const dx = toState.x - fromState.x;
                const dy = toState.y - fromState.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const normX = dx / dist;
                const normY = dy / dist;
                
                let midX = (fromState.x + toState.x) / 2;
                let midY = (fromState.y + toState.y) / 2;
                
                if (hasReverse) {
                    // Match the curve direction from getTransitionPath
                    const curveDirection = fromState.id < toState.id ? 1 : -1;
                    const labelOffset = 30;
                    midX += -normY * labelOffset * curveDirection;
                    midY += normX * labelOffset * curveDirection;
                }
                
                return { x: midX, y: midY - 8 };
            };
            
            // Export automaton to text format
            const exportToText = () => {
                let text = `סוג אוטומט: ${automataType === 'DFA' ? 'אוטומט סופי דטרמיניסטי (DFA)' : automataType === 'NFA' ? 'אוטומט סופי אי-דטרמיניסטי (NFA)' : 'אוטומט מחסנית (PDA)'}\n\n`;
                
                const initialState = states.find(s => s.isInitial);
                const acceptingStates = states.filter(s => s.isAccepting);
                
                text += `מצבים: ${states.map(s => s.name).join(', ')}\n`;
                text += `מצב התחלתי: ${initialState?.name || 'לא הוגדר'}\n`;
                text += `מצבים מקבלים: ${acceptingStates.map(s => s.name).join(', ') || 'אין'}\n\n`;
                text += `מעברים:\n`;
                
                transitions.forEach(t => {
                    const fromName = states.find(s => s.id === t.from)?.name;
                    const toName = states.find(s => s.id === t.to)?.name;
                    if (automataType === 'PDA') {
                        text += `  ${fromName} --[${t.label}, ${t.stackPop}/${t.stackPush}]--> ${toName}\n`;
                    } else {
                        text += `  ${fromName} --[${t.label}]--> ${toName}\n`;
                    }
                });
                
                return text;
            };
            
            // Attach export function to value
            useEffect(() => {
                if (onChange) {
                    onChange({ states, transitions, type: automataType, exportToText });
                }
            }, [states, transitions]);
            
            return (
                <div className="automata-editor bg-slate-800 rounded-xl border border-slate-600 overflow-hidden">
                    {/* Toolbar */}
                    <div className="flex items-center gap-2 p-3 bg-slate-700 border-b border-slate-600">
                        <span className="text-white font-bold flex items-center gap-2">
                            <Icon name="automata" size={16} /> עורך אוטומטים
                            <span className="text-xs bg-blue-600 px-2 py-0.5 rounded">{automataType}</span>
                            <span className="text-xs bg-purple-600/50 text-purple-300 px-2 py-0.5 rounded">
                                א"ב: {alphabetSymbols.join(', ')}
                            </span>
                        </span>
                        {!readOnly && (
                            <>
                                <button 
                                    onClick={addState}
                                    className="px-3 py-1 bg-green-600 text-white text-sm rounded hover:bg-green-500 flex items-center gap-1"
                                 style={{display:'inline-flex',alignItems:'center',gap:'4px'}}>
                                    <Icon name="plus" size={14} /> הוסף מצב
                                </button>
                                {selectedState && !readOnly && (
                                    <>
                                        <button 
                                            onClick={() => toggleAccepting(selectedState)}
                                            className={`px-3 py-1 text-white text-sm rounded flex items-center gap-1 ${
                                                states.find(s => s.id === selectedState)?.isAccepting 
                                                    ? 'bg-green-600 hover:bg-green-500 ring-2 ring-green-400' 
                                                    : 'bg-yellow-600 hover:bg-yellow-500'
                                            }`}
                                        >
                                            {states.find(s => s.id === selectedState)?.isAccepting ? '✅ מצב מקבל' : '⭕ הפוך למקבל'}
                                        </button>
                                        <button 
                                            onClick={() => setInitialState(selectedState)}
                                            className={`px-3 py-1 text-white text-sm rounded ${
                                                states.find(s => s.id === selectedState)?.isInitial
                                                    ? 'bg-purple-600 hover:bg-purple-500 ring-2 ring-purple-400'
                                                    : 'bg-blue-600 hover:bg-blue-500'
                                            }`}
                                        >
                                            {states.find(s => s.id === selectedState)?.isInitial ? '▶️ התחלתי' : '▶️ הפוך להתחלתי'}
                                        </button>
                                        <button 
                                            onClick={() => deleteState(selectedState)}
                                            className="px-3 py-1 bg-red-600 text-white text-sm rounded hover:bg-red-500"
                                        >
                                            🗑️ מחק
                                        </button>
                                    </>
                                )}
                            </>
                        )}
                        <div className="flex-1" />
                        <span className="text-xs text-gray-400">
                            {selectedState ? 'Shift+גרור למצב אחר ליצירת מעבר' : 'לחץ על מצב לבחירה, גרור להזזה'}
                        </span>
                    </div>
                    
                    {/* Canvas */}
                    <svg 
                        ref={svgRef}
                        width={CANVAS_WIDTH} 
                        height={CANVAS_HEIGHT}
                        className="bg-slate-900 cursor-crosshair w-full"
                        style={{ minHeight: '400px' }}
                        viewBox={`0 0 ${CANVAS_WIDTH} ${CANVAS_HEIGHT}`}
                        onMouseMove={handleMouseMove}
                        onMouseUp={handleMouseUp}
                        onMouseLeave={handleMouseUp}
                        onClick={handleCanvasClick}
                    >
                        {/* Arrow marker definition */}
                        <defs>
                            <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                                <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa" />
                            </marker>
                            <marker id="arrowhead-selected" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                                <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24" />
                            </marker>
                        </defs>
                        
                        {/* Grid */}
                        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" strokeWidth="0.5"/>
                        </pattern>
                        <rect width="100%" height="100%" fill="url(#grid)" />
                        
                        {/* Transitions */}
                        {transitions.map(t => {
                            const fromState = states.find(s => s.id === t.from);
                            const toState = states.find(s => s.id === t.to);
                            if (!fromState || !toState) return null;
                            
                            const isSelfLoop = t.from === t.to;
                            const path = getTransitionPath(fromState, toState, isSelfLoop);
                            const labelPos = getLabelPosition(fromState, toState, isSelfLoop);
                            const isSelected = editingTransition === t.id;
                            
                            // Calculate label text and width dynamically
                            const labelText = automataType === 'PDA' ? `${t.label},${t.stackPop}/${t.stackPush}` : t.label;
                            const labelWidth = Math.max(30, labelText.length * 9 + 16);
                            
                            return (
                                <g key={t.id}>
                                    <path 
                                        d={path}
                                        fill="none"
                                        stroke={isSelected ? '#fbbf24' : '#60a5fa'}
                                        strokeWidth={isSelected ? 3 : 2}
                                        markerEnd={isSelected ? 'url(#arrowhead-selected)' : 'url(#arrowhead)'}
                                        className="cursor-pointer"
                                        onClick={(e) => {
                                            e.stopPropagation();
                                            if (readOnly) return;
                                            setEditingTransition(t.id);
                                            // Parse label back to symbols array
                                            const symbols = t.label.split(',').map(s => s.trim()).filter(s => s);
                                            setSelectedSymbols(symbols.length > 0 ? symbols : [alphabetSymbols[0] || 'a']);
                                            setStackPop(t.stackPop || 'ε');
                                            setStackPush(t.stackPush || 'ε');
                                        }}
                                    />
                                    <rect 
                                        x={labelPos.x - labelWidth/2} 
                                        y={labelPos.y - 12} 
                                        width={labelWidth} 
                                        height={22} 
                                        rx={4}
                                        fill={isSelected ? '#fbbf24' : '#1e40af'}
                                        className="cursor-pointer"
                                        onClick={(e) => {
                                            e.stopPropagation();
                                            if (readOnly) return;
                                            setEditingTransition(t.id);
                                            // Parse label back to symbols array
                                            const symbols = t.label.split(',').map(s => s.trim()).filter(s => s);
                                            setSelectedSymbols(symbols.length > 0 ? symbols : [alphabetSymbols[0] || 'a']);
                                            setStackPop(t.stackPop || 'ε');
                                            setStackPush(t.stackPush || 'ε');
                                        }}
                                    />
                                    <text 
                                        x={labelPos.x} 
                                        y={labelPos.y + 4}
                                        textAnchor="middle"
                                        fill={isSelected ? '#1e293b' : 'white'}
                                        fontSize="13"
                                        fontWeight="bold"
                                        fontFamily="monospace"
                                        className="pointer-events-none select-none"
                                    >
                                        {labelText}
                                    </text>
                                </g>
                            );
                        })}
                        
                        {/* Temporary transition line while creating */}
                        {creatingTransition && (() => {
                            const sourceState = states.find(s => s.id === creatingTransition);
                            if (!sourceState) return null;
                            return (
                                <line
                                    x1={sourceState.x}
                                    y1={sourceState.y}
                                    x2={mousePos.x}
                                    y2={mousePos.y}
                                    stroke="#fbbf24"
                                    strokeWidth="2"
                                    strokeDasharray="5,5"
                                    markerEnd="url(#arrowhead)"
                                    className="pointer-events-none"
                                />
                            );

                                    {/* Initial state arrow */}
                                    {state.isInitial && (
                                        <path 
                                            d={`M ${state.x - STATE_RADIUS - 30} ${state.y} L ${state.x - STATE_RADIUS - 5} ${state.y}`}
                                            stroke="#22c55e"
                                            strokeWidth="2"
                                            markerEnd="url(#arrowhead)"
                                        />
                                    )}
                                    
                                    {/* Accepting state double circle */}
                                    {state.isAccepting && (
                                        <circle 
                                            cx={state.x} 
                                            cy={state.y} 
                                            r={STATE_RADIUS - 5}
                                            fill="none"
                                            stroke={isSelected ? '#fbbf24' : '#60a5fa'}
                                            strokeWidth="2"
                                        />
                                    )}
                                    
                                    {/* Main circle */}
                                    <circle 
                                        cx={state.x} 
                                        cy={state.y} 
                                        r={STATE_RADIUS}
                                        fill={isSelected ? '#1e3a5f' : '#1e293b'}
                                        stroke={isSelected ? '#fbbf24' : state.isAccepting ? '#22c55e' : '#60a5fa'}

                                        className={readOnly ? 'cursor-default' : 'cursor-move'}
                                        onMouseDown={(e) => handleStateMouseDown(e, state)}
                                        onMouseUp={(e) => handleStateMouseUp(e, state)}
                                        onDoubleClick={() => !readOnly && toggleAccepting(state.id)}
                                    />
                                    
                                    {/* State name */}
                                    <text 
                                        x={state.x} 
                                        y={state.y + 5}

                                        fill="white"
                                        fontSize="14"
                                        fontWeight="bold"
                                        fontFamily="monospace"
                                        className="pointer-events-none select-none"
                                    >
                                        {state.name}
                                    </text>
                                </g>
                            );
                        })}
                        
                        {/* Empty state message */}
                        {states.length === 0 && (

        // =====================================================
        // AI CHAT HELPER - עוזר צ'אט עם AI
        // =====================================================
        
        const ChatHelper = ({ isOpen, onClose, questionText, currentCode, questionType, automataType }) => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const messagesEndRef = useRef(null);
            const inputRef = useRef(null);
            
            // Scroll to bottom when messages change
            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);
            
            // Focus input when opened
            useEffect(() => {
                if (isOpen) {
                    setTimeout(() => inputRef.current?.focus(), 100);
                }
            }, [isOpen]);
            
            // Add welcome message when opened
            useEffect(() => {
                if (isOpen && messages.length === 0) {
                    const welcomeMsg = questionType === 'automata' 
                        ? `שלום! 👋 אני כאן לעזור לך עם שאלת האוטומטים.
                        
אני יכול לעזור לך ב:
• הבנת מה השאלה מבקשת
• חשיבה על איך לבנות את האוטומט
• הסברים על מצבים ומעברים
• טיפים לפתרון

מה תרצה לשאול?`
                        : `שלום! 👋 אני כאן לעזור לך עם השאלה.
                        
אני יכול לעזור לך ב:
• הבנת מה השאלה מבקשת
• הסבר על קונספטים ב-Java
• רעיונות לפתרון (בלי לתת את הקוד המלא)
• מציאת שגיאות בקוד שלך

מה תרצה לשאול?`;
                    
                    setMessages([{ role: 'assistant', content: welcomeMsg }]);
                }
            }, [isOpen, questionType]);
            
            const sendMessage = async () => {
                if (!input.trim() || loading) return;
                
                const userMessage = input.trim();
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMessage }]);
                setLoading(true);
                
                try {
                    // Build conversation history for API
                    const apiMessages = [
                        ...messages.filter(m => m.role !== 'system').map(m => ({
                            role: m.role,
                            content: m.content
                        })),
                        { role: 'user', content: userMessage }
                    ];
                    
                    const response = await AIService.chat(apiMessages, {
                        questionText: questionText || '',
                        currentCode: currentCode || '',
                        questionType: questionType || 'code',
                        automataType: automataType || 'DFA'
                    });
                    
                    setMessages(prev => [...prev, { role: 'assistant', content: response }]);
                } catch (error) {
                    setMessages(prev => [...prev, { 
                        role: 'assistant', 
                        content: `מצטער, יש בעיה בחיבור. נסי שוב עוד רגע. 🙁\n\n(${error.message})` 
                    }]);
                } finally {
                    setLoading(false);
                }
            };
            
            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            };
            
            const clearChat = () => {
                setMessages([]);
            };
            
            if (!isOpen) return null;
            
            return (
                <div className="fixed bottom-4 left-4 w-96 max-w-[calc(100vw-2rem)] bg-slate-800 rounded-xl shadow-2xl border border-slate-600 z-50 flex flex-col" style={{ maxHeight: '70vh' }}>
                    {/* Header */}
                    <div className="flex items-center justify-between p-3 bg-gradient-to-r from-purple-600 to-blue-600 rounded-t-xl">
                        <div className="flex items-center gap-2 text-white font-bold">
                            <span className="text-xl">🤖</span>
                            <span>עוזר AI</span>
                            <span className="text-xs bg-white/20 px-2 py-0.5 rounded">Gemini</span>
                        </div>
                        <div className="flex items-center gap-1">
                            <button 
                                onClick={clearChat}
                                className="p-1.5 hover:bg-white/20 rounded text-white/80 hover:text-white"
                                title="נקה צ'אט"
                            >
                                🗑️
                            </button>
                            <button 
                                onClick={onClose}
                                className="p-1.5 hover:bg-white/20 rounded text-white/80 hover:text-white"
                            >
                                ✕
                            </button>
                        </div>
                    </div>
                    
                    {/* Messages */}
                    <div className="flex-1 overflow-y-auto p-3 space-y-3" style={{ minHeight: '200px', maxHeight: '400px' }}>
                        {messages.map((msg, idx) => (
                            <div 
                                key={idx}
                                className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}
                            >
                                <div 
                                    className={`max-w-[85%] p-3 rounded-lg whitespace-pre-wrap text-sm ${
                                        msg.role === 'user' 
                                            ? 'bg-blue-600 text-white rounded-br-sm' 
                                            : 'bg-slate-700 text-gray-200 rounded-bl-sm'
                                    }`}
                                >
                                    {msg.content}
                                </div>
                            </div>
                        ))}
                        
                        {loading && (
                            <div className="flex justify-start">
                                <div className="bg-slate-700 text-gray-200 p-3 rounded-lg rounded-bl-sm">
                                    <div className="flex items-center gap-2">
                                        <div className="spinner w-4 h-4"></div>
                                        <span className="text-sm">חושב...</span>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        <div ref={messagesEndRef} />
                    </div>
                    
                    {/* Input */}
                    <div className="p-3 border-t border-slate-600">
                        <div className="flex gap-2">
                            <textarea
                                ref={inputRef}
                                value={input}
                                onChange={e => setInput(e.target.value)}
                                onKeyDown={handleKeyDown}
                                placeholder="שאל שאלה..."
                                className="flex-1 px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
                                rows={2}
                                disabled={loading}
                            />
                            <button
                                onClick={sendMessage}
                                disabled={!input.trim() || loading}
                                className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed self-end"
                            >
                                📤
                            </button>
                        </div>
                        <p className="text-xs text-gray-500 mt-1 text-center">
                            Enter לשליחה • Shift+Enter לשורה חדשה
                        </p>
                    </div>
                </div>
            );
        };

        // ===== דף עזר / מילון מונחים ל-Java — חומר עזר מהיר לתלמידה =====
        const CHEAT_TABS = [

        const JavaCheatSheet = () => {

        // Main App
        const App = () => {
            // Auth state
            const [user, setUser] = useState(null);

            const [studentName, setStudentName] = useState('');
            const [studentGrade, setStudentGrade] = useState(''); // יא, י, יב
            const [studentApproved, setStudentApproved] = useState(null); // null=unknown, false=pending, true=approved
            const [nameEntered, setNameEntered] = useState(false);
            const [profileLoading, setProfileLoading] = useState(true);
            const [dataLoading, setDataLoading] = useState(true); // Loading data from Firebase
            
            // App state

                    }));
