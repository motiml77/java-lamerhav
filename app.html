                                </div>
                            );
                        })()}
                        {/* the manifested children */}
                        <div style={{ display: 'flex', justifyContent: 'center', gap: 22, flexWrap: 'wrap' }}>
                            {st.objs.map(o => <ObjectCard key={o.id} o={o} fillF={st.fill && st.fill.id === o.id ? st.fill.f : null} />)}
                        </div>
                    </div>
                    {/* code */}
                    <div style={{ padding: '12px 0', background: '#21262E', direction: 'ltr', borderTop: '1px solid rgba(148,163,184,0.12)' }}>
                        {code.map((ln, idx) => {
                            const isClassBlock = st.line === 0 && idx >= 0 && idx <= 3;
                            const on = st.line === idx || isClassBlock;
                            return (
                                <div key={idx} style={{ display: 'flex', fontFamily: "'JetBrains Mono', monospace", fontSize: 13, lineHeight: '1.9', background: on ? 'rgba(251,191,36,0.12)' : 'transparent', borderInlineStart: on ? '3px solid #FBBF24' : '3px solid transparent', paddingInlineEnd: 12 }}>
                                    <span style={{ width: 32, textAlign: 'right', color: (st.line === idx) ? '#FBBF24' : '#4B5263', paddingInlineEnd: 12, flexShrink: 0, userSelect: 'none', fontWeight: st.line === idx ? 800 : 400 }}>{st.line === idx ? '▶' : idx + 1}</span>
                                    <span style={{ color: on ? '#FDE68A' : '#ABB2BF', whiteSpace: 'pre' }}>{ln}</span>

                    </div>
                    {/* explanation */}
                    <div style={{ padding: '14px 16px' }}>
                        <div style={{ display: 'flex', gap: 9, alignItems: 'flex-start', background: 'rgba(124,58,237,0.1)', border: '1px solid rgba(167,139,250,0.28)', borderRadius: 11, padding: '11px 14px' }}>
                            <span style={{ color: '#A78BFA', flexShrink: 0, marginTop: 1 }}><Icon name="spark" size={15} /></span>
                            <span style={{ color: '#DDD6FE', fontSize: 14, lineHeight: 1.6 }}>{st.desc}</span>
                        </div>
                    </div>
                    {/* controls */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '12px 16px', borderTop: '1px solid rgba(148,163,184,0.12)' }}>
                        <button onClick={() => { setPlay(false); setI(Math.max(0, i - 1)); }} disabled={i === 0} className="btn btn-ghost btn-sm" style={{ opacity: i === 0 ? 0.4 : 1 }}><Icon name="arrowRight" size={14} /> אחורה</button>
                        <button onClick={() => { if (i >= steps.length - 1) { setI(0); setPlay(true); } else setPlay(!play); }} className="btn btn-solid btn-sm">{play ? 'השהיה' : i >= steps.length - 1 ? 'הרצה מחדש' : 'הרצה'} <Icon name={play ? 'eyeOff' : 'play'} size={14} /></button>
                        <button onClick={() => { setPlay(false); setI(Math.min(steps.length - 1, i + 1)); }} disabled={i >= steps.length - 1} className="btn btn-ghost btn-sm" style={{ opacity: i >= steps.length - 1 ? 0.4 : 1 }}>קדימה <Icon name="arrowLeft" size={14} /></button>
                        <span style={{ marginInlineStart: 'auto', color: '#64748B', fontSize: 12 }}>אידאה אחת · מימושים רבים</span>
                    </div>
                </div>
            );
        };

        // ===== Interactive recursion visualizer — call-stack windows open downward, collapse back up =====
        const RecursionViz = () => {
            const clone = (fr) => fr.map(f => ({ ...f }));
            // Each frame carries its full live computation so every window shows its own trace.
            const genRec = ({ fnName, code, baseCheckLine, baseReturnLine, recLine, n0, baseVal, combine, opSym, lhsFn }) => {
                const steps = [];
                const childCall = (n) => `${fnName}(${n - 1})`;
                let frames = [];
                // ---- descent: open a window per call ----
                for (let n = n0; n >= 0; n--) {
                    frames = frames.map(f => ({ ...f, state: 'waiting', curLine: null }));
                    const fr = { n, isBase: n === 0, lhs: n === 0 ? null : String(lhsFn(n)), op: opSym, childCall: n === 0 ? null : childCall(n), childVal: null, result: null, state: 'active', curLine: baseCheckLine };
                    frames = [...frames, fr];
                    if (n === 0) {
                        steps.push({ frames: clone(frames), line: baseCheckLine, dir: 'down', desc: `נפתח חלון חדש: ${fnName}(0). השורה הראשונה בודקת — n == 0 ? כאן כן!` });
                        frames = frames.map((f, idx) => idx === frames.length - 1 ? { ...f, result: baseVal, state: 'base', curLine: baseReturnLine } : f);
                        steps.push({ frames: clone(frames), line: baseReturnLine, dir: 'base', desc: `תנאי העצירה! ${fnName}(0) מחזיר ${baseVal} מיד — בלי לקרוא לעצמו שוב. מכאן מתחילה ה"חזרה" למעלה.` });
                    } else {
                        steps.push({ frames: clone(frames), line: baseCheckLine, dir: 'down', desc: `נפתח חלון חדש: ${fnName}(${n}). בודקים n == 0 ? לא — ממשיכים לשורת ה-return.` });
                        frames = frames.map((f, idx) => idx === frames.length - 1 ? { ...f, curLine: recLine } : f);
                        steps.push({ frames: clone(frames), line: recLine, dir: 'down', desc: `כדי לחשב ${lhsFn(n)} ${opSym} ${childCall(n)} צריך קודם את ${childCall(n)}. החלון של ${fnName}(${n}) "מושהה" וממתין לתשובה — נפתח חלון חדש מתחתיו.` });
                    }
                }
                // ---- ascent: collapse windows, carry the answer up ----
                let childVal = baseVal;
                for (let n = 1; n <= n0; n++) {
                    frames = frames.slice(0, -1); // child window closes
                    const myVal = combine(n, childVal);
                    const cv = childVal;
                    frames = frames.map((f, idx) => idx === frames.length - 1 ? { ...f, childVal: cv, result: myVal, state: 'returning', curLine: recLine } : { ...f, state: 'waiting', curLine: null });
                    steps.push({ frames: clone(frames), line: recLine, dir: 'up', desc: `${fnName}(${n - 1}) החזיר ${cv}, וחלונו נסגר. עכשיו ${fnName}(${n}) מציב את הערך: ${lhsFn(n)} ${opSym} ${cv} = ${myVal} — ומחזיר ${myVal} כלפי מעלה.` });
                    childVal = myVal;
                }
                steps.push({ frames: [], line: -1, dir: 'done', finished: true, result: `${fnName}(${n0}) = ${childVal}`, desc: `כל החלונות נסגרו ונאספו בחזרה אל הקריאה הראשונה. התשובה הסופית: ${childVal}.` });
                return { code, steps };
            };
            const DEMOS = {
                fact: { label: 'עצרת (factorial)', note: 'factorial(n) = n × (n-1) × ... × 1', ...genRec({
                    fnName: 'factorial', n0: 3, baseVal: 1, combine: (n, c) => n * c, opSym: '×', lhsFn: (n) => n,
                    code: ['int factorial(int n) {', '  if (n == 0)', '    return 1;', '  return n * factorial(n-1);', '}'],
                    baseCheckLine: 1, baseReturnLine: 2, recLine: 3,
                }) },
                sum: { label: 'סכום 1..n', note: 'sum(n) = n + (n-1) + ... + 0', ...genRec({
                    fnName: 'sum', n0: 3, baseVal: 0, combine: (n, c) => n + c, opSym: '+', lhsFn: (n) => n,
                    code: ['int sum(int n) {', '  if (n == 0) return 0;', '  return n + sum(n-1);', '}'],
                    baseCheckLine: 1, baseReturnLine: 1, recLine: 2,
                }) },
                power: { label: 'חזקה 2^n', note: 'power(n) = 2 × 2 × ... (n פעמים)', ...genRec({
                    fnName: 'power', n0: 3, baseVal: 1, combine: (n, c) => 2 * c, opSym: '×', lhsFn: () => 2,
                    code: ['int power(int n) {', '  if (n == 0) return 1;', '  return 2 * power(n-1);', '}'],
                    baseCheckLine: 1, baseReturnLine: 1, recLine: 2,
                }) },
            };
            const TABS = Object.keys(DEMOS);
            const [mode, setMode] = useState('fact');
            const [i, setI] = useState(0);
            const [play, setPlay] = useState(false);
            const demo = DEMOS[mode];
            const steps = demo.steps;
            useEffect(() => { setI(0); setPlay(false); }, [mode]);
            useEffect(() => {
                if (!play) return;
                if (i >= steps.length - 1) { setPlay(false); return; }
                const t = setTimeout(() => setI(v => v + 1), 1400);
                return () => clearTimeout(t);
            }, [play, i, mode]);
            const st = steps[Math.min(i, steps.length - 1)];
            const fnName = mode === 'fact' ? 'factorial' : mode === 'sum' ? 'sum' : 'power';

            const frameStyle = (f) => {
                if (f.state === 'active') return { bd: '#FCD34D', bg: 'rgba(251,191,36,0.12)', tag: '#FCD34D', label: 'רץ עכשיו' };
                if (f.state === 'base') return { bd: '#6EE7B7', bg: 'rgba(16,185,129,0.12)', tag: '#6EE7B7', label: 'תנאי עצירה' };
                if (f.state === 'returning') return { bd: '#6EE7B7', bg: 'rgba(16,185,129,0.1)', tag: '#6EE7B7', label: 'מחזיר ↑' };
                return { bd: 'rgba(167,139,250,0.4)', bg: 'rgba(124,58,237,0.07)', tag: '#A78BFA', label: 'ממתין…' };
            };
            return (
                <div style={{ background: '#0E1424', border: '1px solid rgba(148,163,184,0.18)', borderRadius: 16, overflow: 'hidden', margin: '4px 0 8px' }}>
                    {/* tabs */}
                    <div style={{ padding: '9px 12px', borderBottom: '1px solid rgba(148,163,184,0.14)', background: 'rgba(124,58,237,0.1)' }}>
                        <div style={{ display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: 5 }}>
                            {TABS.map(k => (
                                <button key={k} onClick={() => setMode(k)} style={{ padding: '5px 13px', borderRadius: 8, border: 'none', cursor: 'pointer', fontFamily: "'Heebo', sans-serif", fontWeight: 700, fontSize: 12.5, background: mode === k ? 'linear-gradient(135deg,#7C3AED,#6366F1)' : 'rgba(51,65,85,0.5)', color: mode === k ? '#fff' : '#CBD5E1' }}>{DEMOS[k].label}</button>
                            ))}
                            <span style={{ marginInlineStart: 'auto', color: '#64748B', fontSize: 12, fontFamily: "'JetBrains Mono', monospace" }}>{i + 1}/{steps.length}</span>
                        </div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 8 }}>
                            <span style={{ fontSize: 11, fontWeight: 800, padding: '2px 9px', borderRadius: 999, background: st.dir === 'up' ? 'rgba(16,185,129,0.16)' : st.dir === 'base' ? 'rgba(16,185,129,0.16)' : st.dir === 'done' ? 'rgba(99,102,241,0.18)' : 'rgba(251,191,36,0.16)', color: st.dir === 'up' || st.dir === 'base' ? '#6EE7B7' : st.dir === 'done' ? '#A5B4FC' : '#FCD34D' }}>{st.dir === 'down' ? '↓ ירידה — נפתחים חלונות' : st.dir === 'base' ? '● תנאי עצירה' : st.dir === 'up' ? '↑ חזרה — נאספים למקור' : '✓ הושלם'}</span>
                            <span style={{ color: '#8b93a7', fontSize: 11.5, fontFamily: "'JetBrains Mono', monospace" }}>{demo.note}</span>
                        </div>
                    </div>
                    {/* call-stack windows */}
                    <div style={{ padding: '18px 18px 8px', direction: 'ltr', minHeight: 220, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 0 }}>
                        {st.frames.length === 0 && st.finished && (
                            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10, padding: '30px 0' }}>
                                <div style={{ width: 54, height: 54, borderRadius: '50%', background: 'rgba(16,185,129,0.15)', border: '2px solid #6EE7B7', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#6EE7B7' }}><Icon name="check" size={26} /></div>
                                <div style={{ color: '#fff', fontWeight: 800, fontSize: 22, fontFamily: "'JetBrains Mono', monospace" }}>{st.result}</div>
                            </div>
                        )}
                        {st.frames.map((f, idx) => {
                            const sty = frameStyle(f);
                            const depth = idx;
                            const trace = [];
                            trace.push({ t: `n = ${f.n}`, k: 'var' });
                            if (f.isBase) {
                                trace.push({ t: `n == 0 → return ${f.result}`, k: 'done' });
                            } else {
                                const childTxt = f.childVal == null ? `${f.childCall} = ?` : `${f.childCall} = ${f.childVal}`;
                                trace.push({ t: `return ${f.lhs} ${f.op} ${f.childCall}`, k: 'expr' });
                                trace.push({ t: childTxt, k: f.childVal == null ? 'wait' : 'child' });
                                if (f.result != null) trace.push({ t: `${f.lhs} ${f.op} ${f.childVal} = ${f.result}`, k: 'done' });
                            }
                            const kColor = { var: '#94A3B8', expr: '#C7D2FE', wait: '#FCD34D', child: '#6EE7B7', done: '#6EE7B7' };
                            return (
                                <div key={idx} style={{ width: '100%', maxWidth: 460 - depth * 22, marginTop: idx === 0 ? 0 : 0, animation: (idx === st.frames.length - 1 && st.dir === 'down') ? 'popIn .4s cubic-bezier(.34,1.56,.64,1)' : 'none' }}>
                                    {idx > 0 && <div style={{ display: 'flex', justifyContent: 'center', color: '#5b5191', margin: '2px 0' }}><svg width="16" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 5v14M6 13l6 6 6-6"/></svg></div>}
                                    <div style={{ border: '2px solid ' + sty.bd, background: sty.bg, borderRadius: 11, padding: '9px 12px', boxShadow: f.state === 'active' ? '0 0 22px rgba(251,191,36,0.22)' : f.state === 'returning' ? '0 0 22px rgba(16,185,129,0.18)' : 'none', transition: 'all .3s' }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
                                            <span style={{ fontFamily: "'JetBrains Mono', monospace", fontWeight: 800, fontSize: 15, color: '#fff' }}>{fnName}({f.n})</span>
                                            <span style={{ marginInlineStart: 'auto', fontSize: 11, fontWeight: 700, color: sty.tag }}>{sty.label}</span>
                                            {f.result != null && <span style={{ background: 'rgba(16,185,129,0.2)', color: '#6EE7B7', borderRadius: 7, padding: '3px 10px', fontFamily: "'JetBrains Mono', monospace", fontWeight: 800, fontSize: 13.5 }}>↑ {f.result}</span>}
                                        </div>
                                        <div style={{ direction: 'ltr', textAlign: 'left', display: 'flex', flexDirection: 'column', gap: 2, borderTop: '1px solid rgba(148,163,184,0.12)', paddingTop: 6 }}>
                                            {trace.map((ln, li) => (
                                                <div key={li} style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12.5, fontWeight: ln.k === 'done' ? 800 : 600, color: kColor[ln.k], display: 'flex', alignItems: 'center', gap: 6 }}>
                                                    {ln.k === 'wait' && <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#FCD34D', display: 'inline-block', animation: 'llread 1.2s ease-in-out infinite' }}></span>}
                                                    {ln.k === 'done' && <span style={{ color: '#34D399' }}>✓</span>}
                                                    {ln.t}
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                    {/* code */}
                    <div style={{ padding: '12px 0', background: '#21262E', direction: 'ltr', borderTop: '1px solid rgba(148,163,184,0.12)', marginTop: 10 }}>
                        {demo.code.map((ln, idx) => (
                            <div key={idx} style={{ display: 'flex', fontFamily: "'JetBrains Mono', monospace", fontSize: 12.5, lineHeight: '1.85', background: st.line === idx ? 'rgba(251,191,36,0.12)' : 'transparent', borderInlineStart: st.line === idx ? '3px solid #FBBF24' : '3px solid transparent', paddingInlineEnd: 12 }}>
                                <span style={{ width: 30, textAlign: 'right', color: st.line === idx ? '#FBBF24' : '#4B5263', paddingInlineEnd: 10, flexShrink: 0, userSelect: 'none', fontWeight: st.line === idx ? 800 : 400 }}>{st.line === idx ? '▶' : idx + 1}</span>
                                <span style={{ color: st.line === idx ? '#FDE68A' : '#ABB2BF', whiteSpace: 'pre' }}>{ln}</span>
                            </div>
                        ))}
                    </div>
                    {/* explanation */}
                    <div style={{ padding: '14px 16px 4px' }}>
                        <div style={{ display: 'flex', gap: 9, alignItems: 'flex-start', background: 'rgba(124,58,237,0.1)', border: '1px solid rgba(167,139,250,0.28)', borderRadius: 11, padding: '11px 14px' }}>
                            <span style={{ color: '#A78BFA', flexShrink: 0, marginTop: 1 }}><Icon name="spark" size={15} /></span>
                            <span style={{ color: '#DDD6FE', fontSize: 14, lineHeight: 1.6 }}>{st.desc}</span>
                        </div>
                    </div>
                    {/* controls */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '12px 16px' }}>
                        <button onClick={() => { setPlay(false); setI(Math.max(0, i - 1)); }} disabled={i === 0} className="btn btn-ghost btn-sm" style={{ opacity: i === 0 ? 0.4 : 1 }}><Icon name="arrowRight" size={14} /> אחורה</button>
                        <button onClick={() => { if (i >= steps.length - 1) { setI(0); setPlay(true); } else setPlay(!play); }} className="btn btn-solid btn-sm">{play ? 'השהיה' : i >= steps.length - 1 ? 'הרצה מחדש' : 'הרצה'} <Icon name={play ? 'eyeOff' : 'play'} size={14} /></button>
                        <button onClick={() => { setPlay(false); setI(Math.min(steps.length - 1, i + 1)); }} disabled={i >= steps.length - 1} className="btn btn-ghost btn-sm" style={{ opacity: i >= steps.length - 1 ? 0.4 : 1 }}>קדימה <Icon name="arrowLeft" size={14} /></button>
                        <span style={{ marginInlineStart: 'auto', color: '#8b93a7', fontSize: 11.5 }}>חלונות נפתחים בירידה, נאספים בעלייה</span>
                    </div>
                </div>
            );
        };

        // ===== Interactive array visualizer — multiple traversal patterns, line-by-line =====
        const ArrayViz = () => {
            const ARR = [85, 40, 92, 78];
            const mkVars = (o) => o;
            // ---- builders ----
            const genSum = () => {
                const code = ['int sum = 0;', 'for (int i = 0; i < arr.length; i++)', '    sum += arr[i];'];
                const steps = [{ line: 0, cur: -1, vars: { sum: 0 }, desc: 'מתחילים עם משתנה צובר: sum = 0, לפני הלולאה.' }];
                let sum = 0;
                ARR.forEach((v, i) => {
                    steps.push({ line: 1, cur: i, vars: { i, sum }, desc: `i = ${i} — נכנסים ללולאה וניגשים ל-arr[${i}] שהוא ${v}.` });
                    const prev = sum; sum += v;
                    steps.push({ line: 2, cur: i, hot: 'sum', vars: { i, sum }, desc: `sum = ${prev} + ${v} = ${sum}. צוברים את התא הנוכחי.` });
                });
                steps.push({ line: -1, cur: -1, vars: { sum }, finished: true, result: `הסכום = ${sum}`, desc: `סיימנו לעבור על כל התאים. הסכום הכולל: ${sum}.` });
                return { label: 'סכום', title: 'סכום כל האיברים', note: 'דפוס "משתנה צובר".', code, steps, order: ['i', 'sum'] };
            };
            const genMax = () => {
                const code = ['int max = arr[0];', 'for (int i = 1; i < arr.length; i++)', '    if (arr[i] > max)', '        max = arr[i];'];
                const steps = [{ line: 0, cur: 0, hot: 'max', vars: { max: ARR[0] }, desc: `מניחים שהתא הראשון הוא הגדול: max = arr[0] = ${ARR[0]}.` }];
                let max = ARR[0];
                for (let i = 1; i < ARR.length; i++) {
                    steps.push({ line: 1, cur: i, vars: { i, max }, desc: `i = ${i} — בודקים את arr[${i}] = ${ARR[i]}.` });
                    steps.push({ line: 2, cur: i, vars: { i, max }, desc: `האם ${ARR[i]} > ${max}? ${ARR[i] > max ? 'כן — נעדכן' : 'לא — נשאיר'}.` });
                    if (ARR[i] > max) { max = ARR[i]; steps.push({ line: 3, cur: i, hot: 'max', vars: { i, max }, desc: `max מתעדכן ל-${max}.` }); }
                }
                steps.push({ line: -1, cur: -1, vars: { max }, finished: true, result: `מקסימום = ${max}`, desc: `המקסימום במערך הוא ${max}.` });
                return { label: 'מקסימום', title: 'מציאת הערך הגדול ביותר', note: 'שומרים את הקיצוני שראינו עד כה.', code, steps, order: ['i', 'max'] };
            };
            const genCount = () => {
                const code = ['int count = 0;', 'for (int i = 0; i < arr.length; i++)', '    if (arr[i] >= 56)', '        count++;'];
                const steps = [{ line: 0, cur: -1, vars: { count: 0 }, desc: 'סופרים כמה ציונים עוברים (≥56). מונה count = 0.' }];
                let count = 0;
                ARR.forEach((v, i) => {
                    steps.push({ line: 1, cur: i, vars: { i, count }, desc: `i = ${i} — בודקים את arr[${i}] = ${v}.` });
                    const pass = v >= 56;
                    steps.push({ line: 2, cur: i, vars: { i, count }, desc: `האם ${v} ≥ 56? ${pass ? 'כן — נספור' : 'לא — נדלג'}.` });
                    if (pass) { count++; steps.push({ line: 3, cur: i, hot: 'count', vars: { i, count }, desc: `count עולה ל-${count}.` }); }
                });
                steps.push({ line: -1, cur: -1, vars: { count }, finished: true, result: `עוברים = ${count}`, desc: `${count} מתוך ${ARR.length} הציונים עוברים.` });
                return { label: 'ספירה', title: 'ספירה לפי תנאי (ציונים עוברים)', note: 'מונה שמתקדם רק כשהתנאי מתקיים.', code, steps, order: ['i', 'count'] };
            };
            const genSearch = () => {
                const target = 92;
                const code = ['boolean found = false;', 'for (int i = 0; i < arr.length; i++)', '    if (arr[i] == 92)', '        found = true;'];
                const steps = [{ line: 0, cur: -1, vars: { found: 'false' }, desc: `מחפשים את הערך ${target}. דגל found = false.` }];
                let done = false;
                for (let i = 0; i < ARR.length && !done; i++) {
                    steps.push({ line: 1, cur: i, vars: { i, found: 'false' }, desc: `i = ${i} — בודקים את arr[${i}] = ${ARR[i]}.` });
                    steps.push({ line: 2, cur: i, vars: { i, found: 'false' }, desc: `האם ${ARR[i]} == ${target}? ${ARR[i] === target ? 'כן — מצאנו!' : 'לא — ממשיכים'}.` });
                    if (ARR[i] === target) { done = true; steps.push({ line: 3, cur: i, hot: 'found', foundIdx: i, vars: { i, found: 'true' }, finished: true, result: `נמצא במקום ${i}`, desc: `מצאנו את ${target} באינדקס ${i}! מסמנים found = true.` }); }
                }
                return { label: 'חיפוש', title: `חיפוש לינארי של הערך 92`, note: 'עוברים עד שמוצאים — או עד הסוף.', code, steps, order: ['i', 'found'] };
            };
            const genReverse = () => {
                const code = ['int l = 0, r = arr.length - 1;', 'while (l < r) {', '    int t = arr[l];', '    arr[l] = arr[r];', '    arr[r] = t;', '    l++; r--;', '}'];
                let a = [...ARR];
                const steps = [{ line: 0, arr: [...a], l: 0, r: a.length - 1, vars: { l: 0, r: a.length - 1 }, desc: `שני מצביעים: l=0 (התחלה), r=${a.length - 1} (סוף). נחליף ונתקדם פנימה.` }];
                let l = 0, r = a.length - 1;
                while (l < r) {
                    steps.push({ line: 1, arr: [...a], l, r, vars: { l, r }, desc: `l=${l} < r=${r}? כן — נכנסים ונחליף בין arr[${l}] ל-arr[${r}].` });
                    const t = a[l]; a[l] = a[r]; a[r] = t;
                    steps.push({ line: 4, arr: [...a], l, r, swap: [l, r], vars: { l, r }, desc: `החלפנו: arr[${l}] ↔ arr[${r}]. עכשיו ${a[l]} ו-${a[r]}.` });
                    l++; r--;
                    steps.push({ line: 5, arr: [...a], l, r, vars: { l, r }, desc: `מתקדמים פנימה: l=${l}, r=${r}.` });
                }
                steps.push({ line: -1, arr: [...a], l, r, finished: true, result: `הפוך: [${a.join(', ')}]`, desc: `l ו-r נפגשו — סיימנו. המערך התהפך במקום: [${a.join(', ')}].` });
                return { label: 'היפוך', title: 'היפוך מערך במקום (שני מצביעים)', note: 'l מההתחלה, r מהסוף — נפגשים באמצע.', code, steps, order: ['l', 'r'] };
            };
            const DEMOS = { sum: genSum(), max: genMax(), count: genCount(), search: genSearch(), reverse: genReverse() };
            const TABS = Object.keys(DEMOS);
            const [mode, setMode] = useState('sum');
            const [i, setI] = useState(0);
            const [play, setPlay] = useState(false);
            const demo = DEMOS[mode];
            const steps = demo.steps;
            useEffect(() => { setI(0); setPlay(false); }, [mode]);
            useEffect(() => {
                if (!play) return;
                if (i >= steps.length - 1) { setPlay(false); return; }
                const t = setTimeout(() => setI(v => v + 1), 1150);
                return () => clearTimeout(t);
            }, [play, i, mode]);
            const st = steps[Math.min(i, steps.length - 1)];
            const arr = st.arr || ARR;
            const cellState = (idx) => {
                if (st.swap && st.swap.includes(idx)) return 'swap';
                if (st.foundIdx === idx) return 'found';
                if (st.l === idx) return 'left';
                if (st.r === idx) return 'right';
                if (st.cur === idx) return 'cur';
                return 'normal';
            };
            const CELL = {
                normal: { bg: 'linear-gradient(150deg,#A78BFA,#7C6BF0)', bd: '#A78BFA', c: '#fff' },
                cur:    { bg: 'linear-gradient(150deg,#FCD34D,#F59E0B)', bd: '#FCD34D', c: '#3a2a05' },
                left:   { bg: 'linear-gradient(150deg,#60A5FA,#3B82F6)', bd: '#93C5FD', c: '#fff' },
                right:  { bg: 'linear-gradient(150deg,#F472B6,#DB2777)', bd: '#F9A8D4', c: '#fff' },
                swap:   { bg: 'linear-gradient(150deg,#6EE7B7,#10B981)', bd: '#6EE7B7', c: '#06281c' },
                found:  { bg: 'linear-gradient(150deg,#6EE7B7,#10B981)', bd: '#6EE7B7', c: '#06281c' },
            };
            return (
                <div style={{ background: '#0E1424', border: '1px solid rgba(148,163,184,0.18)', borderRadius: 16, overflow: 'hidden', margin: '4px 0 8px' }}>
                    <div style={{ padding: '9px 12px', borderBottom: '1px solid rgba(148,163,184,0.14)', background: 'rgba(124,58,237,0.1)' }}>
                        <div style={{ display: 'flex', alignItems: 'center', flexWrap: 'wrap', gap: 5 }}>
                            {TABS.map(k => (
                                <button key={k} onClick={() => setMode(k)} style={{ padding: '5px 13px', borderRadius: 8, border: 'none', cursor: 'pointer', fontFamily: "'Heebo', sans-serif", fontWeight: 700, fontSize: 12.5, background: mode === k ? 'linear-gradient(135deg,#7C3AED,#6366F1)' : 'rgba(51,65,85,0.5)', color: mode === k ? '#fff' : '#CBD5E1' }}>{DEMOS[k].label}</button>
                            ))}
                            <span style={{ marginInlineStart: 'auto', color: '#64748B', fontSize: 12, fontFamily: "'JetBrains Mono', monospace" }}>{i + 1}/{steps.length}</span>
                        </div>
                        <div style={{ color: '#DDD6FE', fontWeight: 800, fontSize: 13.5, marginTop: 8 }}>{demo.title}</div>
                    </div>
                    {/* array */}
                    <div style={{ padding: '22px 18px 6px', direction: 'ltr', display: 'flex', justifyContent: 'center', gap: 8, flexWrap: 'wrap' }}>
                        {arr.map((v, idx) => {
                            const s = CELL[cellState(idx)];
                            const ptr = st.l === idx && st.r === idx ? 'l,r' : st.l === idx ? 'l' : st.r === idx ? 'r' : (st.cur === idx ? 'i' : '');
                            return (
                                <div key={idx} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                                    <div style={{ height: 16, fontFamily: "'JetBrains Mono', monospace", fontSize: 11, fontWeight: 800, color: ptr === 'l' ? '#93C5FD' : ptr === 'r' ? '#F9A8D4' : ptr === 'i' ? '#FCD34D' : ptr === 'l,r' ? '#C4B5FD' : 'transparent' }}>{ptr}</div>
                                    <div style={{ width: 54, height: 50, borderRadius: 10, border: '2px solid ' + s.bd, background: s.bg, color: s.c, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: 19, fontFamily: "'JetBrains Mono', monospace", transition: 'all .3s', animation: cellState(idx) === 'swap' ? 'popIn .4s ease-out' : 'none' }}>{v}</div>
                                    <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 10.5, color: '#64748B' }}>[{idx}]</div>
                                </div>
                            );
                        })}
                    </div>
                    {/* variables tracker */}
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, flexWrap: 'wrap', padding: '6px 16px 0' }}>
                        {demo.order.filter(k => st.vars && st.vars[k] !== undefined).map(k => (
                            <span key={k} style={{ background: st.hot === k ? 'rgba(16,185,129,0.18)' : 'rgba(15,23,42,0.6)', border: '1px solid ' + (st.hot === k ? '#34D399' : 'rgba(148,163,184,0.2)'), borderRadius: 8, padding: '4px 12px', fontFamily: "'JetBrains Mono', monospace", fontSize: 13, fontWeight: 700, color: st.hot === k ? '#6EE7B7' : '#E2E8F0', transition: 'all .25s' }}>{k} = {String(st.vars[k])}</span>
                        ))}
                    </div>
                    {/* code */}
                    <div style={{ padding: '12px 0', background: '#21262E', direction: 'ltr', borderTop: '1px solid rgba(148,163,184,0.12)', marginTop: 12 }}>
                        {demo.code.map((ln, idx) => (
                            <div key={idx} style={{ display: 'flex', fontFamily: "'JetBrains Mono', monospace", fontSize: 12.5, lineHeight: '1.85', background: st.line === idx ? 'rgba(251,191,36,0.12)' : 'transparent', borderInlineStart: st.line === idx ? '3px solid #FBBF24' : '3px solid transparent', paddingInlineEnd: 12 }}>
                                <span style={{ width: 30, textAlign: 'right', color: st.line === idx ? '#FBBF24' : '#4B5263', paddingInlineEnd: 10, flexShrink: 0, userSelect: 'none', fontWeight: st.line === idx ? 800 : 400 }}>{st.line === idx ? '▶' : idx + 1}</span>
                                <span style={{ color: st.line === idx ? '#FDE68A' : '#ABB2BF', whiteSpace: 'pre' }}>{ln}</span>
                            </div>
                        ))}
                    </div>
                    {/* result + explanation */}
                    <div style={{ padding: '14px 16px 4px', display: 'flex', flexDirection: 'column', gap: 9 }}>
                        {st.result && <div style={{ alignSelf: 'flex-start', display: 'inline-flex', alignItems: 'center', gap: 7, background: 'rgba(16,185,129,0.14)', border: '1px solid rgba(16,185,129,0.4)', color: '#6EE7B7', borderRadius: 9, padding: '6px 14px', fontWeight: 800, fontSize: 14, fontFamily: "'JetBrains Mono', monospace" }}><Icon name="check" size={14} /> {st.result}</div>}

                            <span style={{ color: '#A78BFA', flexShrink: 0, marginTop: 1 }}><Icon name="spark" size={15} /></span>
                            <span style={{ color: '#DDD6FE', fontSize: 14, lineHeight: 1.6 }}>{st.desc}</span>
                        </div>
                    </div>
                    {/* controls */}
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '12px 16px' }}>
                        <button onClick={() => { setPlay(false); setI(Math.max(0, i - 1)); }} disabled={i === 0} className="btn btn-ghost btn-sm" style={{ opacity: i === 0 ? 0.4 : 1 }}><Icon name="arrowRight" size={14} /> אחורה</button>
                        <button onClick={() => { if (i >= steps.length - 1) { setI(0); setPlay(true); } else setPlay(!play); }} className="btn btn-solid btn-sm">{play ? 'השהיה' : i >= steps.length - 1 ? 'הרצה מחדש' : 'הרצה'} <Icon name={play ? 'eyeOff' : 'play'} size={14} /></button>
                        <button onClick={() => { setPlay(false); setI(Math.min(steps.length - 1, i + 1)); }} disabled={i >= steps.length - 1} className="btn btn-ghost btn-sm" style={{ opacity: i >= steps.length - 1 ? 0.4 : 1 }}>קדימה <Icon name="arrowLeft" size={14} /></button>
                        <span style={{ marginInlineStart: 'auto', color: '#8b93a7', fontSize: 11.5 }}>{demo.note}</span>
                    </div>
                </div>
            );
        };

        // ===== Interactive queue & stack visualizer — FIFO / LIFO, step by step =====
        const QueueStackViz = () => {

                    kind: 'queue', label: 'תור (Queue)', title: 'תור · FIFO — הראשון שנכנס יוצא ראשון', note: 'הוספה בזנב, הוצאה מהראש.',
                    code: ['Queue<Integer> q = new Queue<>();', 'q.insert(10);', 'q.insert(20);', 'q.insert(30);', 'q.head();', 'q.remove();', 'q.remove();'],
                    steps: [
                        { arr: [], line: 0, out: [], desc: 'תור ריק. מוסיפים בזנב (insert) ומוציאים מהראש (remove). נראה איך זה שומר על סדר ההגעה.' },
                        { arr: [10], inIdx: 0, line: 1, out: [], desc: 'insert(10) — 10 נכנס לזנב התור.' },
                        { arr: [10, 20], inIdx: 1, line: 2, out: [], desc: 'insert(20) — 20 נכנס אחרי 10, בזנב.' },
                        { arr: [10, 20, 30], inIdx: 2, line: 3, out: [], desc: 'insert(30) — 30 נכנס בזנב. התור: 10 (ראש) → 20 → 30 (זנב).' },
                        { arr: [10, 20, 30], peekIdx: 0, line: 4, out: [], desc: 'head() — מציץ בראש (10) ומחזיר אותו, אבל לא מוציא! התור לא משתנה.' },
                        { arr: [20, 30], removed: 10, line: 5, out: [10], desc: 'remove() — מוציא את הראש 10 (הראשון שנכנס). נשארו 20, 30.' },
                        { arr: [30], removed: 20, line: 6, out: [10, 20], desc: 'remove() — מוציא את 20. הסדר נשמר בדיוק לפי ההגעה: קודם 10, אחר כך 20. זהו FIFO!', finished: true },
                    ],
                },
                stack: {
                    kind: 'stack', label: 'מחסנית (Stack)', title: 'מחסנית · LIFO — האחרון שנכנס יוצא ראשון', note: 'הכול קורה בקצה אחד — הראש.',
                    code: ['Stack<Integer> s = new Stack<>();', 's.push(10);', 's.push(20);', 's.push(30);', 's.top();', 's.pop();', 's.pop();'],
                    steps: [
                        { arr: [], line: 0, out: [], desc: 'מחסנית ריקה. מניחים למעלה (push) ומוציאים מלמעלה (pop) — כמו ערימת צלחות.' },
                        { arr: [10], inIdx: 0, line: 1, out: [], desc: 'push(10) — 10 מונח בתחתית.' },
                        { arr: [10, 20], inIdx: 1, line: 2, out: [], desc: 'push(20) — 20 מונח מעל 10.' },
                        { arr: [10, 20, 30], inIdx: 2, line: 3, out: [], desc: 'push(30) — 30 מונח למעלה. העליון (top) הוא 30.' },
                        { arr: [10, 20, 30], peekIdx: 2, line: 4, out: [], desc: 'top() — מציץ בעליון (30) ומחזיר אותו, בלי להוציא. המחסנית לא משתנה.' },
                        { arr: [10, 20], removed: 30, line: 5, out: [30], desc: 'pop() — מוציא את העליון 30 (האחרון שנכנס). נשארו 10, 20.' },
                        { arr: [10], removed: 20, line: 6, out: [30, 20], desc: 'pop() — מוציא את 20. שימי לב: 10 נכנס ראשון אבל עדיין בפנים — האחרון יוצא ראשון. זהו LIFO!', finished: true },
                    ],
                },
                reverse: {
                    kind: 'stack', label: 'היפוך', title: 'היפוך סדר בעזרת מחסנית', note: 'דוחפים הכול, שולפים הכול — והסדר מתהפך.',
                    code: ['// הופכים את 1, 2, 3', 's.push(1);', 's.push(2);', 's.push(3);', 'while (!s.isEmpty())', '    print(s.pop());'],
                    steps: [
                        { arr: [], line: 0, out: [], desc: 'נהפוך את הרצף 1, 2, 3. נדחוף את כולם למחסנית, ואז נשלוף — וזה ייצא הפוך.' },
                        { arr: [1], inIdx: 0, line: 1, out: [], desc: 'push(1).' },
                        { arr: [1, 2], inIdx: 1, line: 2, out: [], desc: 'push(2).' },
                        { arr: [1, 2, 3], inIdx: 2, line: 3, out: [], desc: 'push(3). המחסנית מלאה: 1 בתחתית, 3 למעלה.' },
                        { arr: [1, 2], removed: 3, line: 5, out: [3], desc: 'pop() מוציא את 3 (העליון) ומדפיס אותו ראשון.' },
                        { arr: [1], removed: 2, line: 5, out: [3, 2], desc: 'pop() מוציא את 2.' },
                        { arr: [], removed: 1, line: 5, out: [3, 2, 1], desc: 'pop() מוציא את 1 אחרון. הפלט: 3, 2, 1 — בדיוק הפוך מסדר הכניסה!', finished: true },
                    ],
                },
            };
            const TABS = Object.keys(DEMOS);
            const [mode, setMode] = useState('queue');
            const [i, setI] = useState(0);
            const [play, setPlay] = useState(false);
            const demo = DEMOS[mode];
            const steps = demo.steps;
            useEffect(() => { setI(0); setPlay(false); }, [mode]);
            useEffect(() => {
                if (!play) return;
                if (i >= steps.length - 1) { setPlay(false); return; }

            }, [play, i, mode]);
            const st = steps[Math.min(i, steps.length - 1)];

            const Box = ({ v, state, big }) => {

            };

            const diagram = demo.kind === 'queue' ? (
                <div style={{ padding: '24px 18px 8px', direction: 'ltr' }}>
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 14 }}>

                            <span style={{ color: '#FCA5A5', fontSize: 11.5, fontWeight: 700 }}>ראש · יוצא</span>
                            <span style={{ color: '#64748B', fontSize: 10 }}>remove</span>
                        </div>
                        {/* boxes */}
                        <div style={{ display: 'flex', alignItems: 'center', gap: 6, minHeight: 46, border: '2px dashed rgba(148,163,184,0.25)', borderRadius: 12, padding: '8px 10px', minWidth: 90 }}>
                            {st.arr.length === 0 ? <span style={{ color: '#64748B', fontSize: 13, padding: '0 14px' }}>ריק</span> : st.arr.map((v, k) => <Box key={k} v={v} state={stateOf(k)} />)}
                        </div>
                        {/* entry (tail) */}
                        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, width: 70, flexShrink: 0 }}>
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6EE7B7" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
                            <span style={{ color: '#6EE7B7', fontSize: 11.5, fontWeight: 700 }}>זנב · נכנס</span>
                            <span style={{ color: '#64748B', fontSize: 10 }}>insert</span>
                        </div>
                    </div>
                    {st.removed != null && <div style={{ textAlign: 'center', marginTop: 12 }}><span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, background: 'rgba(251,191,36,0.14)', border: '1px solid rgba(251,191,36,0.4)', color: '#FCD34D', borderRadius: 999, padding: '4px 12px', fontSize: 12.5, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace" }}>יצא: {st.removed}</span></div>}
                </div>
            ) : (
                <div style={{ padding: '18px 18px 8px', direction: 'ltr', display: 'flex', justifyContent: 'center', gap: 24 }}>
                    {/* stack column */}
                    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5 }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 6, color: '#FCD34D', fontSize: 11.5, fontWeight: 700, height: 18 }}>{st.arr.length > 0 && <><span>ראש (top)</span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M12 19V5M5 12l7-7 7 7"/></svg></>}</div>
                        <div style={{ display: 'flex', flexDirection: 'column-reverse', gap: 5, border: '2px dashed rgba(148,163,184,0.25)', borderTop: 'none', borderRadius: '0 0 12px 12px', padding: '8px 10px 10px', minHeight: 60, justifyContent: 'flex-start' }}>

                    {st.removed != null && <div style={{ alignSelf: 'center' }}><span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, background: 'rgba(251,191,36,0.14)', border: '1px solid rgba(251,191,36,0.4)', color: '#FCD34D', borderRadius: 999, padding: '4px 12px', fontSize: 12.5, fontWeight: 700, fontFamily: "'JetBrains Mono', monospace" }}>יצא: {st.removed}</span></div>}

            return (
                <div style={{ background: '#0E1424', border: '1px solid rgba(148,163,184,0.18)', borderRadius: 16, overflow: 'hidden', margin: '4px 0 8px' }}>

                    {/* diagram */}
                    {diagram}
