# 📚 הנחיות בדיקה
═══════════════════════════════════════════════════════════════

## 1. בדיקת מבנה האוטומט
✓ ודא שיש מצב התחלתי אחד ויחיד
✓ ודא שיש לפחות מצב מקבל אחד
✓ בדוק שכל המצבים נגישים מהמצב ההתחלתי

## 2. בדיקת נכונות השפה
🔍 בדוק האם האוטומט מזהה בדיוק את השפה הנדרשת!
- הרץ מנטלית מילים שאמורות להתקבל ומילים שאמורות להידחות
- בדוק מקרי קצה: מילה ריקה (ε), מילים קצרות, מילים ארוכות

## 3. בדיקות לפי סוג
- **DFA**: לכל מצב חייב מעבר אחד בדיוק לכל אות באלפבית
- **NFA**: מותרים מעברי ε ומספר מעברים לאותה אות
- **PDA**: בדוק שפעולות המחסנית הגיוניות

## 4. אם יש שגיאות - ציין בדיוק!
🎯 **חובה:** אם האוטומט שגוי, ציין בדיוק:
- איפה הבעיה? (באיזה מצב, באיזה מעבר)
- למה זו בעיה? (איזו מילה נכשלת)
- איך לתקן? (כיוון לפתרון, בלי לתת את התשובה המלאה)

דוגמה: "במצב q1 חסר מעבר על האות 'b'. בגלל זה המילה 'ab' לא מתקבלת למרות שהיא צריכה. נסה להוסיף מעבר מ-q1 על 'b'."

            async uploadImage(path, file) {
                if (!storage) throw new Error('Storage not initialized');
                const ref = storage.ref().child(path);
                if (file instanceof Blob || file instanceof File) {
                    await ref.put(file);
                } else if (typeof file === 'string' && file.startsWith('data:')) {
                    await ref.putString(file, 'data_url');
                } else {
                    throw new Error('Invalid file type');
                }
                return await ref.getDownloadURL();
            },
            async deleteImage(path) {
                if (!storage) return;
                try { await storage.ref().child(path).delete(); }
                catch (e) { if (e.code !== 'storage/object-not-found') console.error('Delete image error:', e); }

        // ActionMenu - dropdown menu for item actions (replaces inline icon buttons)
        const ActionMenu = ({ items, trigger }) => {
            const [open, setOpen] = React.useState(false);
            const menuRef = React.useRef(null);

            React.useEffect(() => {
                if (!open) return;
                const handleClickOutside = (e) => {
                    if (menuRef.current && !menuRef.current.contains(e.target)) setOpen(false);
                };
                document.addEventListener('mousedown', handleClickOutside);
                return () => document.removeEventListener('mousedown', handleClickOutside);
            }, [open]);

            return (
                <div className="action-dropdown" ref={menuRef}>
                    <button onClick={(e) => { e.stopPropagation(); setOpen(!open); }} className="p-1 hover:bg-slate-600 rounded text-gray-400 hover:text-white transition-colors">
                        {trigger || <Icon name="moreVert" size={16} />}
                    </button>
                    {open && (
                        <div className="action-dropdown-menu">
                            {items.map((item, i) => item.divider ? (
                                <div key={i} className="action-dropdown-divider" />
                            ) : (
                                <button key={i} className={`action-dropdown-item ${item.danger ? 'danger' : ''}`} onClick={(e) => { e.stopPropagation(); setOpen(false); item.onClick(); }}>
                                    {item.icon && <span className={item.danger ? 'text-red-400' : item.color || 'text-gray-400'}>{item.icon}</span>}
                                    {item.label}
                                </button>
                            ))}
                        </div>
                    )}
                </div>
            );

            async loadStudentScores(email) {
                if (!db || !email) return { exams: [], homeworks: [] };
                const safeEmail = email.replace(/[.@]/g, '_');
                try {
                    const exams = [];
                    const homeworks = [];
                    
                    // Load exam responses (using correct collection name with underscore)
                    const examSnapshot = await db.collection('exam_responses').get();
                    for (const examDoc of examSnapshot.docs) {
                        const studentDoc = await examDoc.ref.collection('students').doc(safeEmail).get();
                        if (studentDoc.exists) {
                            const data = studentDoc.data();
                            if (data.sentToStudent && data.finalGrade !== undefined) {
                                exams.push({ examId: examDoc.id, grade: data.finalGrade });
                            }
                        }
                    }
                    
                    // Load homework responses (using correct collection name with underscore)
                    const hwSnapshot = await db.collection('homework_responses').get();
                    for (const hwDoc of hwSnapshot.docs) {
                        const studentDoc = await hwDoc.ref.collection('students').doc(safeEmail).get();
                        if (studentDoc.exists) {
                            const data = studentDoc.data();
                            // Calculate homework score from AI feedback
                            let totalScore = 0;
                            let totalMax = 0;
                            Object.values(data.answers || {}).forEach(ans => {
                                if (ans.aiFeedback?.aiScore !== undefined) {
                                    totalScore += ans.aiFeedback.aiScore;
                                    totalMax += ans.aiFeedback.maxPoints || 100;
                                }
                            });
                            if (totalMax > 0) {
                                homeworks.push({ examId: hwDoc.id, grade: Math.round((totalScore / totalMax) * 100) });
                            }
                        }
                    }
                    
                    return { exams, homeworks };
                } catch (e) { console.error('Load student scores error:', e); return { exams: [], homeworks: [] }; }
            },

            async saveStudentAnswer(examId, examType, email, studentName, questionIndex, code, pasteAttempt = null, automataData = null) {
                const safeEmail = email.replace(/[.@]/g, '_');
                const collection = this.getResponseCollection(examType);
                if (!db) return false;
                try {
                    const docRef = db.collection(collection).doc(examId).collection('students').doc(safeEmail);
                    const doc = await docRef.get();
                    const existing = doc.exists ? doc.data() : {};
                    
                    // Ensure answers and pasteAttempts objects exist
                    if (!existing.answers) existing.answers = {};
                    if (!existing.pasteAttempts) existing.pasteAttempts = [];
                    
                    // Save either code or automata data
                    if (automataData) {
                        // Clean automata data - remove functions and undefined values for Firebase
                        const cleanAutomata = {
                            type: automataData.type || 'DFA',
                            states: (automataData.states || []).map(s => ({
                                id: s.id,
                                name: s.name,
                                x: s.x,
                                y: s.y,
                                isInitial: s.isInitial || false,
                                isAccepting: s.isAccepting || false
                            })),
                            transitions: (automataData.transitions || []).map(t => ({
                                id: t.id,
                                from: t.from,
                                to: t.to,
                                label: t.label || '',
                                stackPop: t.stackPop || '',
                                stackPush: t.stackPush || ''
                            }))
                        };
                        existing.answers[questionIndex] = { automata: cleanAutomata };
                    } else {
                        existing.answers[questionIndex] = { code: code || '' };
                    }
                    
                    existing.email = email;
                    existing.studentName = studentName;
                    existing.lastSaved = new Date().toISOString();
                    existing.examType = examType;
                    if (!existing.submitted) existing.submitted = false;
                    if (pasteAttempt) {
                        existing.pasteAttempts.push({
                            questionIndex,
                            content: pasteAttempt.substring(0, 500), // Limit size
                            timestamp: new Date().toISOString()
                        });
                    }
                    
                    // Clean undefined values before saving to Firebase
                    const cleanData = JSON.parse(JSON.stringify(existing, (key, value) => {
                        return value === undefined ? null : value;
                    }));
                    
                    await docRef.set(cleanData);
                    return true;
                } catch (e) { console.error('Save error:', e); return false; }
            },

            async saveAIFeedback(examId, examType, email, feedbackByQuestion) {
                const safeEmail = email.replace(/[.@]/g, '_');
                const collection = this.getResponseCollection(examType);
                if (!db) return false;
                try {
                    const docRef = db.collection(collection).doc(examId).collection('students').doc(safeEmail);
                    const doc = await docRef.get();
                    if (doc.exists) {
                        const data = doc.data();
                        const updatedAnswers = { ...data.answers };
                        Object.keys(feedbackByQuestion).forEach(qIdx => {
                            if (updatedAnswers[qIdx]) updatedAnswers[qIdx].aiFeedback = feedbackByQuestion[qIdx];
                        });
                        
                        // Clean undefined values
                        const cleanAnswers = JSON.parse(JSON.stringify(updatedAnswers, (key, value) => {
                            return value === undefined ? null : value;
                        }));
                        
                        await docRef.update({ 
                            answers: cleanAnswers, 
                            checkedByAI: true, 
                            checkedAt: new Date().toISOString() 
                        });
                        return true;

            async sendToStudent(examId, examType, email, finalGrades) {
                const safeEmail = email.replace(/[.@]/g, '_');
                const collection = this.getResponseCollection(examType);
                if (!db) return false;
                try {
                    const docRef = db.collection(collection).doc(examId).collection('students').doc(safeEmail);
                    const doc = await docRef.get();
                    if (doc.exists) {
                        const data = doc.data();
                        const updatedAnswers = { ...data.answers };
                        // Apply final grades from teacher
                        Object.keys(finalGrades).forEach(qIdx => {
                            if (updatedAnswers[qIdx] && updatedAnswers[qIdx].aiFeedback) {
                                updatedAnswers[qIdx].aiFeedback.finalScore = finalGrades[qIdx].score;
                                updatedAnswers[qIdx].aiFeedback.teacherNote = finalGrades[qIdx].note || '';
                            }
                        });
                        
                        // Clean undefined values
                        const cleanAnswers = JSON.parse(JSON.stringify(updatedAnswers, (key, value) => {
                            return value === undefined ? null : value;
                        }));
                        
                        await docRef.update({ 
                            answers: cleanAnswers, 
                            sentToStudent: true, 
                            sentAt: new Date().toISOString() 
                        });
                        return true;
                    }
                } catch (e) { console.error('Send to student error:', e); }
                return false;
            },

                if (!db) return false;
                try {
                    const snapshot = await db.collection(collection).doc(examId).collection('students').get();
                    const batch = db.batch();
                    snapshot.forEach(doc => {
                        batch.delete(doc.ref);
                    });
                    await batch.commit();
                    return snapshot.size;
                } catch (e) { console.error('Clear error:', e); return false; }
            },

            async clearAllYearResponses() {
                if (!db) return { exams: 0, homeworks: 0 };
                let examCount = 0;
                let homeworkCount = 0;
                
                try {
                    // Clear all exam responses (using correct collection name with underscore)
                    const examSnapshot = await db.collection('exam_responses').get();
                    for (const examDoc of examSnapshot.docs) {
                        const studentsSnapshot = await examDoc.ref.collection('students').get();
                        // Handle batch limit of 500
                        const docs = studentsSnapshot.docs;
                        for (let i = 0; i < docs.length; i += 500) {
                            const batch = db.batch();
                            docs.slice(i, i + 500).forEach(doc => batch.delete(doc.ref));
                            await batch.commit();
                        }
                        examCount += studentsSnapshot.size;
                    }
                    
                    // Clear all homework responses (using correct collection name with underscore)
                    const hwSnapshot = await db.collection('homework_responses').get();
                    for (const hwDoc of hwSnapshot.docs) {
                        const studentsSnapshot = await hwDoc.ref.collection('students').get();
                        // Handle batch limit of 500
                        const docs = studentsSnapshot.docs;
                        for (let i = 0; i < docs.length; i += 500) {
                            const batch = db.batch();
                            docs.slice(i, i + 500).forEach(doc => batch.delete(doc.ref));
                            await batch.commit();
                        }
                        homeworkCount += studentsSnapshot.size;
                    }
                    
                    return { exams: examCount, homeworks: homeworkCount };
                } catch (e) { 
                    console.error('Clear year error:', e); 
                    return { exams: examCount, homeworks: homeworkCount }; 
                }
            },

        // Java linter function (used by CodeMirror 6)
        const javaLinterRules = (text) => {
            const diagnostics = [];
            const lines = text.split('\n');
            let pos = 0;
            
            // Track brackets
            let braceCount = 0;
            let parenCount = 0;
            let bracketCount = 0;
            
            // Valid Java keywords and types
            const validTypes = ['int', 'double', 'float', 'String', 'boolean', 'char', 'long', 'short', 'byte', 'void', 'Integer', 'Double', 'Float', 'Boolean', 'Character', 'Long', 'Short', 'Byte', 'Object', 'System', 'Math', 'Scanner', 'ArrayList', 'HashMap', 'List', 'Map', 'Set', 'Arrays', 'Node', 'Random', 'Stack', 'Queue', 'LinkedList'];
            const validKeywords = ['public', 'private', 'protected', 'static', 'final', 'abstract', 'class', 'interface', 'extends', 'implements', 'new', 'return', 'if', 'else', 'for', 'while', 'do', 'switch', 'case', 'default', 'break', 'continue', 'try', 'catch', 'finally', 'throw', 'throws', 'import', 'package', 'void', 'null', 'true', 'false', 'this', 'super', 'instanceof', 'enum', 'assert'];
            const validMethods = ['println', 'print', 'printf', 'length', 'charAt', 'substring', 'equals', 'compareTo', 'indexOf', 'toLowerCase', 'toUpperCase', 'trim', 'split', 'replace', 'contains', 'isEmpty', 'toString', 'parseInt', 'parseDouble', 'valueOf', 'add', 'get', 'set', 'remove', 'size', 'clear', 'next', 'nextInt', 'nextDouble', 'nextLine', 'hasNext', 'sqrt', 'pow', 'abs', 'max', 'min', 'random', 'round', 'floor', 'ceil', 'getValue', 'getNext', 'setNext', 'setValue', 'getHead', 'setHead', 'push', 'pop', 'peek', 'poll', 'offer', 'enqueue', 'dequeue', 'front', 'rear', 'isEmpty', 'isFull', 'getData', 'setData', 'hasValue', 'getInfo', 'setInfo'];
            
            // Methods that MUST have parentheses
            const methodsNeedParens = ['getValue', 'getNext', 'setNext', 'setValue', 'getHead', 'setHead', 'push', 'pop', 'peek', 'poll', 'offer', 'enqueue', 'dequeue', 'front', 'rear', 'isEmpty', 'isFull', 'getData', 'setData', 'hasValue', 'getInfo', 'setInfo', 'size', 'toString', 'equals', 'compareTo', 'trim', 'toLowerCase', 'toUpperCase', 'charAt', 'substring', 'indexOf', 'contains', 'replace', 'split', 'add', 'get', 'set', 'remove', 'clear', 'next', 'hasNext', 'nextInt', 'nextDouble', 'nextLine'];
            
            const allValidWords = new Set([...validTypes, ...validKeywords, ...validMethods]);
            
            // Common typos
            const typoMap = {
                // public
                'pubic': 'public', 'pubilc': 'public', 'pulic': 'public', 'publc': 'public', 'publi': 'public', 'pbulic': 'public', 'pulbic': 'public',
                // static
                'statc': 'static', 'ststic': 'static', 'staic': 'static', 'statik': 'static', 'srtai': 'static', 'sattic': 'static',
                'sr': 'static', 'st': 'static', 'sta': 'static', 'stat': 'static', 'stati': 'static', 'satic': 'static', 'sttaic': 'static', 'staric': 'static',
                // void
                'viod': 'void', 'vold': 'void', 'vid': 'void', 'voi': 'void', 'vaid': 'void', 'voif': 'void',
                // String
                'stirng': 'String', 'sting': 'String', 'strng': 'String', 'srtring': 'String', 'Stirng': 'String', 'Sting': 'String', 'Strng': 'String',
                // boolean values
                'flase': 'false', 'fasle': 'false', 'ture': 'true', 'treu': 'true', 'fales': 'false', 'tru': 'true', 'fals': 'false',
                // null
                'nul': 'null', 'nill': 'null', 'nll': 'null', 'nulp': 'null',
                // return
                'retrun': 'return', 'reutrn': 'return', 'retrn': 'return', 'rturn': 'return', 'retur': 'return', 'retunr': 'return', 'retutn': 'return', 'retuen': 'return',
                // class
                'calss': 'class', 'clas': 'class', 'clss': 'class', 'classs': 'class',
                // private
                'priate': 'private', 'privte': 'private', 'priavte': 'private', 'privat': 'private', 'prviate': 'private',
                // protected
                'protcted': 'protected', 'proected': 'protected', 'proteced': 'protected', 'protectd': 'protected',
                // boolean
                'boolen': 'boolean', 'bolean': 'boolean', 'boolaen': 'boolean', 'boolena': 'boolean', 'booelan': 'boolean',
                // double/float
                'doubel': 'double', 'doble': 'double', 'duoble': 'double', 'doulbe': 'double',
                'flot': 'float', 'flaot': 'float', 'floar': 'float', 'flaot': 'float',
                // int/Integer
                'itn': 'int', 'nit': 'int', 'iny': 'int', 'inr': 'int',
                'intger': 'Integer', 'integr': 'Integer', 'Intger': 'Integer', 'Integr': 'Integer',
                // System
                'systme': 'System', 'ssytem': 'System', 'sytem': 'System', 'Systme': 'System', 'Sytem': 'System', 'Ssytem': 'System',
                // Scanner
                'scaner': 'Scanner', 'scnner': 'Scanner', 'Scanenr': 'Scanner', 'Scaner': 'Scanner', 'Scnner': 'Scanner',
                // length/println
                'lenght': 'length', 'legth': 'length', 'lentgh': 'length', 'lengt': 'length',
                'pirntln': 'println', 'printl': 'println', 'prinln': 'println', 'prnintln': 'println', 'printlm': 'println',
                // if/else/for/while
                'fi': 'if', 'esle': 'else', 'els': 'else', 'elss': 'else',
                'fro': 'for', 'forr': 'for', 'fo': 'for',
                'whiel': 'while', 'whil': 'while', 'wihle': 'while', 'hwile': 'while',
                // new
                'nwe': 'new', 'enw': 'new', 'ne': 'new',
                // char
                'cahr': 'char', 'chr': 'char', 'cha': 'char'
            };
            
            // Concatenated words (missing space)
            const concatenatedPatterns = {
                'returntrue': 'return true',
                'returnfalse': 'return false',
                'returnnull': 'return null',
                'returnthis': 'return this',
                'elseif': 'else if',
                'newint': 'new int',
                'newString': 'new String',
                'newNode': 'new Node',
                'publicstatic': 'public static',
                'publicvoid': 'public void',
                'privateint': 'private int',
                'staticint': 'static int',
                'staticvoid': 'static void',
                'intx': 'int x',
                'inty': 'int y',
                'inti': 'int i',
                'intj': 'int j',
                'intn': 'int n',
                'intsum': 'int sum',
                'intcount': 'int count',
                'intresult': 'int result'
            };
            
            lines.forEach((line, lineIndex) => {
                const trimmed = line.trim();
                const lineStart = pos;
                const lineEnd = pos + line.length;
                
                // Skip empty lines and comments
                if (!trimmed || trimmed.startsWith('//') || trimmed.startsWith('/*') || trimmed.startsWith('*')) {
                    pos = lineEnd + 1;
                    return;
                }
                
                // 🔴 Check for Hebrew characters (very common mistake!)
                const hebrewChars = line.match(/[\u0590-\u05FF]+/g);
                if (hebrewChars) {
                    hebrewChars.forEach(match => {
                        const idx = line.indexOf(match);
                        diagnostics.push({
                            from: lineStart + idx,
                            to: lineStart + idx + match.length,
                            message: `❌ תווים בעברית "${match}"! שנה למקלדת אנגלית (Alt+Shift)`,
                            severity: 'error'
                        });
                    });
                }
                
                // 🔴 Check for common operator mistakes
                if (trimmed.includes('=+') && !trimmed.includes('+=')) {
                    const idx = line.indexOf('=+');
                    diagnostics.push({
                        from: lineStart + idx,
                        to: lineStart + idx + 2,
                        message: `❌ האם התכוונת ל-+= (הוספה למשתנה)?`,
                        severity: 'error'
                    });
                }
                if (trimmed.includes('=-') && !trimmed.includes('-=')) {
                    const idx = line.indexOf('=-');
                    diagnostics.push({
                        from: lineStart + idx,
                        to: lineStart + idx + 2,
                        message: `❌ האם התכוונת ל--= (חיסור מהמשתנה)?`,
                        severity: 'error'
                    });
                }
                
                // 🔴 Check for = instead of == in conditions
                const ifMatch = trimmed.match(/if\s*\([^=]*[^=!<>]=[^=][^)]*\)/);
                if (ifMatch && !trimmed.includes('==') && !trimmed.includes('!=') && !trimmed.includes('<=') && !trimmed.includes('>=')) {
                    diagnostics.push({
                        from: lineStart,
                        to: lineEnd,
                        message: `⚠️ האם התכוונת ל-== (השוואה) במקום = (השמה)?`,
                        severity: 'warning'
                    });
                }
                
                // 🔴 Check for string comparison with ==
                if (trimmed.match(/==\s*"/) || trimmed.match(/"\s*==/)) {
                    diagnostics.push({
                        from: lineStart,
                        to: lineEnd,
                        message: `⚠️ השוואת מחרוזות: עדיף להשתמש ב-.equals() במקום ==`,
                        severity: 'warning'
                    });
                }
                
                // 🔴 Check for array without size
                const arrayNoSize = trimmed.match(/new\s+(int|double|String|char|boolean|float)\s*\[\s*\]\s*;/);
                if (arrayNoSize) {
                    diagnostics.push({
                        from: lineStart,
                        to: lineEnd,
                        message: `❌ חסר גודל מערך! צריך לציין מספר בסוגריים המרובעים, למשל: new ${arrayNoSize[1]}[10]`,
                        severity: 'error'
                    });
                }
                
                // 🔴 Check for method call without parentheses (comprehensive check for all methods)
                for (const method of methodsNeedParens) {
                    const pattern = new RegExp(`\\.${method}(?!\\s*\\()`, 'g');
                    let match;
                    while ((match = pattern.exec(line)) !== null) {
                        // Make sure it's not followed by ( and not part of a longer word
                        const afterMatch = line.substring(match.index + method.length + 1);
                        if (!afterMatch.startsWith('(') && !/^[a-zA-Z0-9_]/.test(afterMatch)) {
                            diagnostics.push({
                                from: lineStart + match.index,
                                to: lineStart + match.index + method.length + 1,
                                message: `❌ חסרות סוגריים! צריך .${method}()`,
                                severity: 'error'
                            });
                        }
                    }
                }
                
                // 🔴 Check for Scanner without .close() reminder (just info)
                if (trimmed.includes('new Scanner') && !trimmed.includes('//')) {
                    diagnostics.push({
                        from: lineStart,
                        to: lineEnd,
                        message: `💡 זכור לסגור את ה-Scanner בסוף עם in.close()`,
                        severity: 'info'
                    });
                }
                
                // 🔴 Check for potential infinite loop
                if (trimmed.match(/while\s*\(\s*true\s*\)/) && !trimmed.includes('break')) {
                    diagnostics.push({
                        from: lineStart,
                        to: lineEnd,
                        message: `⚠️ לולאת while(true) - וודא שיש break בפנים למניעת לולאה אינסופית`,
                        severity: 'warning'
                    });
                }
                
                // 🔴 Check for division that might be integer division
                const divisionMatch = trimmed.match(/(\d+)\s*\/\s*(\d+)/);
                if (divisionMatch) {
                    const a = parseInt(divisionMatch[1]);
                    const b = parseInt(divisionMatch[2]);
                    if (b !== 0 && a % b !== 0) {
                        diagnostics.push({
                            from: lineStart,
                            to: lineEnd,
                            message: `💡 חלוקה שלמה: ${a}/${b} = ${Math.floor(a/b)} (לא ${(a/b).toFixed(2)}). להשתמש ב-double לתוצאה עשרונית`,
                            severity: 'info'
                        });
                    }
                }
                
                // 🔴 Check for common for loop mistakes
                const forLoopMatch = trimmed.match(/for\s*\(\s*int\s+(\w+)\s*=\s*(\d+)\s*;\s*\1\s*(<|<=|>|>=)\s*(\d+)\s*;\s*\1\s*(\+\+|--)/);
                if (forLoopMatch) {
                    const [, varName, start, op, end, inc] = forLoopMatch;
                    const startNum = parseInt(start);
                    const endNum = parseInt(end);
                    // Check if loop will never run
                    if ((op === '<' && startNum >= endNum) || (op === '<=' && startNum > endNum)) {
                        if (inc === '++') {
                            diagnostics.push({
                                from: lineStart,
                                to: lineEnd,
                                message: `⚠️ הלולאה לא תרוץ! ${varName} מתחיל ב-${start} וכבר ${op} ${end}`,
                                severity: 'warning'
                            });
                        }
                    }
                    // Check for wrong direction
                    if ((op === '<' || op === '<=') && inc === '--') {
                        diagnostics.push({
                            from: lineStart,
                            to: lineEnd,
                            message: `❌ לולאה אינסופית! תנאי ${op} עם ${inc} - שנה ל-++ או הפוך את התנאי`,
                            severity: 'error'
                        });
                    }
                    if ((op === '>' || op === '>=') && inc === '++') {
                        diagnostics.push({
                            from: lineStart,
                            to: lineEnd,
                            message: `❌ לולאה אינסופית! תנאי ${op} עם ${inc} - שנה ל--- או הפוך את התנאי`,
                            severity: 'error'
                        });
                    }
                }
                
                // Count brackets
                for (let char of line) {
                    if (char === '{') braceCount++;
                    if (char === '}') braceCount--;
                    if (char === '(') parenCount++;
                    if (char === ')') parenCount--;
                    if (char === '[') bracketCount++;
                    if (char === ']') bracketCount--;
                }
                
                // 🆕 Check for code outside method/class (very common beginner mistake!)
                // braceCount 0 = outside class, 1 = inside class but outside method
                const prevBraceCount = braceCount - (line.match(/{/g) || []).length + (line.match(/}/g) || []).length;
                
                // Check if line looks like executable code or variable declaration
                const looksLikeCode = /^\s*(int|double|float|String|boolean|char|long|short|byte|Node|Stack|Queue|BinNode)\s*(<.*>)?\s*\w+/.test(trimmed) ||
                                     /^\s*(System\.|Math\.|return\s|if\s*\(|for\s*\(|while\s*\()/.test(trimmed);
                
                // Check if it's a valid class-level declaration (has access modifier or is static)
                const isClassLevelDecl = /^\s*(public|private|protected|static|final|class|interface|enum|import|package)/.test(trimmed);
                
                // Check if it's just opening/closing braces or simple statements
                const isStructural = /^\s*[{}]\s*$/.test(trimmed) || /^\s*(else|try|catch|finally)\s*{?\s*$/.test(trimmed);
                
                // If we're at brace level 0-1 and have code that's not a class-level declaration
                if (prevBraceCount <= 1 && looksLikeCode && !isClassLevelDecl && !isStructural) {
                    if (prevBraceCount === 0) {
                        diagnostics.push({
                            from: lineStart,
                            to: lineEnd,
                            message: `❌ קוד מחוץ למחלקה! ב-Java כל הקוד חייב להיות בתוך class`,
                            severity: 'error'
                        });
                    } else if (prevBraceCount === 1 && !trimmed.includes('(')) {
                        // Inside class but outside method, and it's not a method declaration
                        diagnostics.push({
                            from: lineStart,
                            to: lineEnd,
                            message: `💡 נראה שהקוד מחוץ לפונקציה. האם שכחת לכתוב אותו בתוך main או פונקציה אחרת?`,
                            severity: 'warning'
                        });
                    }
                }
                
                // 🆕 Check for comparing two String variables with ==
                if (/String\s+\w+/.test(text) && trimmed.match(/\b\w+\s*==\s*\w+\b/) && !trimmed.includes('null')) {
                    const varCompare = trimmed.match(/\b(\w+)\s*==\s*(\w+)\b/);
                    if (varCompare && !['true', 'false', 'null'].includes(varCompare[1]) && !['true', 'false', 'null'].includes(varCompare[2])) {
                        // Check if variables might be strings
                        if (!/\d/.test(varCompare[1]) && !/\d/.test(varCompare[2])) {
                            diagnostics.push({
                                from: lineStart,
                                to: lineEnd,
                                message: `💡 אם אלה מחרוזות, השתמש ב-.equals() להשוואה: ${varCompare[1]}.equals(${varCompare[2]})`,
                                severity: 'info'
                            });
                        }
                    }
                }
                
                // 🆕 Check for empty catch block (bad practice!)
                if (trimmed.match(/catch\s*\([^)]+\)\s*\{\s*\}/) || (trimmed.includes('catch') && lines[lineIndex + 1]?.trim() === '}')) {
                    diagnostics.push({
                        from: lineStart,
                        to: lineEnd,
                        message: `⚠️ catch ריק! לפחות הוסף: ex.printStackTrace(); כדי לראות שגיאות`,
                        severity: 'warning'
                    });

                const arrayAccess = trimmed.match(/(\w+)\[(\w+)\.length\]/);
                if (arrayAccess) {
                    diagnostics.push({
                        from: lineStart, to: lineEnd,
                        message: `❌ חריגה ממערך! אינדקס length לא קיים. האינדקס האחרון הוא length-1`,
                        severity: 'error'
                    });
                }
                
                // 🔬 מחקר: void method trying to return value
                if (trimmed.includes('void') && lines.slice(Math.max(0, lineIndex-5), lineIndex).some(l => l.includes('void'))) {
                    if (trimmed.match(/return\s+[^;]+;/) && !trimmed.match(/return\s*;/)) {
                        diagnostics.push({
                            from: lineStart, to: lineEnd,
                            message: `❌ פונקציית void לא יכולה להחזיר ערך!`,
                            severity: 'error'
                        });
                    }
                }
                
                // 🔬 מחקר: Class name should start with uppercase
                const classDecl = trimmed.match(/class\s+([a-z]\w*)/);
                if (classDecl) {
                    diagnostics.push({
                        from: lineStart, to: lineEnd,
                        message: `💡 שמות מחלקות מתחילים באות גדולה: ${classDecl[1]} → ${classDecl[1].charAt(0).toUpperCase() + classDecl[1].slice(1)}`,
                        severity: 'info'
                    });
                }
                
                // 🔬 מחקר: Method name should start with lowercase  
                const methodDecl = trimmed.match(/(public|private|protected)?\s*(static\s+)?\w+\s+([A-Z]\w*)\s*\(/);
                if (methodDecl && methodDecl[3] && !['Main', 'String', 'Integer', 'Double', 'Boolean', 'Node', 'Stack', 'Queue'].includes(methodDecl[3])) {
                    diagnostics.push({
                        from: lineStart, to: lineEnd,
                        message: `💡 שמות פונקציות מתחילים באות קטנה: ${methodDecl[3]} → ${methodDecl[3].charAt(0).toLowerCase() + methodDecl[3].slice(1)}`,
                        severity: 'info'
                    });
                }
                
                // 🔬 מחקר: Possible typo in main method signature
                const mainCheck = trimmed.match(/public\s+static\s+void\s+(Main|mian|mainn|mai|MAIN)\s*\(/);
                if (mainCheck && mainCheck[1] !== 'main') {
                    diagnostics.push({
                        from: lineStart, to: lineEnd,
                        message: `❌ שגיאת כתיב! "${mainCheck[1]}" צריך להיות "main" (אותיות קטנות)`,
                        severity: 'error'
                    });
                }
                
                // 🔬 מחקר Decaf: Double semicolon
                if (trimmed.includes(';;')) {
                    diagnostics.push({
                        from: lineStart + trimmed.indexOf(';;'), to: lineStart + trimmed.indexOf(';;') + 2,
                        message: `⚠️ נקודה-פסיק כפולה - מיותר`,
                        severity: 'warning'
                    });
                }
                
                pos = lineEnd + 1;
            });
            
            // Check bracket balance
            const lastPos = text.length - 1;
            if (braceCount > 0) {
                diagnostics.push({ from: lastPos, to: lastPos + 1, message: `❌ חסרות ${braceCount} סוגריים מסולסלים }`, severity: 'error' });
            } else if (braceCount < 0) {
                diagnostics.push({ from: lastPos, to: lastPos + 1, message: `❌ יש ${Math.abs(braceCount)} סוגריים } מיותרים`, severity: 'error' });
            }
            if (parenCount !== 0) {
                diagnostics.push({ from: lastPos, to: lastPos + 1, message: parenCount > 0 ? `❌ חסרות ${parenCount} סוגריים עגולים )` : `❌ יש ${Math.abs(parenCount)} סוגריים ) מיותרים`, severity: 'error' });
            }
            
            return diagnostics;
        };
        
        // Store globally for CM6 module to access
        window.javaLinterRules = javaLinterRules;
        console.log('✅ javaLinterRules registered globally');

        // Helper function to export automata to text format for AI grading
        const exportAutomataToText = (automataData) => {
            if (!automataData || !automataData.states) return 'אין נתוני אוטומט';
            
            const { states, transitions, type } = automataData;
            let text = `סוג אוטומט: ${type === 'DFA' ? 'אוטומט סופי דטרמיניסטי (DFA)' : type === 'NFA' ? 'אוטומט סופי אי-דטרמיניסטי (NFA)' : 'אוטומט מחסנית (PDA)'}\n\n`;
            
            const initialState = states.find(s => s.isInitial);
            const acceptingStates = states.filter(s => s.isAccepting);
            
            text += `מצבים: ${states.map(s => s.name).join(', ')}\n`;
            text += `מצב התחלתי: ${initialState?.name || 'לא הוגדר'}\n`;
            text += `מצבים מקבלים: ${acceptingStates.map(s => s.name).join(', ') || 'אין'}\n\n`;
            text += `מעברים:\n`;
            
            (transitions || []).forEach(t => {
                const fromName = states.find(s => s.id === t.from)?.name || '?';
                const toName = states.find(s => s.id === t.to)?.name || '?';
                if (type === 'PDA') {
                    text += `  ${fromName} --[${t.label}, ${t.stackPop || 'ε'}/${t.stackPush || 'ε'}]--> ${toName}\n`;
                } else {
                    text += `  ${fromName} --[${t.label}]--> ${toName}\n`;
                }
            });
            
            return text;
        };

        // Data Structures Reference - מילון מבני נתונים
        const DATA_STRUCTURES_HELP = {
            'Node': {
                name: 'Node<T> - חוליה ברשימה מקושרת',

        // Helper function to detect data structures in code
        const detectDataStructures = (code) => {
            if (!code) return [];
            const detected = [];
            const patterns = {
                'Node': /\bNode\s*<|new\s+Node\s*[<(]|\bNode\b.*=|Node\s+\w+/,
                'Stack': /\bStack\s*<|new\s+Stack\s*[<(]|\bStack\b.*=|\.push\(|\.pop\(|\.top\(/,
                'Queue': /\bQueue\s*<|new\s+Queue\s*[<(]|\bQueue\b.*=|\.insert\(|\.remove\(|\.head\(/,
                'BinNode': /\bBinNode\s*<|new\s+BinNode\s*[<(]|\bBinNode\b.*=|\.getLeft\(|\.getRight\(/,
            };
            
            for (const [name, pattern] of Object.entries(patterns)) {
                if (pattern.test(code)) {
                    detected.push(name);
                }
            }
            return detected;
        };

                                {detected.includes(ds) && <span className="mr-1">✓</span>}

        };

        // תבניות קוד מוכנות להוספה מהירה בעורך
        const CODE_SNIPPETS = [

            { label: 'לולאת while', code: 'while (תנאי) {\n    \n}\n' },
            { label: 'תנאי if-else', code: 'if (תנאי) {\n    \n} else {\n    \n}\n' },
            { label: 'מעבר על מערך', code: 'for (int i = 0; i < arr.length; i++) {\n    System.out.println(arr[i]);\n}\n' },
            { label: 'קלט עם Scanner', code: 'Scanner i = new Scanner(System.in);\nint num = i.nextInt();\n' },
            { label: 'מעבר על רשימה מקושרת', code: 'Node<Integer> pos = head;\nwhile (pos != null) {\n    \n    pos = pos.getNext();\n}\n' },
            { label: 'פונקציה (מתודה)', code: 'public static int myFunc(int n) {\n    \n    return 0;\n}\n' }
        ];

        // רמזים חכמים בעברית — זיהוי טעויות נפוצות בזמן כתיבה
        const getHebrewHints = (code) => {
            if (!code || !code.trim()) return ['התחילי לכתוב — או לחצי על "➕ תבנית" לקבלת שלד מוכן'];
            const hints = [];
            const open = (code.match(/{/g) || []).length, close = (code.match(/}/g) || []).length;
            if (open !== close) hints.push(`יש ${open} סוגריים פותחים { אבל ${close} סוגרים } — משהו לא סגור`);
            const op = (code.match(/\(/g) || []).length, cp = (code.match(/\)/g) || []).length;
            if (op !== cp) hints.push('מספר הסוגריים ( ) לא מאוזן — בדקי שכל פתיחה נסגרת');
            if (/if\s*\([^)=!<>]*[^=!<>]=[^=][^)]*\)/.test(code)) hints.push('בתוך if משווים עם == (סימן = בודד הוא השמה!)');
            if (/\w+\s*==\s*"/.test(code)) hints.push('להשוואת מחרוזות משתמשים ב-s.equals("...") ולא ב-==');
            if (/\[\s*\]/.test(code) && /\.length\(\)/.test(code)) hints.push('למערך: arr.length בלי סוגריים · למחרוזת: s.length() עם סוגריים');
            if (/<=\s*\w+\.length\b/.test(code)) hints.push('זהירות: i <= arr.length חורג מהמערך — כנראה צריך < במקום <=');
            if (/while\s*\(\s*true\s*\)/.test(code)) hints.push('while(true) רצה לנצח — ודאי שיש תנאי עצירה או break');
            if (/system\.out/.test(code)) hints.push('אות גדולה בהתחלה: System.out.println (S גדולה)');
            if (/\bstring\b/.test(code)) hints.push('הטיפוס נקרא String — עם S גדולה');
            return hints.slice(0, 3);
        };

        // Code Editor Component - wraps CodeMirror 6
        const CodeEditor = ({ code, onChange, readOnly, enableLinting = false, title = 'Main.java', onPasteAttempt, blockPaste = false }) => {
            const ref = useRef(null);
            const editorRef = useRef(null);
            const [cm6Ready, setCm6Ready] = useState(!!window.createCodeEditor);
            const [loadTimeout, setLoadTimeout] = useState(false);
