        // =====================================================
        // AI CHAT HELPER - עוזר צ'אט עם AI
        // =====================================================
        
        const ChatHelper = ({ isOpen, onClose, questionText, currentCode, questionType, automataType }) => {
            const [messages, setMessages] = useState([]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const messagesEndRef = useRef(null);
            const inputRef = useRef(null);
            
            // Scroll to bottom when messages change
            useEffect(() => {
                messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [messages]);
            
            // Focus input when opened
            useEffect(() => {
                if (isOpen) {
                    setTimeout(() => inputRef.current?.focus(), 100);
                }
            }, [isOpen]);
            
            // Add welcome message when opened
            useEffect(() => {
                if (isOpen && messages.length === 0) {
                    const welcomeMsg = questionType === 'automata' 
                        ? `שלום! 👋 אני כאן לעזור לך עם שאלת האוטומטים.
                        
אני יכול לעזור לך ב:
• הבנת מה השאלה מבקשת
• חשיבה על איך לבנות את האוטומט
• הסברים על מצבים ומעברים
• טיפים לפתרון

מה תרצה לשאול?`
                        : `שלום! 👋 אני כאן לעזור לך עם השאלה.
                        
אני יכול לעזור לך ב:
• הבנת מה השאלה מבקשת
• הסבר על קונספטים ב-Java
• רעיונות לפתרון (בלי לתת את הקוד המלא)
• מציאת שגיאות בקוד שלך

מה תרצה לשאול?`;
                    
                    setMessages([{ role: 'assistant', content: welcomeMsg }]);
                }
            }, [isOpen, questionType]);
            
            const sendMessage = async () => {
                if (!input.trim() || loading) return;
                
                const userMessage = input.trim();
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMessage }]);
                setLoading(true);
                
                try {
                    // Build conversation history for API
                    const apiMessages = [
                        ...messages.filter(m => m.role !== 'system').map(m => ({
                            role: m.role,
                            content: m.content
                        })),
                        { role: 'user', content: userMessage }
                    ];
                    
                    const response = await AIService.chat(apiMessages, {
                        questionText: questionText || '',
                        currentCode: currentCode || '',
                        questionType: questionType || 'code',
                        automataType: automataType || 'DFA'
                    });
                    
                    setMessages(prev => [...prev, { role: 'assistant', content: response }]);
                } catch (error) {
                    setMessages(prev => [...prev, { 
                        role: 'assistant', 
                        content: `מצטער, יש בעיה בחיבור. נסי שוב עוד רגע. 🙁\n\n(${error.message})` 
                    }]);
                } finally {
                    setLoading(false);
                }
            };
            
            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            };
            
            const clearChat = () => {
                setMessages([]);
            };
            
            if (!isOpen) return null;
            
            return (
                <div className="fixed bottom-4 left-4 w-96 max-w-[calc(100vw-2rem)] bg-slate-800 rounded-xl shadow-2xl border border-slate-600 z-50 flex flex-col" style={{ maxHeight: '70vh' }}>
                    {/* Header */}
                    <div className="flex items-center justify-between p-3 bg-gradient-to-r from-purple-600 to-blue-600 rounded-t-xl">
                        <div className="flex items-center gap-2 text-white font-bold">
                            <span className="text-xl">🤖</span>
                            <span>עוזר AI</span>
                            <span className="text-xs bg-white/20 px-2 py-0.5 rounded">Gemini</span>
                        </div>
                        <div className="flex items-center gap-1">
                            <button 
                                onClick={clearChat}
                                className="p-1.5 hover:bg-white/20 rounded text-white/80 hover:text-white"
                                title="נקה צ'אט"
                            >
                                🗑️
                            </button>
                            <button 
                                onClick={onClose}
                                className="p-1.5 hover:bg-white/20 rounded text-white/80 hover:text-white"
                            >
                                ✕
                            </button>
                        </div>
                    </div>
                    
                    {/* Messages */}
                    <div className="flex-1 overflow-y-auto p-3 space-y-3" style={{ minHeight: '200px', maxHeight: '400px' }}>
                        {messages.map((msg, idx) => (
                            <div 
                                key={idx}
                                className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}
                            >
                                <div 
                                    className={`max-w-[85%] p-3 rounded-lg whitespace-pre-wrap text-sm ${
                                        msg.role === 'user' 
                                            ? 'bg-blue-600 text-white rounded-br-sm' 
                                            : 'bg-slate-700 text-gray-200 rounded-bl-sm'
                                    }`}
                                >
                                    {msg.content}
                                </div>
                            </div>
                        ))}
                        
                        {loading && (
                            <div className="flex justify-start">
                                <div className="bg-slate-700 text-gray-200 p-3 rounded-lg rounded-bl-sm">
                                    <div className="flex items-center gap-2">
                                        <div className="spinner w-4 h-4"></div>
                                        <span className="text-sm">חושב...</span>
                                    </div>
                                </div>
                            </div>
                        )}
                        
                        <div ref={messagesEndRef} />
                    </div>
                    
                    {/* Input */}
                    <div className="p-3 border-t border-slate-600">
                        <div className="flex gap-2">
                            <textarea
                                ref={inputRef}
                                value={input}
                                onChange={e => setInput(e.target.value)}
                                onKeyDown={handleKeyDown}
                                placeholder="שאל שאלה..."
                                className="flex-1 px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
                                rows={2}
                                disabled={loading}
                            />
                            <button
                                onClick={sendMessage}
                                disabled={!input.trim() || loading}
                                className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed self-end"
                            >
                                📤
                            </button>
                        </div>
                        <p className="text-xs text-gray-500 mt-1 text-center">
                            Enter לשליחה • Shift+Enter לשורה חדשה
                        </p>
                    </div>
                </div>
            );
        };

        // Main App
        const App = () => {
            // Auth state
            const [user, setUser] = useState(null);
            const [isEditor, setIsEditor] = useState(false);
            const [authLoading, setAuthLoading] = useState(true);
            const [loginLoading, setLoginLoading] = useState(false);
            const [studentName, setStudentName] = useState('');
            const [studentGrade, setStudentGrade] = useState(''); // יא, י, יב
            const [studentApproved, setStudentApproved] = useState(null); // null=unknown, false=pending, true=approved
            const [nameEntered, setNameEntered] = useState(false);
            const [profileLoading, setProfileLoading] = useState(true);
            const [dataLoading, setDataLoading] = useState(true); // Loading data from Firebase
            
            // App state
            const [classes, setClasses] = useState([]);
            const [loadingError, setLoadingError] = useState(null);
            const [editMode, setEditMode] = useState(false);
            const [selectedExam, setSelectedExam] = useState(null);
            const [selectedQuestion, setSelectedQuestion] = useState(null);
            const [selectedClass, setSelectedClass] = useState(null); // selected topic unit (for student topic page)
            const [questionContent, setQuestionContent] = useState({});
            const [studentData, setStudentData] = useState(null);
            const [studentAnswers, setStudentAnswers] = useState({});
            
            // Teacher viewing student
            const [viewingStudent, setViewingStudent] = useState(null);
            const [examResponses, setExamResponses] = useState({});
            const [checkingAI, setCheckingAI] = useState(false);
            const [saveStatus, setSaveStatus] = useState(''); // '', 'saving', 'saved'
            const saveTimeoutRef = useRef(null);
            
            // Preview mode - teacher sees as student
            const [previewMode, setPreviewMode] = useState(false);
            const [previewAnswers, setPreviewAnswers] = useState({});
            
            // Modals
            const [classModal, setClassModal] = useState({ open: false, item: null });
            const [examModal, setExamModal] = useState({ open: false, classId: null, item: null });
            const [questionModal, setQuestionModal] = useState({ open: false, classId: null, examId: null, item: null, index: null });
            const [deleteModal, setDeleteModal] = useState({ open: false, type: '', id: '', name: '', parentId: '', index: null });
            const [clearModal, setClearModal] = useState({ open: false, examId: '', examTitle: '', examType: 'exam', studentCount: 0 });
            const [showSummary, setShowSummary] = useState(false);
            const [summaryData, setSummaryData] = useState([]);
            const [settingsModal, setSettingsModal] = useState(false);
            const [gradingModal, setGradingModal] = useState({ open: false, examId: null });
            const [sendModal, setSendModal] = useState({ open: false, student: null, grades: {} });
            const [submitModal, setSubmitModal] = useState(false);
            const [nameEditModal, setNameEditModal] = useState(false);
            const [approvalsModal, setApprovalsModal] = useState(false);
            const [pendingStudents, setPendingStudents] = useState([]);
            
            // AI Chat Helper
            const [chatOpen, setChatOpen] = useState(false);
            
            // Homework checking
            const [checkingHomework, setCheckingHomework] = useState(false);
            const [homeworkFeedback, setHomeworkFeedback] = useState({}); // { questionIndex: { feedback data } }
            const [homeworkPromptModal, setHomeworkPromptModal] = useState(false); // Simple boolean now - exam level
            const [homeworkCheckCount, setHomeworkCheckCount] = useState({}); // { examId_questionIndex: count }
            const [examSettings, setExamSettings] = useState({}); // { examId: { homeworkPrompt, gradingInstructions } }
            const [mobileSidebarOpen, setMobileSidebarOpen] = useState(false); // Mobile sidebar toggle
            const [studentsReportModal, setStudentsReportModal] = useState(false); // Teacher report modal
            const [studentsReportData, setStudentsReportData] = useState([]); // Students data for report
            const [reportGradeFilter, setReportGradeFilter] = useState('הכל'); // סינון הדוח לפי שכבה
            const [teacherGradeFilter, setTeacherGradeFilter] = useState('הכל'); // מצב מנהל: מעבר בין שכבות
            const [loadingReport, setLoadingReport] = useState(false); // Loading report data
            const [yearClearModal, setYearClearModal] = useState(false); // End of year clear modal
            const [clearingYear, setClearingYear] = useState(false); // Loading state for year clear

            // Auth effect - reset all state when user changes
            useEffect(() => {
                if (!auth) { setAuthLoading(false); return; }
                return auth.onAuthStateChanged(u => {
                    // Reset all state when user changes
                    setSelectedExam(null);
                    setSelectedQuestion(null);
                    setViewingStudent(null);
                    setPreviewMode(false);  // Important: reset preview mode
                    setPreviewAnswers({});
                    setStudentData(null);
                    setStudentAnswers({});
                    setHomeworkFeedback({});
                    setHomeworkCheckCount({});
                    setStudentApproved(null);
                    setSelectedClass(null);
                    
                    setUser(u);
                    const editorStatus = u?.email === EDITOR_EMAIL;
                    setIsEditor(editorStatus);
                    setAuthLoading(false);
                    
                    if (editorStatus) { 
                        setNameEntered(true); 
                        setStudentName(u.displayName || 'מורה'); 
                    } else {
                        // Reset student-specific state
                        setNameEntered(false);
                        setStudentName('');
                    }
                });
            }, []);

            // Load user profile for students
            useEffect(() => {
                if (!user) {
                    setProfileLoading(true);
                    return;
                }
                
                if (user.email === EDITOR_EMAIL) {
                    setProfileLoading(false);
                    return;
                }
                
                setProfileLoading(true);
                DataService.loadUserProfile(user.email).then(profile => {
                    setStudentApproved(profile ? (profile.approved !== false) : null);
                    if (profile?.name) {
                        console.log('Loaded student name from profile:', profile.name);
                        setStudentName(profile.name);
                        if (profile.grade) setStudentGrade(profile.grade);
                        setNameEntered(true);
                    }
                    setProfileLoading(false);
                }).catch(() => {
                    setProfileLoading(false);
                });
            }, [user]);

            // Load classes only after user is authenticated
            useEffect(() => { 
                if (!user) {
                    console.log('User not authenticated yet, skipping class load');
                    return;
                }
                console.log('User authenticated, loading classes for:', user.email);
                setDataLoading(true);
                DataService.loadClasses()
                    .then(data => {
                        setClasses(data);
                        setDataLoading(false);
                        if (data.length === 0) {
                            console.log('No classes loaded - could be empty or permission issue');
                        }
                    })
                    .catch(err => {
                        console.error('Failed to load classes:', err);
                        setLoadingError('שגיאה בטעינת כיתות - בדוק הרשאות Firestore');
                        setDataLoading(false);
                    });
            }, [user]);

            // Teacher: load students pending approval
            useEffect(() => {
                if (!user || !isEditor) return;
                DataService.loadAllStudents().then(all => setPendingStudents(all.filter(s => s.approved === false)));
            }, [user, isEditor]);

            // Teacher: approve / reject a pending student
            const handleApproveStudent = async (email, approve) => {
                if (approve) await DataService.setStudentApproval(email, true);
                else await DataService.deleteUserProfile(email);
                setPendingStudents(prev => prev.filter(s => s.email !== email));
            };
            
            // Save on page unload
            useEffect(() => {
                const handleBeforeUnload = () => {
                    if (saveTimeoutRef.current && selectedExam && selectedQuestion !== null && !isEditor && studentAnswers[selectedQuestion]?.code) {
                        // Use sendBeacon for reliable save on unload
                        navigator.sendBeacon && DataService.saveStudentAnswer(selectedExam.id, selectedExam.type || 'exam', user?.email, studentName, selectedQuestion, studentAnswers[selectedQuestion].code);
                    }
                };
                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => window.removeEventListener('beforeunload', handleBeforeUnload);
            }, [selectedExam, selectedQuestion, isEditor, studentAnswers, user, studentName]);

            // Load question content when selected
            useEffect(() => {
                if (selectedExam && selectedQuestion !== null) {
                    const qId = `${selectedExam.id}_q_${selectedQuestion}`;
                    if (!questionContent[qId]) {
                        DataService.loadQuestionContent(qId).then(data => setQuestionContent(prev => ({ ...prev, [qId]: data })));
                    }
                }
            }, [selectedExam, selectedQuestion]);

            // Load student data when exam selected (for student)
            useEffect(() => {
                if (selectedExam && user && !isEditor) {
                    DataService.loadStudentData(selectedExam.id, selectedExam.type || 'exam', user.email).then(data => {
                        setStudentData(data);
                        setStudentAnswers(data?.answers || {});
                        if (data?.studentName) { setStudentName(data.studentName); setNameEntered(true); }
                    });
                    
                    // Load exam settings (for homework prompt)
                    DataService.loadExamSettings(selectedExam.id).then(settings => {
                        setExamSettings(prev => ({ ...prev, [selectedExam.id]: settings }));
                    });
                    
                    // Load check counts for homework
                    if (selectedExam.type === 'homework') {
                        DataService.loadHomeworkCheckCounts(selectedExam.id, user.email).then(counts => {
                            // Convert to the format we use: { "examId_questionIndex": count }
                            const formattedCounts = {};
                            Object.keys(counts).forEach(qIdx => {
                                formattedCounts[`${selectedExam.id}_${qIdx}`] = counts[qIdx];
                            });
                            setHomeworkCheckCount(prev => ({ ...prev, ...formattedCounts }));
                        });
                    }
                }
            }, [selectedExam, user, isEditor]);

            // Load exam responses for teacher
            useEffect(() => {
                if (selectedExam && isEditor) {
                    DataService.loadAllResponses(selectedExam.id, selectedExam.type || 'exam').then(responses => {
                        setExamResponses(prev => ({ ...prev, [selectedExam.id]: responses }));
                    });
                    // Load exam settings (including homeworkPrompt for homework type)
                    DataService.loadExamSettings(selectedExam.id).then(settings => {
                        setExamSettings(prev => ({ ...prev, [selectedExam.id]: settings }));
                    });
                }
            }, [selectedExam, isEditor]);

            // Login handler
            const handleLogin = async () => {
                if (!auth || loginLoading) return;
                setLoginLoading(true);
                try {
                    await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
                } catch (e) {
                    if (e.code !== 'auth/cancelled-popup-request' && e.code !== 'auth/popup-closed-by-user') {
                        alert('שגיאה: ' + e.message);
                    }
                } finally { setLoginLoading(false); }
            };

            // Save class
            const saveClass = async (data) => {
                const newClasses = [...classes];
                if (classModal.item) {
                    const idx = newClasses.findIndex(c => c.id === classModal.item.id);
                    if (idx >= 0) { newClasses[idx] = { ...newClasses[idx], ...data }; await DataService.saveClass(newClasses[idx]); }
                } else {
                    const newClass = { id: 'class_' + Date.now(), ...data, exams: [], order: classes.length };
                    newClasses.push(newClass);
                    await DataService.saveClass(newClass);
                }
                setClasses(newClasses);
                setClassModal({ open: false, item: null });
            };

            // Save exam
            const saveExam = async (data) => {
                console.log('💾 Saving exam/homework:', data);
                const newClasses = [...classes];
                const classIdx = newClasses.findIndex(c => c.id === examModal.classId);
                if (classIdx < 0) {
                    console.error('❌ Class not found for exam save');
                    return;
                }
                
                if (!newClasses[classIdx].exams) newClasses[classIdx].exams = [];
                
                if (examModal.item) {
                    // Editing existing exam
                    const examIdx = newClasses[classIdx].exams.findIndex(e => e.id === examModal.item.id);
                    if (examIdx >= 0) {
                        console.log('✏️ Updating existing exam:', examModal.item.id);
                        newClasses[classIdx].exams[examIdx] = { ...newClasses[classIdx].exams[examIdx], ...data };
                        console.log('📋 Updated exam data:', newClasses[classIdx].exams[examIdx]);
                    }
                } else {
                    // Creating new exam
                    const newExam = { id: 'exam_' + Date.now(), ...data, questions: [], visible: true, type: data.type || 'exam' };
                    console.log('➕ Creating new exam:', newExam);
                    newClasses[classIdx].exams.push(newExam);
                }
                
                console.log('💾 Saving to Firebase...');
                const saved = await DataService.saveClass(newClasses[classIdx]);
                if (saved) {
                    console.log('✅ Successfully saved to Firebase');
                    setClasses(newClasses);
                } else {
                    console.error('❌ Failed to save to Firebase');
                }
                setExamModal({ open: false, classId: null, item: null });
            };

            // Save question
            const saveQuestion = async (data) => {
                // Extract image if provided (transient field from QuestionForm)
                const imageBase64 = data._imageBase64;
                delete data._imageBase64;

                const newClasses = [...classes];
                const classIdx = newClasses.findIndex(c => c.id === questionModal.classId);
                if (classIdx < 0) return;

                const examIdx = newClasses[classIdx].exams?.findIndex(e => e.id === questionModal.examId);
                if (examIdx < 0) return;

                if (!newClasses[classIdx].exams[examIdx].questions) newClasses[classIdx].exams[examIdx].questions = [];

                if (questionModal.index !== null) {
                    newClasses[classIdx].exams[examIdx].questions[questionModal.index] = data;
                } else {
                    newClasses[classIdx].exams[examIdx].questions.push(data);
                }

                await DataService.saveClass(newClasses[classIdx]);
                setClasses(newClasses);

                // Upload image to Storage if provided
                if (imageBase64) {
                    const qId = `${questionModal.examId}_q${data.number}`;
                    try {
                        const imageUrl = await DataService.uploadQuestionImage(qId, imageBase64);
                        const existing = await DataService.loadQuestionContent(qId) || {};
                        setQuestionContent(prev => ({ ...prev, [qId]: { ...existing, imageUrl } }));
                    } catch (e) { console.error('Image upload failed:', e); }
                }

                if (selectedExam?.id === questionModal.examId) {
                    setSelectedExam({ ...newClasses[classIdx].exams[examIdx] });
                }

                setQuestionModal({ open: false, classId: null, examId: null, item: null, index: null });
            };

            // Delete handler
            const handleDelete = async () => {
                const newClasses = [...classes];
                
                if (deleteModal.type === 'class') {
                    const idx = newClasses.findIndex(c => c.id === deleteModal.id);
                    if (idx >= 0) {
                        await DataService.deleteClass(deleteModal.id);
                        newClasses.splice(idx, 1);
                    }
                } else if (deleteModal.type === 'exam') {
                    const classIdx = newClasses.findIndex(c => c.id === deleteModal.parentId);
                    if (classIdx >= 0) {
                        const examIdx = newClasses[classIdx].exams?.findIndex(e => e.id === deleteModal.id);
                        if (examIdx >= 0) {
                            newClasses[classIdx].exams.splice(examIdx, 1);
                            await DataService.saveClass(newClasses[classIdx]);
                            if (selectedExam?.id === deleteModal.id) { setSelectedExam(null); setSelectedQuestion(null); }
                        }
                    }
                } else if (deleteModal.type === 'question') {
                    const classIdx = newClasses.findIndex(c => c.id === deleteModal.parentId);
                    if (classIdx >= 0) {
                        const examIdx = newClasses[classIdx].exams?.findIndex(e => e.id === deleteModal.id);
                        if (examIdx >= 0 && deleteModal.index !== null) {
                            newClasses[classIdx].exams[examIdx].questions.splice(deleteModal.index, 1);
                            await DataService.saveClass(newClasses[classIdx]);
                            if (selectedExam?.id === deleteModal.id) {
                                setSelectedExam({ ...newClasses[classIdx].exams[examIdx] });
                                if (selectedQuestion === deleteModal.questionNumber) setSelectedQuestion(null);
                            }
                        }
                    }
                }
                
                setClasses(newClasses);
                setDeleteModal({ open: false, type: '', id: '', name: '', parentId: '', index: null });
            };

            // Clear all student responses from exam/homework
            const handleClear = async () => {
                const count = await DataService.clearAllResponses(clearModal.examId, clearModal.examType);
                if (count !== false) {
                    setExamResponses(prev => ({ ...prev, [clearModal.examId]: [] }));
                    setViewingStudent(null); // Reset viewing student
                    alert(`נמחקו ${count} תלמידות בהצלחה! ה${clearModal.examType === 'homework' ? 'שיעורי בית' : 'מבחן'} מוכן לשימוש מחדש.`);
                } else {
                    alert('אירעה שגיאה במחיקה');
                }
                setClearModal({ open: false, examId: '', examTitle: '', examType: 'exam', studentCount: 0 });
            };

            // Update question content
            const updateQuestionContent = async (field, value) => {
                if (!selectedExam || selectedQuestion === null) return;
                const qId = `${selectedExam.id}_q_${selectedQuestion}`;
                if (field === 'imageBase64' || field === 'imageUrl') {
                    if (value) {
                        try {
                            const url = await DataService.uploadQuestionImage(qId, value);
                            setQuestionContent(prev => ({ ...prev, [qId]: { ...prev[qId], imageUrl: url, imageBase64: undefined } }));
                        } catch (e) { console.error('Image upload failed:', e); alert('שגיאה בהעלאת התמונה'); }
                    } else {
                        await DataService.deleteQuestionImage(qId);
                        setQuestionContent(prev => {
                            const updated = { ...prev[qId] };
                            delete updated.imageUrl;
                            delete updated.imageBase64;
                            return { ...prev, [qId]: updated };
                        });
                    }
                    return;
                }
                const updated = { ...questionContent[qId], [field]: value };
                setQuestionContent(prev => ({ ...prev, [qId]: updated }));
                DataService.saveQuestionContent(qId, updated);
            };

            // Save student answer with debounce
            const saveStudentAnswer = useCallback((code) => {
                if (!selectedExam || selectedQuestion === null || !user || isEditor || studentData?.submitted) return;
                
                // Update local state immediately
                setStudentAnswers(prev => ({ ...prev, [selectedQuestion]: { code } }));
                setSaveStatus('saving');
                
                // Debounce Firebase save (1.5 seconds)
                if (saveTimeoutRef.current) clearTimeout(saveTimeoutRef.current);
                saveTimeoutRef.current = setTimeout(async () => {
                    await DataService.saveStudentAnswer(selectedExam.id, selectedExam.type || 'exam', user.email, studentName, selectedQuestion, code);
                    setSaveStatus('saved');
                    setTimeout(() => setSaveStatus(''), 2000);
                }, 1500);
            }, [selectedExam, selectedQuestion, user, isEditor, studentData, studentName]);

            // Handle paste attempt - save without current code dependency
            const handlePasteAttempt = useCallback((pastedText) => {
                if (!selectedExam || selectedQuestion === null || !user || isEditor) return;
                // Save the paste attempt (without code - just the paste content)
                DataService.saveStudentAnswer(selectedExam.id, selectedExam.type || 'exam', user.email, studentName, selectedQuestion, '', pastedText);
                // Show warning
                alert('⚠️ הדבקה אינה מותרת במבחן!\n\nהניסיון נרשם במערכת.');
            }, [selectedExam, selectedQuestion, user, isEditor, studentName]);

            // Flush pending save immediately
            const flushPendingSave = useCallback(() => {
                if (saveTimeoutRef.current && selectedExam && selectedQuestion !== null && !isEditor && studentAnswers[selectedQuestion]?.code) {
                    clearTimeout(saveTimeoutRef.current);
                    saveTimeoutRef.current = null;
                    DataService.saveStudentAnswer(selectedExam.id, selectedExam.type || 'exam', user?.email, studentName, selectedQuestion, studentAnswers[selectedQuestion].code);
                    setSaveStatus('saved');
                    setTimeout(() => setSaveStatus(''), 2000);
                }
            }, [selectedExam, selectedQuestion, isEditor, studentAnswers, user, studentName]);

            // Switch question with save
            const switchQuestion = useCallback((newQuestion) => {
                flushPendingSave();
                setSelectedQuestion(newQuestion);
            }, [flushPendingSave]);

            // Submit exam
            const handleSubmit = async () => {
                if (!selectedExam || !user) return;
                await DataService.submitExam(selectedExam.id, selectedExam.type || 'exam', user.email, studentName, studentAnswers);
                setStudentData(prev => ({ ...prev, submitted: true }));
                setSubmitModal(false);
                alert(selectedExam.type === 'homework' ? 'שיעורי הבית הוגשו בהצלחה!' : 'המבחן הוגש בהצלחה!');
            };

            // Check with AI
            const handleCheckWithAI = async () => {
                if (!viewingStudent || !selectedExam) {
                    alert('לא נבחרה תלמידה או מבחן');
                    return;
                }
                
                setCheckingAI(true);
                try {
                    const settings = await DataService.loadExamSettings(selectedExam.id);
                    const defaultGradingPrompt = settings.gradingInstructions || DEFAULT_GRADING_PROMPT;
                    const feedbackByQuestion = {};
                    
                    for (const qIdx of Object.keys(viewingStudent.answers || {})) {
                        const answer = viewingStudent.answers[qIdx];
                        if (answer?.code) {
                            const qContent = questionContent[`${selectedExam.id}_q_${qIdx}`] || {};
                            // For exams: use question-specific prompt, fallback to default grading prompt
                            const taskPrompt = qContent.questionPrompt || defaultGradingPrompt;
                            // Combine BASE_SYSTEM_PROMPT with task-specific prompt
                            const fullPrompt = BASE_SYSTEM_PROMPT + taskPrompt;
                            const feedback = await AIService.checkCode(
                                answer.code,
                                qContent.instructions || '',
                                qContent.imageUrl || qContent.imageBase64 || '',
                                fullPrompt
                            );
                            feedbackByQuestion[qIdx] = feedback;
                        }
                    }
                    
                    await DataService.saveAIFeedback(selectedExam.id, selectedExam.type || 'exam', viewingStudent.email, feedbackByQuestion);
                    
                    // Reload responses
                    const responses = await DataService.loadAllResponses(selectedExam.id, selectedExam.type || 'exam');
                    setExamResponses(prev => ({ ...prev, [selectedExam.id]: responses }));
                    setViewingStudent(responses.find(r => r.email === viewingStudent.email));
                    
                    alert('הבדיקה הושלמה!');
                } catch (error) {
                    alert('שגיאה: ' + error.message);
                } finally {
                    setCheckingAI(false);
                }
            };

            // Toggle exam visibility
            const toggleExamVisibility = async (classId, examId) => {
                const newClasses = [...classes];
                const classIdx = newClasses.findIndex(c => c.id === classId);
                if (classIdx < 0) return;
                
                const examIdx = newClasses[classIdx].exams?.findIndex(e => e.id === examId);
                if (examIdx < 0) return;
                
                newClasses[classIdx].exams[examIdx].visible = !newClasses[classIdx].exams[examIdx].visible;
                await DataService.saveClass(newClasses[classIdx]);
                setClasses(newClasses);
            };

            // Find class for exam
            const findClassForExam = (examId) => classes.find(c => c.exams?.some(e => e.id === examId));

            // Get current responses for selected exam
            const currentResponses = selectedExam ? (examResponses[selectedExam.id] || []) : [];

            // טעינת דוח ציונים מלא (משמש גם את ההגדרות וגם את דף הבית למורה)
            const openStudentsReport = async () => {
                setLoadingReport(true);
                setSettingsModal(false);
                setStudentsReportModal(true);
                const students = await DataService.loadAllStudents();
                const studentsWithScores = await Promise.all(students.map(async (s) => {
                    const scores = await DataService.loadStudentScores(s.email);
                    const allScores = [...scores.exams.map(e => e.grade), ...scores.homeworks.map(h => h.grade)];
                    const avg = allScores.length > 0 ? Math.round(allScores.reduce((a, b) => a + b, 0) / allScores.length) : null;
                    return { ...s, examCount: scores.exams.length, homeworkCount: scores.homeworks.length, average: avg };
                }));
                setStudentsReportData(studentsWithScores);
                setLoadingReport(false);
            };

            // יצוא הדוח לקובץ CSV (נפתח באקסל עם עברית תקינה)
            const exportReportCSV = () => {
                const rows = [['שם', 'אימייל', 'כיתה', 'מבחנים', 'עבודות', 'ממוצע']];
                studentsReportData
                    .filter(s => reportGradeFilter === 'הכל' || s.grade === reportGradeFilter)
                    .forEach(s => rows.push([s.name || '', s.email || '', s.grade || '', s.examCount, s.homeworkCount, s.average !== null && s.average !== undefined ? s.average : '']));
                const csv = '\uFEFF' + rows.map(r => r.map(c => '"' + String(c).replace(/"/g, '""') + '"').join(',')).join('\n');
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = reportGradeFilter === 'הכל' ? 'דוח-ציונים.csv' : `דוח-ציונים-${reportGradeFilter}.csv`;
                a.click();
                URL.revokeObjectURL(a.href);
            };

            // Render
            if (authLoading) return <div className="min-h-screen flex items-center justify-center"><div className="spinner"></div></div>;
            if (!user) return <LoginScreen onLogin={handleLogin} loading={loginLoading} />;
            if (!isEditor && profileLoading) return <div className="min-h-screen flex items-center justify-center"><div className="spinner"></div></div>;
            if (!isEditor && !nameEntered) return <StudentNameScreen onSubmit={async (name, grade) => { 
                setStudentName(name); 
                setStudentGrade(grade);
                // Save to Firebase, then check approval status (new profiles start unapproved)
                if (user?.email) {
                    await DataService.saveUserProfile(user.email, name, grade);
                    const p = await DataService.loadUserProfile(user.email);
                    setStudentApproved(p ? (p.approved !== false) : false);
                }
                setNameEntered(true); 
            }} existingName={studentName} existingGrade={studentGrade} />;

            {/* Waiting for teacher approval */}
            if (!isEditor && nameEntered && studentApproved === false) return <PendingApprovalScreen 
                name={studentName} 
                grade={studentGrade} 
                onRefresh={async () => {
                    const p = await DataService.loadUserProfile(user.email);
                    const ok = p ? (p.approved !== false) : false;
                    setStudentApproved(ok);
                    return ok;
                }} 
                onSignOut={() => auth.signOut()} />;
            
            {/* Loading screen while data loads */}
            if (dataLoading) return (
                <div className="min-h-screen flex flex-col items-center justify-center">
                    <div className="logo-coin w-16 h-16 rounded-2xl mb-6 flex items-center justify-center text-white font-mono font-bold text-2xl animate-bounce">{'{ }'}</div>
                    <h2 className="text-2xl font-extrabold text-white mb-4">Java לבגרות</h2>
                    <div className="flex items-center gap-3">
                        <div className="spinner"></div>
                        <span className="text-gray-400">טוענים את הנושאים שלך...</span>
                    </div>
                    <p className="text-gray-500 text-sm mt-4">רק עוד רגע...</p>
                </div>
            );

            const currentQId = selectedExam && selectedQuestion !== null ? `${selectedExam.id}_q_${selectedQuestion}` : null;
            const currentContent = currentQId ? questionContent[currentQId] || {} : {};
            // Find question by number, not by index
            const currentQ = selectedExam?.questions?.find(q => q.number === selectedQuestion || q.number === String(selectedQuestion));
            const currentQIndex = selectedExam?.questions?.findIndex(q => q.number === selectedQuestion || q.number === String(selectedQuestion));
            const isSubmitted = studentData?.submitted;

            // Safety: previewMode should only be active for editors
            const safePreviewMode = isEditor && previewMode;

            // Viewing answers logic
            const viewingAnswers = viewingStudent ? viewingStudent.answers : (safePreviewMode ? previewAnswers : studentAnswers);
            const viewingIsSubmitted = viewingStudent ? viewingStudent.submitted : (safePreviewMode ? false : isSubmitted);
            const isInStudentView = !isEditor || safePreviewMode;

            // Filter classes based on student grade (students see only their grade's units).
            // Teacher (מצב מנהל): filtered by the grade switcher in the header.
            const classMatchesGrade = (cls, grade) => {
                if (grade === 'הכל') return true;
                if (cls.grade && cls.grade !== 'הכל') return cls.grade === grade;
                if (cls.grade === 'הכל') return true;
                return cls.title?.includes(grade);
            };
            const filteredClasses = isEditor ? classes.filter(cls => classMatchesGrade(cls, teacherGradeFilter)) : classes.filter(cls => {
                if (!studentGrade) return true; // Show all if no grade set
                return classMatchesGrade(cls, studentGrade);
            });

            // Currently selected topic unit (student topic page)
            const selectedClassObj = selectedClass ? filteredClasses.find(c => c.id === selectedClass) : null;

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-slate-900/80 backdrop-blur border-b border-slate-700 sticky top-0 z-40">
                        <div className="flex items-center justify-between px-4 py-3">
                            <div className="flex items-center gap-3">
                                {/* Mobile menu button */}
                                <button 
                                    onClick={() => setMobileSidebarOpen(true)}
                                    className="mobile-menu-btn p-2 hover:bg-slate-700 rounded-lg text-gray-300 hidden"
                                >
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                        <line x1="3" y1="6" x2="21" y2="6"></line>
                                        <line x1="3" y1="12" x2="21" y2="12"></line>
                                        <line x1="3" y1="18" x2="21" y2="18"></line>
                                    </svg>
                                </button>
                                <div className="flex items-center gap-3 cursor-pointer hover:opacity-80 transition-opacity" onClick={() => { 
                                    // Save any pending changes immediately before navigating
                                    if (!isEditor) flushPendingSave();
                                    setSelectedExam(null); setSelectedQuestion(null); setViewingStudent(null); setShowSummary(false); setPreviewMode(false); setSelectedClass(null); 
                                }} title="חזרה לעמוד הבית">
                                    <div className="logo-coin w-9 h-9 rounded-xl flex items-center justify-center text-white font-mono font-bold text-sm">{'{ }'}</div>
                                    <div className="hidden md:block">
                                        <h1 className="text-lg font-extrabold text-white leading-tight">Java לבגרות</h1>
                                        <div className="text-indigo-300 text-[11px] font-semibold leading-tight">{isEditor ? 'ניהול יחידות, עבודות ומבחנים' : 'יחידות · עבודות · מבחנים'}</div>
                                    </div>
                                    <h1 className="text-lg font-bold text-white md:hidden">Java לבגרות</h1>
                                </div>
                            </div>
                            <div className="flex items-center gap-2 md:gap-3">
                                {/* Student name badge */}
                                {!isEditor && studentName && (
                                    <button onClick={() => setNameEditModal(true)} className={`px-3 py-1.5 rounded-full text-sm flex items-center gap-2 ${isSubmitted ? 'bg-purple-600' : 'bg-green-600'} hover:opacity-80`}>
                                        <Icon name={isSubmitted ? 'lock' : 'user'} size={14} />
                                        {studentName} {studentGrade && <span className="opacity-75">({studentGrade})</span>}
                                        <Icon name="edit" size={12} />
                                    </button>
                                )}
                                
                                {/* AI Chat Helper Button - for students only */}
                                {!isEditor && selectedQuestion !== null && !viewingIsSubmitted && (
                                    <button 
                                        onClick={() => setChatOpen(!chatOpen)}
                                        className={`px-3 py-1.5 rounded-full text-sm flex items-center gap-2 transition-all ${
                                            chatOpen 
                                                ? 'bg-purple-600 text-white ring-2 ring-purple-400' 
                                                : 'bg-gradient-to-r from-purple-600 to-blue-600 text-white hover:opacity-90'
                                        }`}
                                    >
                                        🤖 {chatOpen ? 'סגור עזרה' : 'קבל עזרה'}
                                    </button>
                                )}
                                
                                {/* Viewing student indicator */}
                                {isEditor && !previewMode && viewingStudent && (
                                    <div className="px-3 py-1.5 rounded-full text-sm flex items-center gap-2 bg-yellow-600">
                                        <Icon name="eye" size={14} />
                                        צופה ב: {viewingStudent.studentName}
                                        <button onClick={() => setViewingStudent(null)} className="hover:bg-yellow-700 rounded p-0.5"><Icon name="x" size={14} /></button>
                                    </div>
                                )}
                                
                                {/* Preview mode indicator */}
                                {isEditor && previewMode && (
                                    <div className="px-3 py-1.5 rounded-full text-sm flex items-center gap-2 bg-pink-600 animate-pulse">
                                        <Icon name="eye" size={14} />
                                        מצב תצוגה מקדימה (כתלמידה)
                                    </div>
                                )}
                                
                                {isEditor && (
                                    <>
                                        {/* Preview mode toggle */}
                                        <button onClick={() => { 
                                            setPreviewMode(!previewMode); 
                                            setViewingStudent(null);
                                            setEditMode(false);
                                            if (!previewMode) {
                                                // Entering preview mode - reset preview answers
                                                setPreviewAnswers({});
                                            }
                                        }} className={`px-4 py-2 rounded-lg flex items-center gap-2 ${previewMode ? 'bg-pink-600 text-white' : 'bg-slate-700 text-gray-300'}`}>
                                            <Icon name="eye" size={16} /> {previewMode ? 'יציאה מתצוגה מקדימה' : 'תצוגה מקדימה'}
                                        </button>
                                        
                                        {/* Edit mode toggle - only when not in preview */}
                                        {!previewMode && (
                                            <button onClick={() => setEditMode(!editMode)} className={`px-4 py-2 rounded-lg flex items-center gap-2 ${editMode ? 'bg-blue-600 text-white' : 'bg-slate-700 text-gray-300'}`}>
                                                <Icon name="edit" size={16} /> {editMode ? 'מצב עריכה' : 'עריכה'}
                                            </button>
                                        )}
                                    </>
                                )}
                                {isEditor && !previewMode && (
                                    <div className="hidden md:flex gap-1 bg-slate-800/80 border border-slate-600/60 rounded-full p-1" title="מצב מנהל — מעבר בין שכבות">
                                        {['הכל', 'יא', 'יב'].map(g => (
                                            <button key={g} onClick={() => { setTeacherGradeFilter(g); setSelectedExam(null); setSelectedQuestion(null); setViewingStudent(null); }}
                                                className={`px-3.5 py-1 rounded-full text-sm font-bold transition-all ${teacherGradeFilter === g ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-white'}`}>
                                                {g === 'הכל' ? 'כל השכבות' : 'כיתה ' + g}
                                            </button>
                                        ))}
                                    </div>
                                )}
                                {isEditor && !previewMode && pendingStudents.length > 0 && (
                                    <button onClick={() => setApprovalsModal(true)} className="px-3 py-1.5 rounded-full text-sm flex items-center gap-2 bg-amber-500 text-slate-900 font-bold hover:bg-amber-400 animate-pulse">
                                        ⏳ {pendingStudents.length} ממתינות לאישור
                                    </button>
                                )}
                                {isEditor && <button onClick={() => setSettingsModal(true)} className="p-2 hover:bg-slate-700 rounded-lg text-gray-400"><Icon name="settings" size={20} /></button>}
                                <img src={user.photoURL} className="w-8 h-8 rounded-full" />
                                <button onClick={() => auth.signOut()} className="p-2 hover:bg-slate-700 rounded-lg text-gray-400"><Icon name="logout" size={18} /></button>
                            </div>
                        </div>
                    </header>

                    {/* Approvals Modal — teacher approves new students */}
                    <Modal isOpen={approvalsModal} onClose={() => setApprovalsModal(false)} title="אישור תלמידות חדשות" titleColor="text-amber-400">
                        <div className="p-4 space-y-3">

                                        <button 
                                            onClick={() => setAutomataType('DFA')}
                                            className={`flex-1 py-2 px-3 rounded-lg text-sm transition-all ${
                                                automataType === 'DFA' 
                                                    ? 'bg-green-600 text-white ring-2 ring-green-400' 
                                                    : 'bg-slate-700 text-gray-300 hover:bg-slate-600'
                                            }`}
                                        >
                                            DFA<br/><span className="text-xs opacity-75">דטרמיניסטי</span>
                                        </button>
                                        <button 
                                            onClick={() => setAutomataType('NFA')}
                                            className={`flex-1 py-2 px-3 rounded-lg text-sm transition-all ${
                                                automataType === 'NFA' 
                                                    ? 'bg-yellow-600 text-white ring-2 ring-yellow-400' 
                                                    : 'bg-slate-700 text-gray-300 hover:bg-slate-600'
                                            }`}
                                        >
                                            NFA<br/><span className="text-xs opacity-75">אי-דטרמיניסטי</span>
                                        </button>
                                        <button 
                                            onClick={() => setAutomataType('PDA')}
                                            className={`flex-1 py-2 px-3 rounded-lg text-sm transition-all ${
                                                automataType === 'PDA' 
                                                    ? 'bg-red-600 text-white ring-2 ring-red-400' 
                                                    : 'bg-slate-700 text-gray-300 hover:bg-slate-600'
                                            }`}
                                        >
                                            PDA<br/><span className="text-xs opacity-75">מחסנית</span>
                                        </button>
                                    </div>
                                </div>
                                
                                {/* Alphabet Definition */}
                                <div>
                                    <label className="block text-sm font-medium text-gray-300 mb-2">
                                        א"ב (אלפבית) - הסמלים המותרים במעברים
                                    </label>
                                    <div className="flex gap-2 mb-2 flex-wrap">
                                        {alphabetPresets.map(preset => (
                                            <button 
                                                key={preset.value}
                                                onClick={() => setAlphabet(preset.value)}
                                                className={`px-3 py-1 rounded text-sm transition-all ${
                                                    alphabet === preset.value 
                                                        ? 'bg-purple-600 text-white' 
                                                        : 'bg-slate-600 text-gray-300 hover:bg-slate-500'
                                                }`}
                                            >
                                                {preset.label}
                                            </button>
                                        ))}
                                    </div>
                                    <input 
                                        type="text" 
                                        value={alphabet} 
                                        onChange={e => setAlphabet(e.target.value)} 
                                        className="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white font-mono" 
                                        placeholder="a,b,c או 0,1 (מופרד בפסיקים)"
                                        dir="ltr"
                                    />
                                    <p className="text-xs text-gray-500 mt-1">
                                        הפרד סמלים בפסיק. ε (אפסילון) תמיד זמין עבור NFA/PDA.
                                    </p>
                                </div>
                            </>
                        )}
                        
                        <div>
                            <label className="block text-sm font-medium text-gray-300 mb-2">כותרת (אופציונלי)</label>
                            <input type="text" value={title} onChange={e => setTitle(e.target.value)} className="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white" placeholder="תיאור קצר" />
                        </div>

                        {/* Image upload / paste zone */}
                        <div>
                            <label className="block text-sm font-medium text-gray-300 mb-2">תמונה (אופציונלי)</label>
                            {imageBase64 ? (
                                <div className="relative">
                                    <img src={imageBase64} className="image-preview mb-2" />
                                    <div className="flex gap-2">
                                        <label className="action-btn bg-slate-600 text-gray-300 cursor-pointer">
                                            <Icon name="upload" size={14} /> החלף תמונה
                                            <input ref={fileInputRef} type="file" accept="image/*" className="hidden" onChange={e => { if (e.target.files[0]) handleFileSelect(e.target.files[0]); }} />
                                        </label>
                                        <button onClick={() => setImageBase64('')} className="action-btn bg-red-600/20 text-red-400">
                                            <Icon name="trash" size={14} /> הסר
                                        </button>
                                    </div>
                                </div>
                            ) : (
                                <div
                                    className={`paste-zone ${dragOver ? 'drag-over' : ''}`}
                                    onClick={() => fileInputRef.current?.click()}
                                    onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
                                    onDragLeave={() => setDragOver(false)}
                                    onDrop={(e) => { e.preventDefault(); setDragOver(false); if (e.dataTransfer.files[0]) handleFileSelect(e.dataTransfer.files[0]); }}
                                >
                                    <Icon name="image" size={32} />
                                    <p className="text-gray-400 text-sm mt-2">לחץ לבחירת תמונה, גרור לכאן, או הדבק צילום מסך (Ctrl+V)</p>
                                    <input ref={fileInputRef} type="file" accept="image/*" className="hidden" onChange={e => { if (e.target.files[0]) handleFileSelect(e.target.files[0]); }} />
                                </div>
                            )}
                        </div>
                    </div>
                    <div className="p-4 border-t border-slate-600 flex justify-end gap-2">
                        <button onClick={onCancel} className="px-4 py-2 text-gray-400 hover:bg-slate-700 rounded-lg">ביטול</button>
                        <button onClick={() => number.trim() && onSave({
                            number: number.trim(),
                            title: title.trim(),
                            points,
                            questionType,
                            automataType: questionType === 'automata' ? automataType : undefined,
                            alphabet: questionType === 'automata' ? alphabet : undefined,
                            _imageBase64: imageBase64 || undefined
                        })} className="px-4 py-2 btn-primary text-white rounded-lg">{item ? 'שמור' : 'הוסף'}</button>
                    </div>
                </>
            );
        };

        const NameEditForm = ({ name, grade, onSave, onCancel }) => {
            const [newName, setNewName] = useState(name || '');
            const [newGrade, setNewGrade] = useState(grade || '');
            return (
                <>
                    <div className="p-4">
                        <label className="block text-sm font-medium text-gray-300 mb-2">השם שלך</label>
                        <input type="text" value={newName} onChange={e => setNewName(e.target.value)} className="w-full px-3 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white mb-4" autoFocus />
                        
                        <label className="block text-sm font-medium text-gray-300 mb-2">הכיתה שלך</label>
                        <div className="flex gap-2">
                            {['יא', 'יב'].map(g => (
                                <button key={g} onClick={() => setNewGrade(g)}
                                    className={`flex-1 px-4 py-2 rounded-lg font-bold transition-all ${
                                        newGrade === g 
                                            ? 'bg-blue-600 text-white' 
                                            : 'bg-slate-700 text-gray-300 hover:bg-slate-600'
                                    }`}>
                                    {g}
                                </button>
                            ))}
                        </div>
                    </div>
                    <div className="p-4 border-t border-slate-600 flex justify-end gap-2">
                        <button onClick={onCancel} className="px-4 py-2 text-gray-400 hover:bg-slate-700 rounded-lg">ביטול</button>
                        <button onClick={() => newName.trim() && newGrade && onSave(newName.trim(), newGrade)} disabled={!newName.trim() || !newGrade} className="px-4 py-2 btn-primary text-white rounded-lg disabled:opacity-50">שמור</button>
                    </div>
                </>
            );
        };

        // Grading Modal
        const GradingModal = ({ isOpen, examId, onClose }) => {
            const [instructions, setInstructions] = useState('');
            const [saving, setSaving] = useState(false);
            
            useEffect(() => {
                if (isOpen && examId) {
                    DataService.loadExamSettings(examId).then(data => setInstructions(data.gradingInstructions || DEFAULT_GRADING_PROMPT));
                }
            }, [isOpen, examId]);
            
            const handleSave = async () => {
                setSaving(true);
                await DataService.saveExamSettings(examId, { gradingInstructions: instructions });
                setSaving(false);
                onClose();
            };
            
            if (!isOpen) return null;
            
            return (
                <Modal isOpen={isOpen} onClose={onClose} title="📝 הוראות בדיקה" titleColor="text-yellow-400" wide>
                    <div className="p-6">
                        <p className="text-sm text-gray-400 mb-3">הוראות אלו ישלחו ל-AI יחד עם כל תשובה לבדיקה</p>
                        <textarea value={instructions} onChange={e => setInstructions(e.target.value)} rows={8}
                            className="w-full px-4 py-3 bg-slate-700 border border-slate-600 rounded-lg text-white resize-none" />
                    </div>
                    <div className="p-4 border-t border-slate-600 flex justify-end gap-2">
                        <button onClick={onClose} className="px-4 py-2 text-gray-400 hover:bg-slate-700 rounded-lg">ביטול</button>
                        <button onClick={handleSave} disabled={saving} className="px-6 py-2 bg-yellow-600 text-white rounded-lg hover:bg-yellow-500 font-bold disabled:opacity-50">
                            {saving ? 'שומר...' : 'שמור'}
                        </button>
                    </div>
                </Modal>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
