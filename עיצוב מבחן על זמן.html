<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>עיצובים — מבחן על זמן + הגדרות מנהל</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Heebo', sans-serif; background: #070B16; background-image: radial-gradient(60% 40% at 50% 0%, rgba(49,46,129,0.28) 0%, transparent 65%); color: #E2E8F0; padding: 46px 28px 120px; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .ph { max-width: 1080px; margin: 0 auto 8px; }
  .ph h1 { font-size: 29px; font-weight: 900; color: #F8FAFC; }
  .ph p { color: #94A3B8; font-size: 15px; margin-top: 8px; line-height: 1.7; max-width: 860px; }
  .grp { max-width: 1080px; margin: 60px auto 0; }
  .grp-h { display: flex; align-items: baseline; gap: 12px; margin-bottom: 5px; }
  .grp-h .n { width: 28px; height: 28px; border-radius: 9px; background: #312E81; color: #C7D2FE; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; flex: none; }
  .grp-h .n.r { background: #7F1D1D; color: #FECACA; }
  .grp-h h2 { font-size: 21px; font-weight: 800; color: #F1F5F9; }
  .grp .desc { color: #64748B; font-size: 13.5px; margin: 0 0 18px 40px; }
  .stage { background: #0a0f1d; border: 1px solid rgba(148,163,184,0.12); border-radius: 18px; overflow: hidden; }
  .card { background: rgba(23,32,56,0.72); border: 1px solid rgba(148,163,184,0.18); border-radius: 16px; }
  .pill { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 999px; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 11px 22px; border-radius: 11px; font-weight: 700; font-size: 15px; font-family: 'Heebo'; border: none; cursor: pointer; }
  .btn-solid { background: linear-gradient(135deg,#6366F1,#4F46E5); color: #fff; box-shadow: 0 6px 20px rgba(99,102,241,0.3); }
  .btn-danger { background: linear-gradient(135deg,#DC2626,#B91C1C); color: #fff; }
  svg { display: block; }
  /* toggle */
  .tg { width: 42px; height: 24px; border-radius: 999px; background: #6366F1; position: relative; flex: none; }
  .tg.off { background: rgba(148,163,184,0.25); }
  .tg::after { content: ''; position: absolute; top: 3px; right: 3px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: .2s; }
  .tg.off::after { right: 21px; }
  .setrow { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid rgba(148,163,184,0.1); }
  .clock { font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
<div class="ph">
  <h1>מבחן על זמן — הגדרות המנהל ומה התלמידה רואה</h1>
  <p>המנהל בוחר לכל מבחן: האם הוא על זמן, כמה דקות, והאם "ננעל" (אי אפשר לצאת באמצע ולחזור). כאן פאנל ההגדרות + איך מבחן על זמן נראה לתלמידה — ממסך הפתיחה, דרך הטיימר, ועד הגשה אוטומטית בתום הזמן.</p>
</div>
<div id="root"></div>

<script>
const I = {
  clock: (s=16)=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>`,
  lock: (s=16)=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`,
  warn: (s=16)=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12" y2="17"/></svg>`,
  shuffle:(s=16)=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="m15 15 6 6"/><path d="M4 4l5 5"/></svg>`,
  send:(s=16)=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>`,
  paste:(s=16)=>`<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>`,
};

/* ============ SETTINGS PANEL (admin) ============ */
function settings(){
  const row = (icon, title, sub, on, extra) => `<div class="setrow">
    <span style="width:38px;height:38px;border-radius:11px;background:rgba(99,102,241,0.14);color:#A5B4FC;display:flex;align-items:center;justify-content:center;flex:none;">${icon}</span>
    <div style="flex:1;"><div style="color:#fff;font-weight:700;font-size:15px;">${title}</div><div style="color:#94A3B8;font-size:12.5px;">${sub}</div></div>
    ${extra||''}
    <span class="tg ${on?'':'off'}"></span>
  </div>`;
  return `<div class="card" style="max-width:560px;padding:22px 24px;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;"><span style="width:34px;height:34px;border-radius:10px;background:rgba(99,102,241,0.16);color:#A5B4FC;display:flex;align-items:center;justify-content:center;">${I.clock(18)}</span><div style="color:#fff;font-size:18px;font-weight:800;">הגדרות המבחן</div></div>
    <div style="color:#64748B;font-size:13px;margin-bottom:8px;">מבחן · מערכים ולולאות · כיתה יא</div>
    ${row(I.clock(18),'מבחן על זמן','כשמופעל — מתחיל טיימר עם פתיחת המבחן',true,`<div style="display:flex;align-items:center;gap:6px;background:#0F172A;border:1px solid rgba(148,163,184,0.2);border-radius:9px;padding:5px 10px;margin-left:4px;"><input value="45" style="width:34px;background:none;border:none;color:#fff;font-weight:800;font-size:15px;text-align:center;font-family:'Heebo';"><span style="color:#94A3B8;font-size:12.5px;">דק׳</span></div>`)}
    ${row(I.lock(18),'נעילת מבחן','אי אפשר לצאת באמצע ולחזור — יציאה = הגשה',true)}
    ${row(I.send(18),'הגשה אוטומטית בתום הזמן','כשנגמר הזמן המבחן מוגש אוטומטית',true)}
    ${row(I.paste(18),'חסימת הדבקה','ניסיונות הדבקה נחסמים ונשמרים למורה',true)}
    <div class="setrow" style="border-bottom:none;">
      <span style="width:38px;height:38px;border-radius:11px;background:rgba(99,102,241,0.14);color:#A5B4FC;display:flex;align-items:center;justify-content:center;flex:none;">${I.shuffle(18)}</span>
      <div style="flex:1;"><div style="color:#fff;font-weight:700;font-size:15px;">ערבוב סדר השאלות</div><div style="color:#94A3B8;font-size:12.5px;">לכל תלמידה סדר שונה — מקשה על העתקה</div></div>
      <span class="tg off"></span>
    </div>
    <button class="btn btn-solid" style="width:100%;margin-top:16px;">שמירת הגדרות</button>
  </div>`;
}

/* ============ START GATE (student) ============ */
function startGate(){
  return `<div class="stage" style="padding:44px 32px;text-align:center;">
    <div style="width:64px;height:64px;border-radius:18px;background:rgba(99,102,241,0.15);border:1px solid rgba(129,140,248,0.3);color:#A5B4FC;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;">${I.clock(30)}</div>
    <div style="color:#fff;font-size:26px;font-weight:900;margin-bottom:8px;">מבחן · מערכים ולולאות</div>
    <div style="color:#94A3B8;font-size:15px;margin-bottom:24px;">5 שאלות · 100 נקודות</div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;max-width:560px;margin:0 auto 26px;">
      <div style="flex:1;min-width:150px;background:rgba(15,23,42,0.5);border:1px solid rgba(148,163,184,0.14);border-radius:13px;padding:16px;"><div style="color:#818CF8;display:flex;justify-content:center;margin-bottom:6px;">${I.clock(22)}</div><div style="color:#fff;font-weight:800;font-size:20px;">45 דקות</div><div style="color:#94A3B8;font-size:12px;">משך המבחן</div></div>
      <div style="flex:1;min-width:150px;background:rgba(220,38,38,0.07);border:1px solid rgba(248,113,113,0.25);border-radius:13px;padding:16px;"><div style="color:#F87171;display:flex;justify-content:center;margin-bottom:6px;">${I.lock(22)}</div><div style="color:#fff;font-weight:800;font-size:15px;margin-top:5px;">מבחן נעול</div><div style="color:#94A3B8;font-size:12px;">אי אפשר לצאת ולחזור</div></div>
    </div>
    <div style="background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.25);border-radius:13px;padding:14px 18px;max-width:560px;margin:0 auto 24px;text-align:right;display:flex;gap:11px;">
      <span style="color:#FBBF24;flex:none;">${I.warn(18)}</span>
      <div style="color:#FCD34D;font-size:13.5px;line-height:1.7;">חשוב לדעת לפני שמתחילים: ברגע שתלחצי "התחילי" — הטיימר יתחיל ולא ייעצר. <b>יציאה מהמבחן או מעבר לחלון אחר ייחשבו כהגשה.</b> ודאי שיש לך זמן וחיבור יציב.</div>
    </div>
    <button class="btn btn-solid" style="font-size:16px;padding:13px 38px;">התחילי את המבחן ←</button>
  </div>`;
}

/* ============ IN-EXAM — OPTION 1: top bar timer ============ */
function inExamBar(danger){
  const t = danger ? '02:14' : '38:47';
  const col = danger ? '#F87171' : '#A5B4FC';
  const bg = danger ? 'rgba(220,38,38,0.12)' : 'rgba(99,102,241,0.12)';
  const bd = danger ? 'rgba(248,113,113,0.4)' : 'rgba(129,140,248,0.3)';
  return `<div class="stage">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 22px;background:rgba(11,17,32,0.9);border-bottom:1px solid ${bd};">
      <div style="display:flex;align-items:center;gap:12px;"><span class="pill" style="background:rgba(220,38,38,0.12);color:#FCA5A5;">${I.lock(13)} מבחן נעול</span><span style="color:#CBD5E1;font-weight:700;font-size:14.5px;">מערכים ולולאות</span></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="display:flex;align-items:center;gap:8px;background:${bg};border:1px solid ${bd};color:${col};border-radius:11px;padding:8px 16px;font-weight:800;font-size:17px;" class="mono clock">${I.clock(16)} ${t}</span>
        <button class="btn btn-danger" style="padding:9px 18px;font-size:14px;">הגשה</button>
      </div>
    </div>
    <div style="padding:22px 26px;">
      <div style="display:flex;gap:8px;margin-bottom:18px;">${[1,2,3,4,5].map(i=>`<div style="width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;${i===2?'background:#6366F1;color:#fff;':i===1?'background:rgba(34,197,94,0.16);color:#4ADE80;':'background:rgba(15,23,42,0.6);color:#64748B;border:1px solid rgba(148,163,184,0.18);'}">${i}</div>`).join('')}</div>
      <div class="card" style="padding:20px;"><div style="color:#fff;font-size:18px;font-weight:800;margin-bottom:8px;">שאלה 2 · מציאת מקסימום</div><div style="color:#CBD5E1;font-size:14.5px;line-height:1.8;">השלימי את הלולאה כך שבסיומה max יחזיק את הערך הגדול ביותר במערך.</div></div>
      ${danger? `<div style="margin-top:14px;background:rgba(220,38,38,0.1);border:1px solid rgba(248,113,113,0.3);border-radius:11px;padding:11px 16px;color:#FCA5A5;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;">${I.warn(15)} נותרו פחות מ-3 דקות — סיימי והגישי</div>`:''}
    </div>
  </div>`;
}

/* ============ IN-EXAM — OPTION 2: floating ring timer ============ */
function inExamRing(){
  return `<div class="stage" style="position:relative;padding:22px 26px;">
    <div style="position:absolute;top:18px;left:18px;display:flex;align-items:center;gap:10px;background:rgba(13,19,34,0.92);border:1px solid rgba(129,140,248,0.3);border-radius:14px;padding:8px 8px 8px 16px;box-shadow:0 10px 30px rgba(0,0,0,0.4);">
      <div style="text-align:right;"><div style="color:#94A3B8;font-size:11px;">נותר זמן</div><div class="mono clock" style="color:#fff;font-weight:800;font-size:18px;">38:47</div></div>
      <div style="width:42px;height:42px;border-radius:50%;background:conic-gradient(#6366F1 78%, rgba(148,163,184,0.18) 0);display:flex;align-items:center;justify-content:center;"><div style="width:32px;height:32px;border-radius:50%;background:#0a0f1d;display:flex;align-items:center;justify-content:center;color:#A5B4FC;">${I.clock(15)}</div></div>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:16px;"><span class="pill" style="background:rgba(220,38,38,0.12);color:#FCA5A5;">${I.lock(13)} מבחן נעול · יציאה = הגשה</span></div>
    <div class="card" style="padding:20px;margin-top:8px;"><div style="color:#fff;font-size:18px;font-weight:800;margin-bottom:8px;">שאלה 2 · מציאת מקסימום</div><div style="color:#CBD5E1;font-size:14.5px;line-height:1.8;">השלימי את הלולאה כך שבסיומה max יחזיק את הערך הגדול ביותר במערך.</div></div>
    <div style="color:#475569;font-size:12px;text-align:center;margin-top:14px;">הטיימר צף ונשאר גלוי גם בגלילה</div>
  </div>`;
}

/* ============ LOCKDOWN WARNING ============ */
function warning(){
  return `<div class="stage" style="padding:0;display:flex;align-items:center;justify-content:center;min-height:340px;background:rgba(120,20,20,0.18);">
    <div class="card" style="max-width:440px;padding:30px;text-align:center;border-color:rgba(248,113,113,0.4);">
      <div style="width:58px;height:58px;border-radius:50%;background:rgba(220,38,38,0.15);color:#F87171;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">${I.warn(28)}</div>
      <div style="color:#fff;font-size:21px;font-weight:800;margin-bottom:8px;">יצאת מחלון המבחן!</div>
      <div style="color:#CBD5E1;font-size:14.5px;line-height:1.7;margin-bottom:8px;">המבחן נעול — מעבר לחלון או לשונית אחרת נרשם ומדווח למורה. זו הפעם הראשונה.</div>
      <div class="pill" style="background:rgba(245,158,11,0.12);color:#FCD34D;margin-bottom:20px;">נרשמה יציאה · 14:32</div>
      <button class="btn btn-solid" style="width:100%;">חזרה למבחן</button>
    </div>
  </div>`;
}

/* ============ TIME UP — auto submit ============ */
function timeUp(){
  return `<div class="stage" style="padding:44px 32px;text-align:center;">
    <div style="width:62px;height:62px;border-radius:50%;background:rgba(99,102,241,0.15);color:#A5B4FC;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">${I.send(28)}</div>
    <div style="color:#fff;font-size:24px;font-weight:900;margin-bottom:8px;">הזמן הסתיים — המבחן הוגש</div>
    <div style="color:#94A3B8;font-size:14.5px;line-height:1.7;max-width:440px;margin:0 auto;">כל התשובות שכתבת נשמרו והוגשו אוטומטית. המורה תבדוק אותן ותשלח לך ציון ומשוב.</div>
    <div class="pill" style="background:rgba(16,185,129,0.14);color:#6EE7B7;margin-top:18px;">הוגש בהצלחה · 5/5 שאלות נענו</div>
  </div>`;
}

let html = '';
html += `<div class="grp"><div class="grp-h"><span class="n">A</span><h2>פאנל ההגדרות של המנהל</h2></div><div class="desc">בעת יצירת/עריכת מבחן — המנהל בוחר את כל ההגדרות במקום אחד</div>${settings()}</div>`;
html += `<div class="grp"><div class="grp-h"><span class="n">B</span><h2>מסך הפתיחה לתלמידה (השער)</h2></div><div class="desc">לפני שהטיימר מתחיל — התלמידה רואה את כל הכללים ולוחצת "התחילי"</div>${startGate()}</div>`;
html += `<div class="grp"><div class="grp-h"><span class="n">1</span><h2>במהלך המבחן — טיימר בסרגל עליון</h2></div><div class="desc">סרגל קבוע למעלה עם טיימר, מספור שאלות וכפתור הגשה. הטיימר הופך לאדום כשנגמר הזמן.</div>${inExamBar(false)}<div style="height:14px;"></div>${inExamBar(true)}</div>`;
html += `<div class="grp"><div class="grp-h"><span class="n">2</span><h2>במהלך המבחן — טיימר טבעתי צף</h2></div><div class="desc">טיימר קומפקטי שצף בפינה ונשאר גלוי תמיד, גם בגלילה. פחות פולשני.</div>${inExamRing()}</div>`;
html += `<div class="grp"><div class="grp-h"><span class="n r">!</span><h2>אזהרת נעילה — ניסיון יציאה</h2></div><div class="desc">אם התלמידה מנסה לעבור לחלון אחר — אזהרה שזה נרשם ומדווח למורה</div>${warning()}</div>`;
html += `<div class="grp"><div class="grp-h"><span class="n">✓</span><h2>תום הזמן — הגשה אוטומטית</h2></div><div class="desc">כשהטיימר מגיע ל-0, המבחן מוגש אוטומטית עם כל מה שנכתב</div>${timeUp()}</div>`;
document.getElementById('root').innerHTML = html;
</script>
</body>
</html>
